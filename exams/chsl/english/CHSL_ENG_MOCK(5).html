<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>English Sectional Mock</title>
  <style>
    *{box-sizing:border-box;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    body{margin:0;background:#f3f4f6;display:flex;justify-content:center;padding:16px}
    .container{max-width:520px;width:100%;background:#fff;margin-top:24px;padding:20px;border-radius:16px;box-shadow:0 10px 25px rgba(0,0,0,.08)}
    .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px}
    .title{font-size:18px;font-weight:600}
    .timer-wrap{display:flex;align-items:center;gap:6px}
    .timer{padding:4px 10px;border-radius:999px;background:#111827;color:#fff;font-size:13px}
    .pause-btn{border-radius:999px;border:1px solid #d1d5db;padding:4px 10px;font-size:12px;background:#f9fafb;cursor:pointer}
    .subheader{font-size:12px;color:#6b7280;margin-bottom:10px;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap}
    .badge{display:inline-block;padding:2px 8px;border-radius:999px;background:#e5e7eb;font-size:11px;color:#374151}
    .progress-bar-bg{width:100%;height:6px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-bottom:8px}
    .progress-bar-fill{height:100%;width:0%;background:#3b82f6;transition:width .2s}
    .q-strip{margin-bottom:10px;overflow-x:auto;padding:4px 0}
    .q-strip-inner{display:flex;gap:4px;padding-bottom:2px}
    .qchip{min-width:26px;height:26px;border-radius:999px;border:1px solid #d1d5db;background:#f9fafb;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
    .qchip.answered{background:#dbeafe;border-color:#2563eb;color:#1d4ed8}
    .qchip.current{background:#111827;border-color:#111827;color:#fff}
    .qchip.reviewed{background:rebeccapurple!important;color:#fff!important;border-color:rebeccapurple!important}
    .section-tag{font-size:12px;padding:3px 8px;border-radius:999px;background:#eef2ff;color:#3730a3;display:inline-block;margin-bottom:6px}
    .question-text{font-size:15px;margin-bottom:10px;white-space:pre-line}
    .options{display:grid;gap:8px}
    .option-btn{width:100%;border-radius:999px;padding:9px 14px;border:1px solid #d1d5db;background:#fff;text-align:left;font-size:14px;cursor:pointer}
    .option-btn.selected{background:#2563eb;color:#fff;border-color:#1d4ed8}
    .option-btn.correct{background:#dcfce7;color:#166534;border-color:#16a34a}
    .option-btn.wrong{background:#fee2e2;color:#b91c1c;border-color:#ef4444}
    .footer{margin-top:16px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
    .nav-buttons{display:flex;gap:6px;flex:1}
    .nav-btn,.next-btn{border-radius:999px;padding:9px 12px;border:none;font-size:13px;cursor:pointer}
    .nav-btn{background:#e5e7eb}
    .next-btn{flex:1;background:#111827;color:#fff}
    .result h2{text-align:center}
  </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
/* English Sectional Mock – 13 Minutes */
const TOTAL_TIME = 13 * 60;
const MARKS_CORRECT = 2;
const MARKS_WRONG = -0.5;
const QUESTIONS = [
{
  q: "Identify the part of the sentence that contains a grammatical error.\nThe team’s success was largely a result of its coach’s dedication, a fact which they would all attest to.",
  options: [
    "The team’s success was largely",
    "a result of its coach’s dedication",
    "a fact which they would all",
    "attest to"
  ],
  answer: 2
},
{
  q: "Identify the part of the sentence that contains a grammatical error.\nHe has been to Italy, but he didn’t went to Rome.",
  options: [
    "He has been",
    "to Italy",
    "but he",
    "didn’t went to Rome"
  ],
  answer: 3
},
{
  q: "Fill in the blank with the most appropriate preposition.\nThe report was submitted ___ the deadline, ensuring full compliance.",
  options: [
    "beyond",
    "under",
    "before",
    "between"
  ],
  answer: 2
},
{
  q: "Fill in the blank with the most appropriate conjunction.\nThe software update enhanced performance; ___ it introduced several compatibility issues.",
  options: [
    "nevertheless",
    "consequently",
    "likewise",
    "whereas"
  ],
  answer: 0
},
{
  q: "Choose the correctly spelt word.",
  options: [
    "Arrain",
    "Arragin",
    "Arraign",
    "Arrign"
  ],
  answer: 2
},
{
  q: "Which of the following sentences uses the word “bow” with the same meaning as in the sentence below?\n“The performer took a deep bow to thank the audience.”",
  options: [
    "She carefully tied the ribbon into a perfect bow.",
    "He used the strong fishing line to make a tight bow.",
    "The small gift was decorated with a large red bow.",
    "The children were taught to bow to the queen as a sign of respect."
  ],
  answer: 3
},
{
  q: "Choose the correctly spelt word.",
  options: [
    "Curable",
    "Curible",
    "Qurable",
    "Cureable"
  ],
  answer: 0
},
{
  q: "Passage for Q8–Q12\nThe fundamental and existential threat posed by the unparalleled proliferation of digital surveillance capabilities to democracy’s foundational tenets is a clear contradiction between the demands of modern security and the ideals of individual liberty. It is now concretely known whether these technologies are compromising civil freedoms, rather than just an abstract theory. Facial recognition, bulk collection of data, and algorithmic tracking of online activity give governments and corporations the ability to exercise constant, detailed surveillance over the lives of citizens. All-encompassing surveillance has the potential to have a “chilling effect,” where citizens, aware of being spied upon, might censor themselves, restrict their activism, and refrain from articulating dissenting views, thus suppressing the very dissent and freedom of expression that are core to a healthy democracy. The possibility of using these tools for political repression, social control, and targeting marginalised communities poses a sinister downward slide toward a surveillance state where the assumption of innocence gives way to an assumption of suspicion.\nThe underlying conflict, then, is how to balance personal privacy against national security. Although there is a genuine need for governments to employ sophisticated technologies to respond to terrorism, organised crime, and other grave dangers, this must not be at the cost of the basic right to privacy. A good balance is a strong and open legal regime that subjects surveillance activities to rigorous judicial supervision and public accountability. Since technologies like end-to-end encryption are essential for protecting private communication, they should be supported and encouraged rather than compromised.\nWhat is the central contradiction discussed in the passage regarding digital surveillance?",
  options: [
    "The need for transparency vs. secrecy",
    "The conflict between technological progress and personal privacy",
    "The desire for security vs. the rights of corporations",
    "The trade-off between national security and individual freedom"
  ],
  answer: 3
},
{
  q: "According to the passage, what is a potential consequence of all-encompassing surveillance?",
  options: [
    "Increased political freedom",
    "Suppression of dissent and freedom of expression",
    "Enhanced transparency in government operations",
    "A reduction in government oversight"
  ],
  answer: 1
},
{
  q: "What does the passage suggest is necessary to protect citizens’ privacy while maintaining national security?",
  options: [
    "Total cessation of surveillance",
    "A balanced legal regime with judicial supervision and public accountability",
    "Limiting technology to only military applications",
    "Complete transparency in government surveillance activities"
  ],
  answer: 1
},
{
  q: "How does the passage describe the use of surveillance technologies by governments and corporations?",
  options: [
    "A beneficial tool for national security only",
    "A means of societal control and political repression",
    "A tool for promoting freedom of expression",
    "A neutral force with no impact on privacy"
  ],
  answer: 1
},
{
  q: "In the passage, the word “chilling” most nearly means:",
  options: [
    "Exciting",
    "Harmless",
    "Intimidating",
    "Invigorating"
  ],
  answer: 2
},
{
  q: "Choose the correct meaning of the idiom: Fringe benefits",
  options: [
    "A secret advantage",
    "Extra perks beyond a regular salary",
    "The basic salary before taxes",
    "The minimal legal benefits"
  ],
  answer: 1
},
{
  q: "Choose the correct meaning of the idiom: A wild goose chase",
  options: [
    "A fun adventure",
    "A futile or hopeless pursuit",
    "A risky task",
    "A misleading journey"
  ],
  answer: 1
},
{
  q: "Select the most appropriate antonym of the word: Tacit",
  options: [
    "Implicit",
    "Unstated",
    "Explicit",
    "Understood"
  ],
  answer: 2
},
{
  q: "Choose the correct one-word substitute for:\nA medicine or other substance that has a calming or soothing effect",
  options: [
    "Sedative",
    "Stimulant",
    "Analgesic",
    "Antibiotic"
  ],
  answer: 0
},
{
  q: "Select the most appropriate antonym of the word: Felicitus",
  options: [
    "Fortunate",
    "Unfortunate",
    "Happy",
    "Appropriate"
  ],
  answer: 1
},
{
  q: "Choose the correct one-word substitute for:\nA person who believes that the world is controlled by the power of the stars",
  options: [
    "Astrologer",
    "Astronomer",
    "Clairvoyant",
    "Meteorologist"
  ],
  answer: 0
},
{
  q: "Change the following sentence into the Active form.\nThe old castle was believed to have been built by a legendary king.",
  options: [
    "A legendary king built the old castle, it was believed.",
    "People believed that a legendary king had built the old castle.",
    "The old castle had been built by a legendary king, it was believed.",
    "A legendary king was believed to have built the old castle."
  ],
  answer: 1
},
{
  q: "Select the option that expresses the given sentence in indirect voice.\n“Who is singing so beautifully?” the judge asked.",
  options: [
    "The judge asked who was singing so beautifully.",
    "The judge asked who is singing so beautifully.",
    "The judge asked who had been singing so beautifully.",
    "The judge asked who singing so beautifully was."
  ],
  answer: 0
},
{
  q: "Choose the most suitable option to replace the highlighted part of the sentence.\nForty lakhs are the amount one needs in order to pursue overseas education.",
  options: [
    "Forty lakhs is the amount",
    "Forty lakh were the amount",
    "Forty lakhs have the amount",
    "Forty lakhs has the amount"
  ],
  answer: 0
},
{
  q: "Choose the correct passive voice transformation of the sentence.\nThe dedicated researchers have already published the groundbreaking findings in a prestigious scientific journal.",
  options: [
    "The groundbreaking findings were already published in a prestigious scientific journal by the dedicated researchers.",
    "The groundbreaking findings have already been published in a prestigious scientific journal by the dedicated researchers.",
    "The groundbreaking findings have already published in a prestigious scientific journal by the dedicated researchers.",
    "The groundbreaking findings are already published in a prestigious scientific journal by the dedicated researchers."
  ],
  answer: 1
},
{
  q: "Select the option that expresses the given sentence in direct voice.\nThe historian asserted that the ruins were much older than previously thought and that new research had been continually proving it for years.",
  options: [
    "The historian said, “The ruins were much older than previously thought, and new research has been continually proving it for years.”",
    "The historian said, “The ruins are much older than previously thought, and new research has been continually proving it for years.”",
    "The historian said, “The ruins were much older than previously thought, and new research had been continually proving it for years.”",
    "The historian said, “The ruins were much older than previously thought, and new research had continually proved it for years.”"
  ],
  answer: 0
},
{
  q: "Rearrange the following sentences to form a meaningful and grammatically correct paragraph.\nP. He spent his days in the lab, carefully scanning samples under a microscope.\nQ. Dr. Alistair Finch was an accomplished biologist who specialized in the discovery of new species.\nR. His peers would tease him that he looked more upon the microbial world than the actual one.\nS. His greatest find was from a small, ordinary pond deep in the Amazon rainforest.",
  options: [
    "QPRS",
    "PQRS",
    "PRQS",
    "RPSQ"
  ],
  answer: 0
},
{
  q: "Rearrange the following sentences to form a meaningful and grammatically correct paragraph.\nP. She repeatedly listened to the song, taking in its passion and rhythm.\nQ. She made a sequence of motions and connected them to form a smooth flow.\nR. Her artistic vision was brought to the stage by the dancers, who executed the work brilliantly.\nS. She taught the dance to her troupe, refining each step and making sure every moment was synchronized.",
  options: [
    "RQSP",
    "SQPR",
    "RQSP",
    "PQSR"
  ],
  answer: 3
}
];
// State    
let currentIndex = 0;    
let answers = new Array(QUESTIONS.length).fill(null);     
let reviewed = new Array(QUESTIONS.length).fill(false); // mark-for-review flags    
let timeLeft = TOTAL_TIME;    
let timerId = null;    
let submitted = false;    
let isPaused = false;    
let reviewMode = false; // true when user is viewing a single question from analysis    
const app = document.getElementById("app");    

function formatTime(sec){ 
  const m = Math.floor(sec/60), s = sec%60; 
  return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"00")}`; 
}    

function getStats(){    
  const s = { total: QUESTIONS.length, attempted:0, correct:0, wrong:0, marks:0 };    
  QUESTIONS.forEach((q,i)=>{    
    const a = answers[i];    
    if (a !== null){    
      s.attempted++;    
      if (a === q.answer){ s.correct++; s.marks += MARKS_CORRECT; }    
      else { s.wrong++; s.marks += MARKS_WRONG; }    
    }    
  });    
  return s;    
}    

function renderQuestion(){    
  if (reviewMode) isPaused = true;    
  if (submitted && !reviewMode){ renderResult(); return; }    

  const q = QUESTIONS[currentIndex];    
  const progressPercent = ((currentIndex+1)/QUESTIONS.length)*100;    
  const selected = answers[currentIndex];    

  const stripHtml = QUESTIONS.map((_,idx)=>{    
    let cls = "qchip";    
    if (idx===currentIndex) cls += " current";    
    if (answers[idx] !== null) cls += " answered";    
    if (reviewed[idx]) cls += " reviewed";    
    return `<button class="${cls}" data-q="${idx}">${idx+1}</button>`;    
  }).join("");    

  app.innerHTML = `    
    <div class="header">    
      <div class="title">English Sectional Mock</div>    
      <div class="timer-wrap">    
        <div class="timer">⏱ ${formatTime(timeLeft)}</div>    
        <button class="pause-btn" id="pauseBtn">${isPaused ? "Resume":"Pause"}</button>    
      </div>    
    </div>    

    <div class="subheader">    
      <span>+${MARKS_CORRECT} for correct, ${MARKS_WRONG} for wrong</span>    
      <span class="badge">English</span>    
    </div>    

    <div class="progress-bar-bg">
      <div class="progress-bar-fill" style="width:${progressPercent}%"></div>
    </div>    

    <div class="q-strip">
      <div class="q-strip-inner">${stripHtml}</div>
    </div>    

    <div class="section-tag">English</div>    

    <div class="question-text">Q${currentIndex+1}. ${q.q}</div>    

    <div class="options">    
      ${q.options.map((opt,idx)=>{    
        let classes = "";    
        if (selected === idx && !reviewMode) classes = "selected";    
        if (reviewMode){    
          if (idx === q.answer) classes = "correct";    
          else if (selected === idx && selected !== q.answer) classes = "wrong";    
        } else {    
          if (selected === idx) classes = "selected";    
        }    
        return `<button class="option-btn ${classes}" data-index="${idx}">${String.fromCharCode(65+idx)}. ${opt}</button>`;    
      }).join("")}    
    </div>    

    <div class="footer">    
      <div class="question-count">Question ${currentIndex+1} of ${QUESTIONS.length}</div>    
      <div class="nav-buttons">    
        <button class="nav-btn" id="prevBtn"${currentIndex===0 ? " disabled":""}>Prev</button>    
        ${ reviewMode ? `<button class="back-btn" id="backAnalysis">Back to Analysis</button>` : "" }    
        <button class="nav-btn" id="markBtn">Mark</button>    
        <button class="next-btn" id="nextBtn">${currentIndex+1===QUESTIONS.length? "Submit":"Next"}</button>    
      </div>    
    </div>    
  `;    

  document.getElementById("pauseBtn").addEventListener("click", ()=>{    
    if (reviewMode){ isPaused = true; renderQuestion(); return; }    
    isPaused = !isPaused;    
    renderQuestion();    
  });    

  document.querySelectorAll(".qchip").forEach(b=>{    
    b.addEventListener("click", ()=>{ 
      currentIndex = Number(b.dataset.q); 
      reviewMode = false; 
      renderQuestion(); 
    });    
  });    

  document.querySelectorAll(".option-btn").forEach(b=>{    
    b.addEventListener("click", ()=>{    
      const idx = Number(b.dataset.index);    
      if (reviewMode) return;    
      answers[currentIndex] = idx;    
      renderQuestion();    
    });    
  });    

  document.getElementById("prevBtn").addEventListener("click", ()=>{    
    if (currentIndex>0){ currentIndex--; reviewMode = false; renderQuestion(); }    
  });    

  document.getElementById("nextBtn").addEventListener("click", ()=>{    
    if (currentIndex+1 < QUESTIONS.length){ currentIndex++; reviewMode = false; renderQuestion(); }    
    else { submitted = true; reviewMode = false; renderResult(); }    
  });    

  const markBtnEl = document.getElementById('markBtn');    
  if (markBtnEl){    
    markBtnEl.addEventListener('click', ()=>{    
      reviewed[currentIndex] = !reviewed[currentIndex];    
      markBtnEl.textContent = reviewed[currentIndex] ? 'Marked' : 'Mark';    
      renderQuestion();    
    });    
  }    

  const back = document.getElementById("backAnalysis");    
  if (back){    
    back.addEventListener("click", ()=>{    
      reviewMode = false;    
      submitted = true;    
      renderResult();    
    });    
  }    
}    

function renderResult(){    
  if (timerId){ clearInterval(timerId); timerId = null; }    
  const s = getStats();    
  const maxMarks = s.total * MARKS_CORRECT;    
  const percentage = maxMarks>0 ? Math.round((s.marks/maxMarks)*100):0;    
  let remark = percentage>=80 ? "Excellent! 💯"
             : percentage>=60 ? "Good! 👍"
             : percentage>=40 ? "Average. Can improve 🙂"
             : "Needs more practice 💪";    

  let qaHtml = "";    
  QUESTIONS.forEach((q,i)=>{    
    const user = answers[i];    
    const correctIdx = q.answer;    
    const isSkipped = user === null;    
    const isCorrect = !isSkipped && user === correctIdx;    
    const pill = isSkipped ? `<span class="pill-gray">Skipped</span>` 
               : isCorrect ? `<span class="pill-green">Correct</span>` 
               : `<span class="pill-red">Wrong</span>`;    

    const userText = isSkipped ? "<em>Skipped</em>" : `${String.fromCharCode(65+user)}. ${q.options[user]}`;    
    const correctText = `${String.fromCharCode(65+correctIdx)}. ${q.options[correctIdx]}`;    

    qaHtml += `    
      <div class="qa-card" id="qa-${i}">    
        <div class="qa-question"><strong>Q${i+1}.</strong> ${q.q}</div>    
        <div class="qa-answer-row">    
          <div><span class="label">Your answer:</span> ${userText}</div>    
          <div><span class="label">Correct answer:</span> ${correctText}</div>    
          <div style="margin-left:auto">${pill}</div>    
        </div>    
        <div style="margin-top:8px;text-align:right">    
          <button class="review-btn" data-q="${i}">Review Q</button>    
        </div>    
      </div>    
    `;    
  });    

  app.innerHTML = `    
    <div class="result">    
      <h2>English Section Analysis</h2>    
      <div class="tiny">9-minute sectional mock completed</div>    

      <div class="card">    
        <div class="card-title">Overall Performance</div>    
        <div class="stat-row"><span>Total Questions</span><span>${s.total}</span></div>    
        <div class="stat-row"><span>Attempted</span><span>${s.attempted}</span></div>    
        <div class="stat-row"><span>Correct</span><span>${s.correct}</span></div>    
        <div class="stat-row"><span>Wrong</span><span>${s.wrong}</span></div>    
        <div class="stat-row"><span>Marks</span><span>${s.marks.toFixed(2)} / ${maxMarks}</span></div>    
        <div class="stat-row"><span>Percentage</span><span>${percentage}%</span></div>    
        <div class="stat-row"><span>Remark</span><span>${remark}</span></div>    
      </div>    

      <div style="margin-top:8px;margin-bottom:8px">    
        <div class="card-title">Question-wise Review</div>    
        ${qaHtml}    
      </div>    

      <button class="restart-btn" id="restartBtn">Retake Section</button>    
      <div class="tiny">Timer will restart from 9 minutes</div>    
    </div>    
  `;    

  document.querySelectorAll(".review-btn").forEach(b=>{    
    b.addEventListener("click", ()=>{    
      const idx = Number(b.dataset.q);    
      currentIndex = idx;    
      reviewMode = true;    
      submitted = false;    
      isPaused = true;    
      renderQuestion();    
    });    
  });    

  document.getElementById("restartBtn").addEventListener("click", ()=>{    
    currentIndex = 0;    
    answers = new Array(QUESTIONS.length).fill(null);    
    timeLeft = TOTAL_TIME;    
    submitted = false;    
    isPaused = false;    
    reviewMode = false;    
    startTimer();    
    renderQuestion();    
  });    
}    

function startTimer(){    
  if (timerId) clearInterval(timerId);    
  timerId = setInterval(()=>{    
    if (!isPaused && !submitted && !reviewMode){    
      timeLeft--;    
      if (timeLeft <= 0){    
        submitted = true;    
        reviewMode = false;    
        renderResult();    
        return;    
      }    
    }    
    const el = document.querySelector(".timer");    
    if (el) el.textContent = "⏱ " + formatTime(timeLeft);    
  }, 1000);    
}    

startTimer();    
renderQuestion();
</script>  </body>    </html>
