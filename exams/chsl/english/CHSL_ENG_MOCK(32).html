<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>English Sectional Mock</title>
  <style>
    *{box-sizing:border-box;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    body{margin:0;background:#f3f4f6;display:flex;justify-content:center;padding:16px}
    .container{max-width:520px;width:100%;background:#fff;margin-top:24px;padding:20px;border-radius:16px;box-shadow:0 10px 25px rgba(0,0,0,.08)}
    .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px}
    .title{font-size:18px;font-weight:600}
    .timer-wrap{display:flex;align-items:center;gap:6px}
    .timer{padding:4px 10px;border-radius:999px;background:#111827;color:#fff;font-size:13px}
    .pause-btn{border-radius:999px;border:1px solid #d1d5db;padding:4px 10px;font-size:12px;background:#f9fafb;cursor:pointer}
    .subheader{font-size:12px;color:#6b7280;margin-bottom:10px;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap}
    .badge{display:inline-block;padding:2px 8px;border-radius:999px;background:#e5e7eb;font-size:11px;color:#374151}
    .progress-bar-bg{width:100%;height:6px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-bottom:8px}
    .progress-bar-fill{height:100%;width:0%;background:#3b82f6;transition:width .2s}
    .q-strip{margin-bottom:10px;overflow-x:auto;padding:4px 0}
    .q-strip-inner{display:flex;gap:4px;padding-bottom:2px}
    .qchip{min-width:26px;height:26px;border-radius:999px;border:1px solid #d1d5db;background:#f9fafb;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
    .qchip.answered{background:#dbeafe;border-color:#2563eb;color:#1d4ed8}
    .qchip.current{background:#111827;border-color:#111827;color:#fff}
    .qchip.reviewed{background:rebeccapurple!important;color:#fff!important;border-color:rebeccapurple!important}
    .section-tag{font-size:12px;padding:3px 8px;border-radius:999px;background:#eef2ff;color:#3730a3;display:inline-block;margin-bottom:6px}
    .question-text{font-size:15px;margin-bottom:10px;white-space:pre-line}
    .options{display:grid;gap:8px}
    .option-btn{width:100%;border-radius:999px;padding:9px 14px;border:1px solid #d1d5db;background:#fff;text-align:left;font-size:14px;cursor:pointer}
    .option-btn.selected{background:#2563eb;color:#fff;border-color:#1d4ed8}
    .option-btn.correct{background:#dcfce7;color:#166534;border-color:#16a34a}
    .option-btn.wrong{background:#fee2e2;color:#b91c1c;border-color:#ef4444}
    .footer{margin-top:16px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
    .nav-buttons{display:flex;gap:6px;flex:1}
    .nav-btn,.next-btn{border-radius:999px;padding:9px 12px;border:none;font-size:13px;cursor:pointer}
    .nav-btn{background:#e5e7eb}
    .next-btn{flex:1;background:#111827;color:#fff}
    .result h2{text-align:center}
  </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
/* English Sectional Mock – 13 Minutes */
const TOTAL_TIME = 13 * 60;
const MARKS_CORRECT = 2;
const MARKS_WRONG = -0.5;
const QUESTIONS = [
  {
    q: "Choose the option which is similar in meaning to the underlined word.\nIt’s incredible to see him in such good health after the accident.",
    options: ["Unimaginable", "Unremarkable", "Apparent", "Unacceptable"],
    answer: 0
  },
  {
    q: "Choose the correct option to give a one-word substitution for the sentence given.\nA person who does not drink any alcohol.",
    options: ["Teetotaler", "Non-drinker", "Beverages man", "Tougher"],
    answer: 0
  },
  {
    q: "Choose the one-word substitute for the below sentence.\nRavi marvelled at the diverse forms of life, including animals and plants, thriving in aquatic habitats.",
    options: ["Terrestrial", "Aquatic", "Arboreal", "Polar"],
    answer: 1
  },
  {
    q: "Identify the grammatical error in the sentence below.\nAmazon Prime Day is going to kick up the holiday season and holiday shopping for many consumers.",
    options: [
      "going to kick up",
      "for many consumers",
      "up the holiday season",
      "holiday season and holiday shopping"
    ],
    answer: 0
  },
  {
    q: "Choose the correctly spelt word:",
    options: ["Accelerate", "Accellerate", "Accelarate", "Accellrate"],
    answer: 0
  },
  {
    q: "Choose the best option to replace the underlined part to improve the given sentence.\nThe villagers are suffering by a shortage of clean water.",
    options: ["suffering in", "suffering from", "suffering with", "No substitution"],
    answer: 1
  },
  {
    q: "Choose the best option to replace the underlined part to improve the given sentence.\nWe need to focus in finding a sustainable solution.",
    options: ["focus to", "focus at", "focus on", "No substitution"],
    answer: 2
  },
  {
    q: "From the alternatives given below, select the correct passive voice of the following sentence.\nThe shopkeeper must have misguided the customers to purchase the faulty watches.",
    options: [
      "The customers must be misguided by the shopkeeper to purchase the faulty watches.",
      "The customers must have been misguided by the shopkeeper to purchase the faulty watches.",
      "The customers must have been misguided by the shopkeeper to have purchased the faulty watches.",
      "The customers must have been misguided by the shopkeeper to be purchasing the faulty watches."
    ],
    answer: 1
  },
  {
    q: "Choose the correct indirect narration of the following statement:\nThe farmers said, “It is time to plough our fields as the soil has become damp.”",
    options: [
      "The farmers said that it has been time to plough their fields as the soil had become damp.",
      "The farmers said that it was time to plough their fields as the soil had become damp.",
      "The farmers said that it had been time to plough their fields as the soil had become damp.",
      "The farmers said that it was time to plough their fields as the soil has been damp."
    ],
    answer: 1
  },
  {
    q: "Choose the most suitable preposition from the given options.\nShe is fond ___ classical music.",
    options: ["of", "in", "with", "for"],
    answer: 0
  },
  {
    q: "Select the most appropriate antonym of the word: Garrulous",
    options: ["Quiet", "Reserved", "Shy", "Silent"],
    answer: 1
  },
  {
    q: "Change the following sentence into the Active form.\nThe school building was constructed in 1980.",
    options: [
      "The school building had been constructed in 1980.",
      "Someone constructed the school building in 1980.",
      "The school building constructs in 1980.",
      "Someone is constructing the school building in 1980."
    ],
    answer: 1
  },
  {
    q: "Choose the option that is the most appropriate conversion of the following sentence into Direct Speech.\nShe told me that she had been learning French for three months.",
    options: [
      "She said to me, “I am learning French for three months.”",
      "She said to me, “I have been learning French for three months.”",
      "She said to me, “I had learnt French for three months.”",
      "She said to me, “I learnt French for three months.”"
    ],
    answer: 1
  },
  {
    q: "The following sentence has two blanks. Choose the most suitable set of prepositions.\nThe committee insisted ___ a thorough investigation before proceeding ___ any decision.",
    options: ["in, by", "on, with", "of, to", "to, under"],
    answer: 1
  },
  {
    q: "One of these words is spelt incorrectly. Which one is it?",
    options: ["Bureaucracy", "Millennium", "Seperately", "Consensus"],
    answer: 2
  },
  {
    q: "Select the option that expresses the given sentence in indirect voice.\nHe said, “I spoke with my parents yesterday.”",
    options: [
      "He said that he spoke with his parents the previous day.",
      "He said that he should have spoken with his parents the previous day.",
      "He said that he had spoken with his parents the previous day.",
      "He said that he would speak with his parents the day before."
    ],
    answer: 2
  },
  {
    q: "One of these words is spelt incorrectly. Which one is it?",
    options: ["Ambiguous", "Conscientious", "Irrepressible", "Conviviel"],
    answer: 3
  },
  {
    q: "PASSAGE (for Q18-22)\nOver the past few years, there has been a noticeable surge in gold prices across global and Indian markets. Several factors contribute to this rise, including inflation, geopolitical tensions, fluctuating currency values, and increased consumer demand. However, many financial experts argue that the current hype surrounding gold rates is not entirely based on practical factors but is partly driven by emotional buying and media influence.\nIn India, gold holds cultural and emotional value, especially during weddings and festivals. This emotional attachment often leads to panic buying whenever there’s even a minor increase in prices, further pushing the rates upward. Moreover, with social media platforms constantly updating people about price movements, the perception of scarcity or urgency tends to fuel impulsive investments.\nWhile gold is traditionally considered a “safe haven” asset during uncertain times, experts advise caution. Blindly following the hype can result in financial decisions that may not align with long-term goals. A balanced approach, guided by market research and expert opinion, is more beneficial than reacting to temporary trends.\nWhich is the correct verb tense used in the sentence:\n“There has been a noticeable surge in gold prices…”",
    options: ["Past simple", "Future perfect", "Present perfect", "Past continuous"],
    answer: 2
  },
  {
    q: "Identify the passive voice sentence from the passage.",
    options: [
      "The perception of scarcity fuels investments.",
      "Gold holds cultural value.",
      "Several factors contribute to the rise.",
      "The current hype surrounding gold rates is not entirely based on practical factors."
    ],
    answer: 3
  },
  {
    q: "What does the word “impulsive” most likely mean in the context of the passage?",
    options: ["Well-planned", "Sudden and emotional", "Economical", "Delayed and thoughtful"],
    answer: 1
  },
  {
    q: "What is the meaning of “safe haven” as used in the passage?",
    options: [
      "A dangerous investment",
      "A long-term liability",
      "A secure place to park money during uncertainty",
      "A place to store gold"
    ],
    answer: 2
  },
  {
    q: "According to the passage, what is one reason behind the surge in gold prices besides economic factors?",
    options: [
      "Strict government policies",
      "Increased mining",
      "Emotional buying influenced by cultural traditions",
      "Lack of other investment options"
    ],
    answer: 2
  },
  {
    q: "Rearrange the following sentence parts to form a meaningful paragraph:\nP. He connected the modem to the wall and the wireless router to the modem.\nQ. He followed the setup wizard on his computer, configuring the network’s name and password.\nR. He connected all his devices to the new network, from his phone to his smart TV.\nS. He performed a speed test, confirming his home now had a strong and reliable connection.",
    options: ["S, Q, P, R", "P, Q, R, S", "S, Q, R, P", "Q, R, P, S"],
    answer: 1
  },
  {
    q: "Rearrange the following sentences to form a meaningful paragraph:\nP. A large-scale migration was triggered in 1848 by the discovery of gold in California.\nQ. Prospectors from all over the world were drawn to the promise of immediate fortune.\nR. Few of the “Forty-Niners” did become wealthy.\nS. Towns and communities in the American West proliferated as a result of this migration.",
    options: ["S, Q, R, P", "P, Q, S, R", "Q, P, R, S", "R, Q, P, S"],
    answer: 1
  },
  {
    q: "What is the antonym of “Inevitable”?",
    options: ["Unavoidable", "Preventable", "Inevitable", "Inescapable"],
    answer: 1
  }
];
// State    
let currentIndex = 0;    
let answers = new Array(QUESTIONS.length).fill(null);     
let reviewed = new Array(QUESTIONS.length).fill(false); // mark-for-review flags    
let timeLeft = TOTAL_TIME;    
let timerId = null;    
let submitted = false;    
let isPaused = false;    
let reviewMode = false; // true when user is viewing a single question from analysis    
const app = document.getElementById("app");    

function formatTime(sec){ 
  const m = Math.floor(sec/60), s = sec%60; 
  return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"00")}`; 
}    

function getStats(){    
  const s = { total: QUESTIONS.length, attempted:0, correct:0, wrong:0, marks:0 };    
  QUESTIONS.forEach((q,i)=>{    
    const a = answers[i];    
    if (a !== null){    
      s.attempted++;    
      if (a === q.answer){ s.correct++; s.marks += MARKS_CORRECT; }    
      else { s.wrong++; s.marks += MARKS_WRONG; }    
    }    
  });    
  return s;    
}    

function renderQuestion(){    
  if (reviewMode) isPaused = true;    
  if (submitted && !reviewMode){ renderResult(); return; }    

  const q = QUESTIONS[currentIndex];    
  const progressPercent = ((currentIndex+1)/QUESTIONS.length)*100;    
  const selected = answers[currentIndex];    

  const stripHtml = QUESTIONS.map((_,idx)=>{    
    let cls = "qchip";    
    if (idx===currentIndex) cls += " current";    
    if (answers[idx] !== null) cls += " answered";    
    if (reviewed[idx]) cls += " reviewed";    
    return `<button class="${cls}" data-q="${idx}">${idx+1}</button>`;    
  }).join("");    

  app.innerHTML = `    
    <div class="header">    
      <div class="title">English Sectional Mock</div>    
      <div class="timer-wrap">    
        <div class="timer">⏱ ${formatTime(timeLeft)}</div>    
        <button class="pause-btn" id="pauseBtn">${isPaused ? "Resume":"Pause"}</button>    
      </div>    
    </div>    

    <div class="subheader">    
      <span>+${MARKS_CORRECT} for correct, ${MARKS_WRONG} for wrong</span>    
      <span class="badge">English</span>    
    </div>    

    <div class="progress-bar-bg">
      <div class="progress-bar-fill" style="width:${progressPercent}%"></div>
    </div>    

    <div class="q-strip">
      <div class="q-strip-inner">${stripHtml}</div>
    </div>    

    <div class="section-tag">English</div>    

    <div class="question-text">Q${currentIndex+1}. ${q.q}</div>    

    <div class="options">    
      ${q.options.map((opt,idx)=>{    
        let classes = "";    
        if (selected === idx && !reviewMode) classes = "selected";    
        if (reviewMode){    
          if (idx === q.answer) classes = "correct";    
          else if (selected === idx && selected !== q.answer) classes = "wrong";    
        } else {    
          if (selected === idx) classes = "selected";    
        }    
        return `<button class="option-btn ${classes}" data-index="${idx}">${String.fromCharCode(65+idx)}. ${opt}</button>`;    
      }).join("")}    
    </div>    

    <div class="footer">    
      <div class="question-count">Question ${currentIndex+1} of ${QUESTIONS.length}</div>    
      <div class="nav-buttons">    
        <button class="nav-btn" id="prevBtn"${currentIndex===0 ? " disabled":""}>Prev</button>    
        ${ reviewMode ? `<button class="back-btn" id="backAnalysis">Back to Analysis</button>` : "" }    
        <button class="nav-btn" id="markBtn">Mark</button>    
        <button class="next-btn" id="nextBtn">${currentIndex+1===QUESTIONS.length? "Submit":"Next"}</button>    
      </div>    
    </div>    
  `;    

  document.getElementById("pauseBtn").addEventListener("click", ()=>{    
    if (reviewMode){ isPaused = true; renderQuestion(); return; }    
    isPaused = !isPaused;    
    renderQuestion();    
  });    

  document.querySelectorAll(".qchip").forEach(b=>{    
    b.addEventListener("click", ()=>{ 
      currentIndex = Number(b.dataset.q); 
      reviewMode = false; 
      renderQuestion(); 
    });    
  });    

  document.querySelectorAll(".option-btn").forEach(b=>{    
    b.addEventListener("click", ()=>{    
      const idx = Number(b.dataset.index);    
      if (reviewMode) return;    
      answers[currentIndex] = idx;    
      renderQuestion();    
    });    
  });    

  document.getElementById("prevBtn").addEventListener("click", ()=>{    
    if (currentIndex>0){ currentIndex--; reviewMode = false; renderQuestion(); }    
  });    

  document.getElementById("nextBtn").addEventListener("click", ()=>{    
    if (currentIndex+1 < QUESTIONS.length){ currentIndex++; reviewMode = false; renderQuestion(); }    
    else { submitted = true; reviewMode = false; renderResult(); }    
  });    

  const markBtnEl = document.getElementById('markBtn');    
  if (markBtnEl){    
    markBtnEl.addEventListener('click', ()=>{    
      reviewed[currentIndex] = !reviewed[currentIndex];    
      markBtnEl.textContent = reviewed[currentIndex] ? 'Marked' : 'Mark';    
      renderQuestion();    
    });    
  }    

  const back = document.getElementById("backAnalysis");    
  if (back){    
    back.addEventListener("click", ()=>{    
      reviewMode = false;    
      submitted = true;    
      renderResult();    
    });    
  }    
}    

function renderResult(){    
  if (timerId){ clearInterval(timerId); timerId = null; }    
  const s = getStats();    
  const maxMarks = s.total * MARKS_CORRECT;    
  const percentage = maxMarks>0 ? Math.round((s.marks/maxMarks)*100):0;    
  let remark = percentage>=80 ? "Excellent! 💯"
             : percentage>=60 ? "Good! 👍"
             : percentage>=40 ? "Average. Can improve 🙂"
             : "Needs more practice 💪";    

  let qaHtml = "";    
  QUESTIONS.forEach((q,i)=>{    
    const user = answers[i];    
    const correctIdx = q.answer;    
    const isSkipped = user === null;    
    const isCorrect = !isSkipped && user === correctIdx;    
    const pill = isSkipped ? `<span class="pill-gray">Skipped</span>` 
               : isCorrect ? `<span class="pill-green">Correct</span>` 
               : `<span class="pill-red">Wrong</span>`;    

    const userText = isSkipped ? "<em>Skipped</em>" : `${String.fromCharCode(65+user)}. ${q.options[user]}`;    
    const correctText = `${String.fromCharCode(65+correctIdx)}. ${q.options[correctIdx]}`;    

    qaHtml += `    
      <div class="qa-card" id="qa-${i}">    
        <div class="qa-question"><strong>Q${i+1}.</strong> ${q.q}</div>    
        <div class="qa-answer-row">    
          <div><span class="label">Your answer:</span> ${userText}</div>    
          <div><span class="label">Correct answer:</span> ${correctText}</div>    
          <div style="margin-left:auto">${pill}</div>    
        </div>    
        <div style="margin-top:8px;text-align:right">    
          <button class="review-btn" data-q="${i}">Review Q</button>    
        </div>    
      </div>    
    `;    
  });    

  app.innerHTML = `    
    <div class="result">    
      <h2>English Section Analysis</h2>    
      <div class="tiny">9-minute sectional mock completed</div>    

      <div class="card">    
        <div class="card-title">Overall Performance</div>    
        <div class="stat-row"><span>Total Questions</span><span>${s.total}</span></div>    
        <div class="stat-row"><span>Attempted</span><span>${s.attempted}</span></div>    
        <div class="stat-row"><span>Correct</span><span>${s.correct}</span></div>    
        <div class="stat-row"><span>Wrong</span><span>${s.wrong}</span></div>    
        <div class="stat-row"><span>Marks</span><span>${s.marks.toFixed(2)} / ${maxMarks}</span></div>    
        <div class="stat-row"><span>Percentage</span><span>${percentage}%</span></div>    
        <div class="stat-row"><span>Remark</span><span>${remark}</span></div>    
      </div>    

      <div style="margin-top:8px;margin-bottom:8px">    
        <div class="card-title">Question-wise Review</div>    
        ${qaHtml}    
      </div>    

      <button class="restart-btn" id="restartBtn">Retake Section</button>    
      <div class="tiny">Timer will restart from 9 minutes</div>    
    </div>    
  `;    

  document.querySelectorAll(".review-btn").forEach(b=>{    
    b.addEventListener("click", ()=>{    
      const idx = Number(b.dataset.q);    
      currentIndex = idx;    
      reviewMode = true;    
      submitted = false;    
      isPaused = true;    
      renderQuestion();    
    });    
  });    

  document.getElementById("restartBtn").addEventListener("click", ()=>{    
    currentIndex = 0;    
    answers = new Array(QUESTIONS.length).fill(null);    
    timeLeft = TOTAL_TIME;    
    submitted = false;    
    isPaused = false;    
    reviewMode = false;    
    startTimer();    
    renderQuestion();    
  });    
}    

function startTimer(){    
  if (timerId) clearInterval(timerId);    
  timerId = setInterval(()=>{    
    if (!isPaused && !submitted && !reviewMode){    
      timeLeft--;    
      if (timeLeft <= 0){    
        submitted = true;    
        reviewMode = false;    
        renderResult();    
        return;    
      }    
    }    
    const el = document.querySelector(".timer");    
    if (el) el.textContent = "⏱ " + formatTime(timeLeft);    
  }, 1000);    
}    

startTimer();    
renderQuestion();
</script>  </body>    </html>
