<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>English Sectional Mock</title>
  <style>
    *{box-sizing:border-box;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    body{margin:0;background:#f3f4f6;display:flex;justify-content:center;padding:16px}
    .container{max-width:520px;width:100%;background:#fff;margin-top:24px;padding:20px;border-radius:16px;box-shadow:0 10px 25px rgba(0,0,0,.08)}
    .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px}
    .title{font-size:18px;font-weight:600}
    .timer-wrap{display:flex;align-items:center;gap:6px}
    .timer{padding:4px 10px;border-radius:999px;background:#111827;color:#fff;font-size:13px}
    .pause-btn{border-radius:999px;border:1px solid #d1d5db;padding:4px 10px;font-size:12px;background:#f9fafb;cursor:pointer}
    .subheader{font-size:12px;color:#6b7280;margin-bottom:10px;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap}
    .badge{display:inline-block;padding:2px 8px;border-radius:999px;background:#e5e7eb;font-size:11px;color:#374151}
    .progress-bar-bg{width:100%;height:6px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-bottom:8px}
    .progress-bar-fill{height:100%;width:0%;background:#3b82f6;transition:width .2s}
    .q-strip{margin-bottom:10px;overflow-x:auto;padding:4px 0}
    .q-strip-inner{display:flex;gap:4px;padding-bottom:2px}
    .qchip{min-width:26px;height:26px;border-radius:999px;border:1px solid #d1d5db;background:#f9fafb;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
    .qchip.answered{background:#dbeafe;border-color:#2563eb;color:#1d4ed8}
    .qchip.current{background:#111827;border-color:#111827;color:#fff}
    .qchip.reviewed{background:rebeccapurple!important;color:#fff!important;border-color:rebeccapurple!important}
    .section-tag{font-size:12px;padding:3px 8px;border-radius:999px;background:#eef2ff;color:#3730a3;display:inline-block;margin-bottom:6px}
    .question-text{font-size:15px;margin-bottom:10px;white-space:pre-line}
    .options{display:grid;gap:8px}
    .option-btn{width:100%;border-radius:999px;padding:9px 14px;border:1px solid #d1d5db;background:#fff;text-align:left;font-size:14px;cursor:pointer}
    .option-btn.selected{background:#2563eb;color:#fff;border-color:#1d4ed8}
    .option-btn.correct{background:#dcfce7;color:#166534;border-color:#16a34a}
    .option-btn.wrong{background:#fee2e2;color:#b91c1c;border-color:#ef4444}
    .footer{margin-top:16px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
    .nav-buttons{display:flex;gap:6px;flex:1}
    .nav-btn,.next-btn{border-radius:999px;padding:9px 12px;border:none;font-size:13px;cursor:pointer}
    .nav-btn{background:#e5e7eb}
    .next-btn{flex:1;background:#111827;color:#fff}
    .result h2{text-align:center}
  </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
/* English Sectional Mock – 13 Minutes */
const TOTAL_TIME = 13 * 60;
const MARKS_CORRECT = 2;
const MARKS_WRONG = -0.5;
const QUESTIONS = [
  {
    q: "Choose the correct option to fill in the blank in the sentence given.\nWhen filling out admission forms, it is ____ to fill up our complete names and date of birth.",
    options: ["mandatory", "voluntary", "optional", "discretionary"],
    answer: 0
  },
  {
    q: "Select the alternative which best expresses the meaning of idioms/phrases.\nAt sixes and sevens",
    options: [
      "If someone is anxious before sitting an examination",
      "If someone is in depression",
      "If someone is in a state of confusion",
      "If someone is super happy"
    ],
    answer: 2
  },
  {
    q: "Choose the option that has an error in the sentence.\nOn the plus side, if this development are getting better, the richer nations will benefit.",
    options: [
      "On the plus side,",
      "if this development are getting better,",
      "the richer nations will benefit.",
      "No correction required"
    ],
    answer: 1
  },
  {
    q: "Examine the given sentence and pick out the error.\nIn order to give up the mental depression and stress (1) adapting meditation, yoga or (2) similar other methods (3) can be helped (4).",
    options: [
      "adapting meditation, yoga or",
      "can be helped",
      "in order to give up the mental depression and stress",
      "similar other methods"
    ],
    answer: 1
  },
  {
    q: "Fill in the blank with the most appropriate preposition:\nThe proposal was rejected ____ grounds of insufficient evidence.",
    options: ["by", "on", "in", "under"],
    answer: 1
  },
  {
    q: "Choose the odd one out.",
    options: ["Knight", "Night", "Nite", "Knit"],
    answer: 1
  },
  {
    q: "Choose the correctly spelt word:",
    options: ["Facsimile", "Facsmile", "Facsimily", "Facsimele"],
    answer: 0
  },
  {
    q: "Choose the best option to replace the underlined part to improve the given sentence.\nThe two sisters decided to divide the stolen money among themselves.",
    options: [
      "into themselves",
      "between themselves",
      "for themselves",
      "No substitution"
    ],
    answer: 2
  },
  {
    q: "Choose the best option to replace the underlined part to improve the given sentence.\nI knew you were cut out on a career in finance due to your sharp analytical skills.",
    options: ["Cut out of", "Cut down to", "Cut out for", "No substitution"],
    answer: 2
  },
  {
    q: "From the alternatives given below, select the correct passive voice of the following sentence.\nThe strong current of the river broke through the wall of the earthen dam within no time.",
    options: [
      "The wall of the earthen dam was broken within no time by the strong current of the river.",
      "The wall of the earthen dam was broken through within no time by the strong current of the river.",
      "The wall of the earthen dam had broken through within no time by the strong current of the river.",
      "The wall of the earthen dam had been broken through within no time by the strong current of the river."
    ],
    answer: 1
  },
  {
    q: "Choose the option that is the most appropriate conversion of the following sentence into Active Voice.\nThe mystery had never been solved by anyone before the detective arrived.",
    options: [
      "No one never solved the mystery before the detective arrived.",
      "No one had solved the mystery before the detective arrived.",
      "No one solves the mystery before the detective arrived.",
      "No one has solved the mystery before the detective arrived."
    ],
    answer: 1
  },
  {
    q: "Choose the correct indirect narration of the following statement:\nSairam said, “She has to come to Delhi to me within the next couple of hours to take help to solve the problem she mentioned.”",
    options: [
      "Sairam said that she had to come to Delhi to her within the following couple of hours to take help to solve the problem she had mentioned.",
      "Sairam said that she had to go to Delhi to him within the next couple of hours to bring help to solve the problem she had mentioned.",
      "Sairam said that she has to go to Delhi to him within the next couple of hours to take help to solve the problem she mentioned.",
      "Sairam said that she had to go to Delhi to him within the following couple of hours to take help to solve the problem she had mentioned."
    ],
    answer: 3
  },
  {
    q: "Choose the option that is the most appropriate conversion of the following sentence into Direct Speech.\nHe exclaimed with regret that he had forgotten his wallet at home.",
    options: [
      "He exclaimed, “Hey! I had forgotten my wallet at home.”",
      "He said, “Oh no! I have forgotten my wallet at home.”",
      "He exclaimed, “Ah! I have forgot my wallet at home.”",
      "He said, “I regret I have forgotten my wallet at home.”"
    ],
    answer: 1
  },
  {
    q: "The following sentence has two blanks. Choose the most suitable set of prepositions from the given options.\nThe politician distanced himself ____ the scandal and shifted blame ____ his aides.",
    options: ["off, to", "from, onto", "with, over", "by, upon"],
    answer: 1
  },
  {
    q: "Choose the option that is the most appropriate conversion of the following sentence into Direct Speech.\nShe told the detective that she had been sleeping when the thieves had broken in.",
    options: [
      "She said to the detective, “I had slept when the thieves had broken in.”",
      "She said to the detective, “I had slept when the thieves had broken in.”",
      "She told the detective, “I had been sleeping when the thieves broke in.”",
      "She told the detective, “I had been asleep when the thieves were breaking in.”"
    ],
    answer: 2
  },
  {
    q: "Change the following sentence into the Active form.\nThe groundbreaking quantum theory should not have been dismissed as mere speculation by the scientific community.",
    options: [
      "The scientific community should not have been dismissing the groundbreaking quantum theory as mere speculation.",
      "The scientific community should not have dismissed the groundbreaking quantum theory as mere speculation.",
      "The groundbreaking quantum theory should not be dismissed as mere speculation by the scientific community.",
      "The scientific community should not be dismissing the groundbreaking quantum theory as mere speculation."
    ],
    answer: 1
  },
  {
    q: "One of these words is spelt incorrectly. Which one is it?",
    options: ["Accommodate", "Recommend", "Occassion", "Discipline"],
    answer: 2
  },
  {
    q: "Choose the correct passive voice transformation of the sentence:\nThey had not finished the project before the deadline.",
    options: [
      "The project was not finished by them before the deadline.",
      "The project has not been finished by them before the deadline.",
      "The project had not been finished by them before the deadline.",
      "The project was not being finished by them before the deadline."
    ],
    answer: 2
  },
  {
    q: "PASSAGE:(for Q19-23)\nEngineering was once considered one of the most prestigious and secure career choices in India. For decades, thousands of students competed fiercely to enter top engineering colleges, believing that a degree would guarantee a stable job and a prosperous future. However, in recent years, this perception has started to change dramatically.\nOne of the main reasons for the decline in scope is the oversaturation of engineering graduates. With hundreds of private colleges producing lakhs of engineers every year, the job market cannot absorb them all. As a result, many graduates remain unemployed or are forced to accept jobs unrelated to their field of study. Additionally, rapid technological changes demand new skills that traditional curriculums often fail to provide, leaving graduates underprepared for modern industry requirements.\nMoreover, industries now prefer candidates with practical knowledge and specialised skills over generic degrees. While there are still opportunities in emerging fields like Artificial Intelligence, Robotics, and Data Science, they require constant upskilling and innovation. Thus, unless the education system reforms its approach and students focus on skill-based learning, the scope for conventional engineering will continue to shrink.\n\nIn the sentence\n“Engineering was once considered one of the most prestigious and secure career choices in India,”\nwhat is the tense of the verb “was considered”?",
    options: ["Present simple", "Past simple", "Past perfect", "Past perfect"],
    answer: 1
  },
  {
    q: "In the sentence:\n“Moreover, industries now prefer candidates with practical knowledge and specialised skills over generic degrees,”\nwhy is the verb “prefer” used and not “prefers”?",
    options: [
      "Because “candidates” is a plural noun",
      "Because “industries” is a plural subject",
      "Because “skills” is uncountable",
      "Because “prefer” is always used with “now”"
    ],
    answer: 1
  },
  {
    q: "Read the passage and answer the following question:\nThe word “oversaturation” means:",
    options: [
      "Shortage of students",
      "Too many graduates for available jobs",
      "Plenty of job opportunities",
      "High salaries for all"
    ],
    answer: 1
  },
  {
    q: "Read the passage and answer the following question:\nThe word “upskilling” means:",
    options: [
      "Reducing skills",
      "Losing knowledge",
      "Improving skills to match new demands",
      "Quitting studies"
    ],
    answer: 2
  },
  {
    q: "According to the passage, what is a major reason for limited scope in engineering today?",
    options: [
      "Lack of students",
      "No technological growth",
      "Too many graduates and outdated education",
      "High salaries for engineers"
    ],
    answer: 2
  },
  {
    q: "What is the antonym of “Turbulent”?",
    options: ["Deceptive", "Humble", "Calm", "Satisfied"],
    answer: 2
  },
  {
    q: "What is the antonym of “Egalitarian”?",
    options: ["Fair", "Biased", "Democratic", "Equitable"],
    answer: 1
  }
];
// State    
let currentIndex = 0;    
let answers = new Array(QUESTIONS.length).fill(null);     
let reviewed = new Array(QUESTIONS.length).fill(false); // mark-for-review flags    
let timeLeft = TOTAL_TIME;    
let timerId = null;    
let submitted = false;    
let isPaused = false;    
let reviewMode = false; // true when user is viewing a single question from analysis    
const app = document.getElementById("app");    

function formatTime(sec){ 
  const m = Math.floor(sec/60), s = sec%60; 
  return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"00")}`; 
}    

function getStats(){    
  const s = { total: QUESTIONS.length, attempted:0, correct:0, wrong:0, marks:0 };    
  QUESTIONS.forEach((q,i)=>{    
    const a = answers[i];    
    if (a !== null){    
      s.attempted++;    
      if (a === q.answer){ s.correct++; s.marks += MARKS_CORRECT; }    
      else { s.wrong++; s.marks += MARKS_WRONG; }    
    }    
  });    
  return s;    
}    

function renderQuestion(){    
  if (reviewMode) isPaused = true;    
  if (submitted && !reviewMode){ renderResult(); return; }    

  const q = QUESTIONS[currentIndex];    
  const progressPercent = ((currentIndex+1)/QUESTIONS.length)*100;    
  const selected = answers[currentIndex];    

  const stripHtml = QUESTIONS.map((_,idx)=>{    
    let cls = "qchip";    
    if (idx===currentIndex) cls += " current";    
    if (answers[idx] !== null) cls += " answered";    
    if (reviewed[idx]) cls += " reviewed";    
    return `<button class="${cls}" data-q="${idx}">${idx+1}</button>`;    
  }).join("");    

  app.innerHTML = `    
    <div class="header">    
      <div class="title">English Sectional Mock</div>    
      <div class="timer-wrap">    
        <div class="timer">⏱ ${formatTime(timeLeft)}</div>    
        <button class="pause-btn" id="pauseBtn">${isPaused ? "Resume":"Pause"}</button>    
      </div>    
    </div>    

    <div class="subheader">    
      <span>+${MARKS_CORRECT} for correct, ${MARKS_WRONG} for wrong</span>    
      <span class="badge">English</span>    
    </div>    

    <div class="progress-bar-bg">
      <div class="progress-bar-fill" style="width:${progressPercent}%"></div>
    </div>    

    <div class="q-strip">
      <div class="q-strip-inner">${stripHtml}</div>
    </div>    

    <div class="section-tag">English</div>    

    <div class="question-text">Q${currentIndex+1}. ${q.q}</div>    

    <div class="options">    
      ${q.options.map((opt,idx)=>{    
        let classes = "";    
        if (selected === idx && !reviewMode) classes = "selected";    
        if (reviewMode){    
          if (idx === q.answer) classes = "correct";    
          else if (selected === idx && selected !== q.answer) classes = "wrong";    
        } else {    
          if (selected === idx) classes = "selected";    
        }    
        return `<button class="option-btn ${classes}" data-index="${idx}">${String.fromCharCode(65+idx)}. ${opt}</button>`;    
      }).join("")}    
    </div>    

    <div class="footer">    
      <div class="question-count">Question ${currentIndex+1} of ${QUESTIONS.length}</div>    
      <div class="nav-buttons">    
        <button class="nav-btn" id="prevBtn"${currentIndex===0 ? " disabled":""}>Prev</button>    
        ${ reviewMode ? `<button class="back-btn" id="backAnalysis">Back to Analysis</button>` : "" }    
        <button class="nav-btn" id="markBtn">Mark</button>    
        <button class="next-btn" id="nextBtn">${currentIndex+1===QUESTIONS.length? "Submit":"Next"}</button>    
      </div>    
    </div>    
  `;    

  document.getElementById("pauseBtn").addEventListener("click", ()=>{    
    if (reviewMode){ isPaused = true; renderQuestion(); return; }    
    isPaused = !isPaused;    
    renderQuestion();    
  });    

  document.querySelectorAll(".qchip").forEach(b=>{    
    b.addEventListener("click", ()=>{ 
      currentIndex = Number(b.dataset.q); 
      reviewMode = false; 
      renderQuestion(); 
    });    
  });    

  document.querySelectorAll(".option-btn").forEach(b=>{    
    b.addEventListener("click", ()=>{    
      const idx = Number(b.dataset.index);    
      if (reviewMode) return;    
      answers[currentIndex] = idx;    
      renderQuestion();    
    });    
  });    

  document.getElementById("prevBtn").addEventListener("click", ()=>{    
    if (currentIndex>0){ currentIndex--; reviewMode = false; renderQuestion(); }    
  });    

  document.getElementById("nextBtn").addEventListener("click", ()=>{    
    if (currentIndex+1 < QUESTIONS.length){ currentIndex++; reviewMode = false; renderQuestion(); }    
    else { submitted = true; reviewMode = false; renderResult(); }    
  });    

  const markBtnEl = document.getElementById('markBtn');    
  if (markBtnEl){    
    markBtnEl.addEventListener('click', ()=>{    
      reviewed[currentIndex] = !reviewed[currentIndex];    
      markBtnEl.textContent = reviewed[currentIndex] ? 'Marked' : 'Mark';    
      renderQuestion();    
    });    
  }    

  const back = document.getElementById("backAnalysis");    
  if (back){    
    back.addEventListener("click", ()=>{    
      reviewMode = false;    
      submitted = true;    
      renderResult();    
    });    
  }    
}    

function renderResult(){    
  if (timerId){ clearInterval(timerId); timerId = null; }    
  const s = getStats();    
  const maxMarks = s.total * MARKS_CORRECT;    
  const percentage = maxMarks>0 ? Math.round((s.marks/maxMarks)*100):0;    
  let remark = percentage>=80 ? "Excellent! 💯"
             : percentage>=60 ? "Good! 👍"
             : percentage>=40 ? "Average. Can improve 🙂"
             : "Needs more practice 💪";    

  let qaHtml = "";    
  QUESTIONS.forEach((q,i)=>{    
    const user = answers[i];    
    const correctIdx = q.answer;    
    const isSkipped = user === null;    
    const isCorrect = !isSkipped && user === correctIdx;    
    const pill = isSkipped ? `<span class="pill-gray">Skipped</span>` 
               : isCorrect ? `<span class="pill-green">Correct</span>` 
               : `<span class="pill-red">Wrong</span>`;    

    const userText = isSkipped ? "<em>Skipped</em>" : `${String.fromCharCode(65+user)}. ${q.options[user]}`;    
    const correctText = `${String.fromCharCode(65+correctIdx)}. ${q.options[correctIdx]}`;    

    qaHtml += `    
      <div class="qa-card" id="qa-${i}">    
        <div class="qa-question"><strong>Q${i+1}.</strong> ${q.q}</div>    
        <div class="qa-answer-row">    
          <div><span class="label">Your answer:</span> ${userText}</div>    
          <div><span class="label">Correct answer:</span> ${correctText}</div>    
          <div style="margin-left:auto">${pill}</div>    
        </div>    
        <div style="margin-top:8px;text-align:right">    
          <button class="review-btn" data-q="${i}">Review Q</button>    
        </div>    
      </div>    
    `;    
  });    

  app.innerHTML = `    
    <div class="result">    
      <h2>English Section Analysis</h2>    
      <div class="tiny">9-minute sectional mock completed</div>    

      <div class="card">    
        <div class="card-title">Overall Performance</div>    
        <div class="stat-row"><span>Total Questions</span><span>${s.total}</span></div>    
        <div class="stat-row"><span>Attempted</span><span>${s.attempted}</span></div>    
        <div class="stat-row"><span>Correct</span><span>${s.correct}</span></div>    
        <div class="stat-row"><span>Wrong</span><span>${s.wrong}</span></div>    
        <div class="stat-row"><span>Marks</span><span>${s.marks.toFixed(2)} / ${maxMarks}</span></div>    
        <div class="stat-row"><span>Percentage</span><span>${percentage}%</span></div>    
        <div class="stat-row"><span>Remark</span><span>${remark}</span></div>    
      </div>    

      <div style="margin-top:8px;margin-bottom:8px">    
        <div class="card-title">Question-wise Review</div>    
        ${qaHtml}    
      </div>    

      <button class="restart-btn" id="restartBtn">Retake Section</button>    
      <div class="tiny">Timer will restart from 9 minutes</div>    
    </div>    
  `;    

  document.querySelectorAll(".review-btn").forEach(b=>{    
    b.addEventListener("click", ()=>{    
      const idx = Number(b.dataset.q);    
      currentIndex = idx;    
      reviewMode = true;    
      submitted = false;    
      isPaused = true;    
      renderQuestion();    
    });    
  });    

  document.getElementById("restartBtn").addEventListener("click", ()=>{    
    currentIndex = 0;    
    answers = new Array(QUESTIONS.length).fill(null);    
    timeLeft = TOTAL_TIME;    
    submitted = false;    
    isPaused = false;    
    reviewMode = false;    
    startTimer();    
    renderQuestion();    
  });    
}    

function startTimer(){    
  if (timerId) clearInterval(timerId);    
  timerId = setInterval(()=>{    
    if (!isPaused && !submitted && !reviewMode){    
      timeLeft--;    
      if (timeLeft <= 0){    
        submitted = true;    
        reviewMode = false;    
        renderResult();    
        return;    
      }    
    }    
    const el = document.querySelector(".timer");    
    if (el) el.textContent = "⏱ " + formatTime(timeLeft);    
  }, 1000);    
}    

startTimer();    
renderQuestion();
</script>  </body>    </html>
