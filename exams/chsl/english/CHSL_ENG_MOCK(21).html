<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>English Sectional Mock</title>
  <style>
    *{box-sizing:border-box;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    body{margin:0;background:#f3f4f6;display:flex;justify-content:center;padding:16px}
    .container{max-width:520px;width:100%;background:#fff;margin-top:24px;padding:20px;border-radius:16px;box-shadow:0 10px 25px rgba(0,0,0,.08)}
    .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px}
    .title{font-size:18px;font-weight:600}
    .timer-wrap{display:flex;align-items:center;gap:6px}
    .timer{padding:4px 10px;border-radius:999px;background:#111827;color:#fff;font-size:13px}
    .pause-btn{border-radius:999px;border:1px solid #d1d5db;padding:4px 10px;font-size:12px;background:#f9fafb;cursor:pointer}
    .subheader{font-size:12px;color:#6b7280;margin-bottom:10px;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap}
    .badge{display:inline-block;padding:2px 8px;border-radius:999px;background:#e5e7eb;font-size:11px;color:#374151}
    .progress-bar-bg{width:100%;height:6px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-bottom:8px}
    .progress-bar-fill{height:100%;width:0%;background:#3b82f6;transition:width .2s}
    .q-strip{margin-bottom:10px;overflow-x:auto;padding:4px 0}
    .q-strip-inner{display:flex;gap:4px;padding-bottom:2px}
    .qchip{min-width:26px;height:26px;border-radius:999px;border:1px solid #d1d5db;background:#f9fafb;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
    .qchip.answered{background:#dbeafe;border-color:#2563eb;color:#1d4ed8}
    .qchip.current{background:#111827;border-color:#111827;color:#fff}
    .qchip.reviewed{background:rebeccapurple!important;color:#fff!important;border-color:rebeccapurple!important}
    .section-tag{font-size:12px;padding:3px 8px;border-radius:999px;background:#eef2ff;color:#3730a3;display:inline-block;margin-bottom:6px}
    .question-text{font-size:15px;margin-bottom:10px;white-space:pre-line}
    .options{display:grid;gap:8px}
    .option-btn{width:100%;border-radius:999px;padding:9px 14px;border:1px solid #d1d5db;background:#fff;text-align:left;font-size:14px;cursor:pointer}
    .option-btn.selected{background:#2563eb;color:#fff;border-color:#1d4ed8}
    .option-btn.correct{background:#dcfce7;color:#166534;border-color:#16a34a}
    .option-btn.wrong{background:#fee2e2;color:#b91c1c;border-color:#ef4444}
    .footer{margin-top:16px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
    .nav-buttons{display:flex;gap:6px;flex:1}
    .nav-btn,.next-btn{border-radius:999px;padding:9px 12px;border:none;font-size:13px;cursor:pointer}
    .nav-btn{background:#e5e7eb}
    .next-btn{flex:1;background:#111827;color:#fff}
    .result h2{text-align:center}
  </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
/* English Sectional Mock – 13 Minutes */
const TOTAL_TIME = 13 * 60;
const MARKS_CORRECT = 2;
const MARKS_WRONG = -0.5;
const QUESTIONS = [
  {
    q: "Identify the part of the sentence that contains a grammatical error.\nNeither of the two proposals were approved because the committee found both of them to be unsatisfactory.",
    options: [
      "Neither of the two",
      "proposals were approved",
      "because the committee found",
      "both of them to be unsatisfactory"
    ],
    answer: 1
  },
  {
    q: "Identify the part of the sentence that contains a grammatical error.\nHe is not only intelligent and hardworking, but also very kind.",
    options: [
      "He is",
      "not only intelligent",
      "and hardworking",
      "but also very kind"
    ],
    answer: 3
  },
  {
    q: "Fill in the blank with the most appropriate preposition:\nThe defendant was charged ___ colluding with foreign agents to influence the outcome of the election.",
    options: ["of", "for", "with", "about"],
    answer: 2
  },
  {
    q: "Fill in the blank with the most appropriate conjunction:\nHe has a lot of potential, ___ his lack of discipline may hinder his growth.",
    options: ["whereas", "unless", "because", "albeit"],
    answer: 0
  },
  {
    q: "Choose the correctly spelt word:",
    options: ["Anniversary", "Aniversary", "Anniverssary", "Annivessary"],
    answer: 0
  },
  {
    q: "Choose the correctly spelt word:",
    options: ["Emenical", "Enemical", "Inimical", "Enimical"],
    answer: 2
  },
  {
    q: "Choose the correct meaning of the idiom: All hands on the deck",
    options: [
      "Everyone working together",
      "Someone in charge of the deck",
      "A distraction on the deck",
      "A difficult task"
    ],
    answer: 0
  },
  {
    q: "Select the most appropriate antonym of the word: Profuse",
    options: ["Copious", "Abundant", "Scarce", "Plentiful"],
    answer: 2
  },
  {
    q: "Choose the correct one-word substitute for:\nA person who is trained to care for animals",
    options: ["Zoologist", "Biologist", "Veterinarian", "Ecologist"],
    answer: 2
  },
  {
    q: "Choose the correct one-word substitute for:\nA stain caused by a discoloring substance",
    options: ["Blot", "Smudge", "Mark", "Spot"],
    answer: 0
  },
  {
    q: "Which sentence contains a misspelt word “address”?",
    options: [
      "He didn’t know the recipient’s address, so the parcel was returned.",
      "The speaker’s addres during the ceremony was inspiring.",
      "Please ensure the return address is clearly visible.",
      "She updated her mailing address after she moved."
    ],
    answer: 1
  },
  {
    q: "Change the following sentence into the Active form.\nIt was believed that the secret formula had been stolen by a rival company.",
    options: [
      "A rival company believed that the secret formula had been stolen.",
      "People believed that a rival company had stolen the secret formula.",
      "The secret formula was stolen by a rival company.",
      "A rival company stole the secret formula, it was believed."
    ],
    answer: 1
  },
  {
    q: "Select the option that expresses the given sentence in indirect voice.\nThe professor said, “The study published last year proves that the hypothesis is false.”",
    options: [
      "The professor said that the study published the previous year proved that the hypothesis was false.",
      "The professor said that the study published last year proves that the hypothesis is false.",
      "The professor said that the study published the previous year proved that the hypothesis was false.",
      "The professor said that the study published last year proved that the hypothesis was false."
    ],
    answer: 2
  },
  {
    q: "Choose the most suitable option to replace the highlighted part of the sentence:\nI bought a new pair of jeans and they are already torn.",
    options: [
      "I bought a new pair of jeans and it is already torn",
      "I bought a new pair of jeans and it has already torn",
      "I bought a new pair of jeans and it was already torn",
      "I bought a new pair of jeans and which are already torn"
    ],
    answer: 0
  },
  {
    q: "Choose the most suitable option to replace the highlighted part of the sentence:\nThe bowler took three wickets in the past four overs.",
    options: [
      "in the last four overs",
      "in the next four overs",
      "during the past four overs",
      "in four overs"
    ],
    answer: 0
  },
  {
    q: "Choose the correct passive voice transformation of the sentence:\nThe government will be implementing the new environmental regulations next month.",
    options: [
      "The new environmental regulations will be implemented by the government next month.",
      "The new environmental regulations will be being implemented by the government next month.",
      "The new environmental regulations are being implemented by the government next month.",
      "The new environmental regulations will have been implemented by the government next month."
    ],
    answer: 0
  },
  {
    q: "Select the option that expresses the given sentence in direct voice.\nMy friend told me that she had been thinking about quitting her job but that she had not made a final decision yet.",
    options: [
      "My friend said to me, “I was thinking about quitting my job, but I have not made a final decision yet.”",
      "My friend said to me, “I have been thinking about quitting my job, but I have not made a final decision yet.”",
      "My friend said to me, “I had been thinking about quitting my job, but I had not made a final decision yet.”",
      "My friend said to me, “I have been thinking about quitting my job, but I did not make a final decision yet.”"
    ],
    answer: 1
  },
  {
    q: "PASSAGE:\nIn the contemporary corporate milieu, women occupying the echelons of Chief Executive Officer (CEO) and Chief Technology Officer (CTO) roles have increasingly disrupted the traditionally male-dominated paradigm. Despite systemic impediments such as gender bias and glass ceilings, a growing cohort of women leaders is redefining organizational dynamics through innovative leadership and technological acumen.\n\nThe ascendancy of women CEOs and CTOs is emblematic of progressive shifts in societal and corporate ethos, fostering inclusivity and diversity at strategic decision-making levels. Their leadership is often characterized by a collaborative approach, emotional intelligence, and resilience, which synergize effectively with technological innovation and business strategy.\n\nHowever, these trailblazing women frequently confront challenges including unequal access to mentorship, networking opportunities, and unconscious biases embedded within corporate cultures. The persistence of such barriers underscores the necessity for institutional reforms aimed at amplifying female representation in executive roles.\n\nMoreover, the integration of technology with visionary leadership by women CTOs has catalyzed transformative advancements across sectors, underscoring the symbiotic relationship between gender diversity and technological progress. This paradigm not only enhances organizational performance but also fosters sustainable development goals aligned with equity.\n\nIn essence, the emergence of women as CEOs and CTOs heralds a nuanced reconfiguration of power structures within the corporate sphere, delineating a future where gender parity and innovation coalesce to propel economic and social progress.\n\nIn the sentence, “The persistence of such barriers underscores the necessity for institutional reforms aimed at amplifying female representation in executive roles,” the phrase “aimed at amplifying female representation” is:",
    options: [
      "a misplaced modifier",
      "a participial phrase modifying “reforms”",
      "an absolute phrase modifying the entire sentence",
      "an infinitive phrase modifying “necessity”"
    ],
    answer: 1
  },
  {
    q: "In the sentence, “Their leadership is often characterized by a collaborative approach, emotional intelligence, and resilience,” the verb “is characterized” is in:",
    options: [
      "active voice, present tense",
      "passive voice, present tense",
      "active voice, past tense",
      "passive voice, past tense"
    ],
    answer: 1
  },
  {
    q: "The word “ascendancy” in the passage most nearly means:",
    options: ["decline", "dominance or rise", "stagnation", "separation"],
    answer: 1
  },
  {
    q: "The phrase “nuanced reconfiguration” implies:",
    options: [
      "a complex and subtle restructuring",
      "a simplistic rearrangement",
      "a chaotic disruption",
      "an immediate reversal"
    ],
    answer: 0
  },
  {
    q: "According to the passage, what is a major barrier faced by women CEOs and CTOs?",
    options: [
      "Excessive technological knowledge",
      "Lack of emotional intelligence",
      "Unequal access to mentorship and networking opportunities",
      "Overrepresentation in executive roles"
    ],
    answer: 2
  },
  {
    q: "Rearrange the following sentence parts to form a meaningful and grammatically correct paragraph.\nP. The perfect gift appeared on her screen, so she clicked to add it to her cart.\nQ. She typed in her address and credit card details, then checked out.\nR. With a final click, her order was placed and confirmed.\nS. Now she waits for the package to arrive at her doorstep.",
    options: [
      "P, Q, R, S",
      "S, Q, P, R",
      "Q, R, P, S",
      "S, P, R, Q"
    ],
    answer: 0
  },
  {
    q: "Rearrange the following sentences to form a meaningful and grammatically correct paragraph.\nP. He developed his finger strength and dexterity by practicing his scales and chords daily.\nQ. He studied sheet music for hours, learning to play tunes that got harder and harder.\nR. He had mastered his new instrument and was now a musician.\nS. He played a challenging piece perfectly from memory while performing for his buddies.",
    options: [
      "P, Q, S, R",
      "R, Q, S, P",
      "Q, P, S, R",
      "S, Q, P, R"
    ],
    answer: 0
  },
  {
    q: "Which of the following pairs of homonyms can be used to fill in the blanks most suitably?\nThe undercover officer managed to ____ a confession about the gang’s ____ activities.",
    options: [
      "elicit, illicit",
      "illicit, elicit",
      "solstice, solicit",
      "solicit, solstice"
    ],
    answer: 0
  }
];
// State    
let currentIndex = 0;    
let answers = new Array(QUESTIONS.length).fill(null);     
let reviewed = new Array(QUESTIONS.length).fill(false); // mark-for-review flags    
let timeLeft = TOTAL_TIME;    
let timerId = null;    
let submitted = false;    
let isPaused = false;    
let reviewMode = false; // true when user is viewing a single question from analysis    
const app = document.getElementById("app");    

function formatTime(sec){ 
  const m = Math.floor(sec/60), s = sec%60; 
  return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"00")}`; 
}    

function getStats(){    
  const s = { total: QUESTIONS.length, attempted:0, correct:0, wrong:0, marks:0 };    
  QUESTIONS.forEach((q,i)=>{    
    const a = answers[i];    
    if (a !== null){    
      s.attempted++;    
      if (a === q.answer){ s.correct++; s.marks += MARKS_CORRECT; }    
      else { s.wrong++; s.marks += MARKS_WRONG; }    
    }    
  });    
  return s;    
}    

function renderQuestion(){    
  if (reviewMode) isPaused = true;    
  if (submitted && !reviewMode){ renderResult(); return; }    

  const q = QUESTIONS[currentIndex];    
  const progressPercent = ((currentIndex+1)/QUESTIONS.length)*100;    
  const selected = answers[currentIndex];    

  const stripHtml = QUESTIONS.map((_,idx)=>{    
    let cls = "qchip";    
    if (idx===currentIndex) cls += " current";    
    if (answers[idx] !== null) cls += " answered";    
    if (reviewed[idx]) cls += " reviewed";    
    return `<button class="${cls}" data-q="${idx}">${idx+1}</button>`;    
  }).join("");    

  app.innerHTML = `    
    <div class="header">    
      <div class="title">English Sectional Mock</div>    
      <div class="timer-wrap">    
        <div class="timer">⏱ ${formatTime(timeLeft)}</div>    
        <button class="pause-btn" id="pauseBtn">${isPaused ? "Resume":"Pause"}</button>    
      </div>    
    </div>    

    <div class="subheader">    
      <span>+${MARKS_CORRECT} for correct, ${MARKS_WRONG} for wrong</span>    
      <span class="badge">English</span>    
    </div>    

    <div class="progress-bar-bg">
      <div class="progress-bar-fill" style="width:${progressPercent}%"></div>
    </div>    

    <div class="q-strip">
      <div class="q-strip-inner">${stripHtml}</div>
    </div>    

    <div class="section-tag">English</div>    

    <div class="question-text">Q${currentIndex+1}. ${q.q}</div>    

    <div class="options">    
      ${q.options.map((opt,idx)=>{    
        let classes = "";    
        if (selected === idx && !reviewMode) classes = "selected";    
        if (reviewMode){    
          if (idx === q.answer) classes = "correct";    
          else if (selected === idx && selected !== q.answer) classes = "wrong";    
        } else {    
          if (selected === idx) classes = "selected";    
        }    
        return `<button class="option-btn ${classes}" data-index="${idx}">${String.fromCharCode(65+idx)}. ${opt}</button>`;    
      }).join("")}    
    </div>    

    <div class="footer">    
      <div class="question-count">Question ${currentIndex+1} of ${QUESTIONS.length}</div>    
      <div class="nav-buttons">    
        <button class="nav-btn" id="prevBtn"${currentIndex===0 ? " disabled":""}>Prev</button>    
        ${ reviewMode ? `<button class="back-btn" id="backAnalysis">Back to Analysis</button>` : "" }    
        <button class="nav-btn" id="markBtn">Mark</button>    
        <button class="next-btn" id="nextBtn">${currentIndex+1===QUESTIONS.length? "Submit":"Next"}</button>    
      </div>    
    </div>    
  `;    

  document.getElementById("pauseBtn").addEventListener("click", ()=>{    
    if (reviewMode){ isPaused = true; renderQuestion(); return; }    
    isPaused = !isPaused;    
    renderQuestion();    
  });    

  document.querySelectorAll(".qchip").forEach(b=>{    
    b.addEventListener("click", ()=>{ 
      currentIndex = Number(b.dataset.q); 
      reviewMode = false; 
      renderQuestion(); 
    });    
  });    

  document.querySelectorAll(".option-btn").forEach(b=>{    
    b.addEventListener("click", ()=>{    
      const idx = Number(b.dataset.index);    
      if (reviewMode) return;    
      answers[currentIndex] = idx;    
      renderQuestion();    
    });    
  });    

  document.getElementById("prevBtn").addEventListener("click", ()=>{    
    if (currentIndex>0){ currentIndex--; reviewMode = false; renderQuestion(); }    
  });    

  document.getElementById("nextBtn").addEventListener("click", ()=>{    
    if (currentIndex+1 < QUESTIONS.length){ currentIndex++; reviewMode = false; renderQuestion(); }    
    else { submitted = true; reviewMode = false; renderResult(); }    
  });    

  const markBtnEl = document.getElementById('markBtn');    
  if (markBtnEl){    
    markBtnEl.addEventListener('click', ()=>{    
      reviewed[currentIndex] = !reviewed[currentIndex];    
      markBtnEl.textContent = reviewed[currentIndex] ? 'Marked' : 'Mark';    
      renderQuestion();    
    });    
  }    

  const back = document.getElementById("backAnalysis");    
  if (back){    
    back.addEventListener("click", ()=>{    
      reviewMode = false;    
      submitted = true;    
      renderResult();    
    });    
  }    
}    

function renderResult(){    
  if (timerId){ clearInterval(timerId); timerId = null; }    
  const s = getStats();    
  const maxMarks = s.total * MARKS_CORRECT;    
  const percentage = maxMarks>0 ? Math.round((s.marks/maxMarks)*100):0;    
  let remark = percentage>=80 ? "Excellent! 💯"
             : percentage>=60 ? "Good! 👍"
             : percentage>=40 ? "Average. Can improve 🙂"
             : "Needs more practice 💪";    

  let qaHtml = "";    
  QUESTIONS.forEach((q,i)=>{    
    const user = answers[i];    
    const correctIdx = q.answer;    
    const isSkipped = user === null;    
    const isCorrect = !isSkipped && user === correctIdx;    
    const pill = isSkipped ? `<span class="pill-gray">Skipped</span>` 
               : isCorrect ? `<span class="pill-green">Correct</span>` 
               : `<span class="pill-red">Wrong</span>`;    

    const userText = isSkipped ? "<em>Skipped</em>" : `${String.fromCharCode(65+user)}. ${q.options[user]}`;    
    const correctText = `${String.fromCharCode(65+correctIdx)}. ${q.options[correctIdx]}`;    

    qaHtml += `    
      <div class="qa-card" id="qa-${i}">    
        <div class="qa-question"><strong>Q${i+1}.</strong> ${q.q}</div>    
        <div class="qa-answer-row">    
          <div><span class="label">Your answer:</span> ${userText}</div>    
          <div><span class="label">Correct answer:</span> ${correctText}</div>    
          <div style="margin-left:auto">${pill}</div>    
        </div>    
        <div style="margin-top:8px;text-align:right">    
          <button class="review-btn" data-q="${i}">Review Q</button>    
        </div>    
      </div>    
    `;    
  });    

  app.innerHTML = `    
    <div class="result">    
      <h2>English Section Analysis</h2>    
      <div class="tiny">9-minute sectional mock completed</div>    

      <div class="card">    
        <div class="card-title">Overall Performance</div>    
        <div class="stat-row"><span>Total Questions</span><span>${s.total}</span></div>    
        <div class="stat-row"><span>Attempted</span><span>${s.attempted}</span></div>    
        <div class="stat-row"><span>Correct</span><span>${s.correct}</span></div>    
        <div class="stat-row"><span>Wrong</span><span>${s.wrong}</span></div>    
        <div class="stat-row"><span>Marks</span><span>${s.marks.toFixed(2)} / ${maxMarks}</span></div>    
        <div class="stat-row"><span>Percentage</span><span>${percentage}%</span></div>    
        <div class="stat-row"><span>Remark</span><span>${remark}</span></div>    
      </div>    

      <div style="margin-top:8px;margin-bottom:8px">    
        <div class="card-title">Question-wise Review</div>    
        ${qaHtml}    
      </div>    

      <button class="restart-btn" id="restartBtn">Retake Section</button>    
      <div class="tiny">Timer will restart from 9 minutes</div>    
    </div>    
  `;    

  document.querySelectorAll(".review-btn").forEach(b=>{    
    b.addEventListener("click", ()=>{    
      const idx = Number(b.dataset.q);    
      currentIndex = idx;    
      reviewMode = true;    
      submitted = false;    
      isPaused = true;    
      renderQuestion();    
    });    
  });    

  document.getElementById("restartBtn").addEventListener("click", ()=>{    
    currentIndex = 0;    
    answers = new Array(QUESTIONS.length).fill(null);    
    timeLeft = TOTAL_TIME;    
    submitted = false;    
    isPaused = false;    
    reviewMode = false;    
    startTimer();    
    renderQuestion();    
  });    
}    

function startTimer(){    
  if (timerId) clearInterval(timerId);    
  timerId = setInterval(()=>{    
    if (!isPaused && !submitted && !reviewMode){    
      timeLeft--;    
      if (timeLeft <= 0){    
        submitted = true;    
        reviewMode = false;    
        renderResult();    
        return;    
      }    
    }    
    const el = document.querySelector(".timer");    
    if (el) el.textContent = "⏱ " + formatTime(timeLeft);    
  }, 1000);    
}    

startTimer();    
renderQuestion();
</script>  </body>    </html>
