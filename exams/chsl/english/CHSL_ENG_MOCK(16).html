<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>English Sectional Mock</title>
  <style>
    *{box-sizing:border-box;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    body{margin:0;background:#f3f4f6;display:flex;justify-content:center;padding:16px}
    .container{max-width:520px;width:100%;background:#fff;margin-top:24px;padding:20px;border-radius:16px;box-shadow:0 10px 25px rgba(0,0,0,.08)}
    .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px}
    .title{font-size:18px;font-weight:600}
    .timer-wrap{display:flex;align-items:center;gap:6px}
    .timer{padding:4px 10px;border-radius:999px;background:#111827;color:#fff;font-size:13px}
    .pause-btn{border-radius:999px;border:1px solid #d1d5db;padding:4px 10px;font-size:12px;background:#f9fafb;cursor:pointer}
    .subheader{font-size:12px;color:#6b7280;margin-bottom:10px;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap}
    .badge{display:inline-block;padding:2px 8px;border-radius:999px;background:#e5e7eb;font-size:11px;color:#374151}
    .progress-bar-bg{width:100%;height:6px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-bottom:8px}
    .progress-bar-fill{height:100%;width:0%;background:#3b82f6;transition:width .2s}
    .q-strip{margin-bottom:10px;overflow-x:auto;padding:4px 0}
    .q-strip-inner{display:flex;gap:4px;padding-bottom:2px}
    .qchip{min-width:26px;height:26px;border-radius:999px;border:1px solid #d1d5db;background:#f9fafb;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
    .qchip.answered{background:#dbeafe;border-color:#2563eb;color:#1d4ed8}
    .qchip.current{background:#111827;border-color:#111827;color:#fff}
    .qchip.reviewed{background:rebeccapurple!important;color:#fff!important;border-color:rebeccapurple!important}
    .section-tag{font-size:12px;padding:3px 8px;border-radius:999px;background:#eef2ff;color:#3730a3;display:inline-block;margin-bottom:6px}
    .question-text{font-size:15px;margin-bottom:10px;white-space:pre-line}
    .options{display:grid;gap:8px}
    .option-btn{width:100%;border-radius:999px;padding:9px 14px;border:1px solid #d1d5db;background:#fff;text-align:left;font-size:14px;cursor:pointer}
    .option-btn.selected{background:#2563eb;color:#fff;border-color:#1d4ed8}
    .option-btn.correct{background:#dcfce7;color:#166534;border-color:#16a34a}
    .option-btn.wrong{background:#fee2e2;color:#b91c1c;border-color:#ef4444}
    .footer{margin-top:16px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
    .nav-buttons{display:flex;gap:6px;flex:1}
    .nav-btn,.next-btn{border-radius:999px;padding:9px 12px;border:none;font-size:13px;cursor:pointer}
    .nav-btn{background:#e5e7eb}
    .next-btn{flex:1;background:#111827;color:#fff}
    .result h2{text-align:center}
  </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
/* English Sectional Mock – 13 Minutes */
const TOTAL_TIME = 13 * 60;
const MARKS_CORRECT = 2;
const MARKS_WRONG = -0.5;
const QUESTIONS = [
{
  q: "Choose a word that is similar in meaning to the word in bold.\nFarmers wash trees infested with insects with any one of the many insecticides not easily obtainable.",
  options: ["Acceptable","Accessible","Probable","Interminable"],
  answer: 1
},
{
  q: "Choose the option that has an error in the sentence.\nRecycling is now an essential measure and it is time for everyone in society to become more responsibility.",
  options: [
    "Recycling is now an essential measure",
    "and it is time for everyone",
    "in society to become",
    "more responsibility"
  ],
  answer: 3
},
{
  q: "Choose the correct sentence.",
  options: [
    "He suggested me to take rest.",
    "He suggested that I take rest.",
    "He suggested me that I take rest.",
    "He suggested for me to take rest."
  ],
  answer: 1
},
{
  q: "Fill in the blank with the most appropriate preposition.\nHe was accused ___ misappropriating company funds.",
  options: ["for","of","with","about"],
  answer: 1
},
{
  q: "Fill in the blank with the most appropriate option.\nThe ambassador’s tone was ___, balancing diplomacy with quiet authority.",
  options: ["belligerent","conciliatory","erratic","morose"],
  answer: 1
},
{
  q: "Choose the correctly spelt word.",
  options: ["Adulteration","Addulteration","Adultiration","Adulterashion"],
  answer: 0
},
{
  q: "Choose the correctly spelt word.",
  options: ["Minuscule","Miniscule","Minisculle","Minouscule"],
  answer: 0
},
{
  q: "Choose the best option to replace the underlined part.\nWe met at the restaurant at a long time.",
  options: ["till a long time","after a long time","before a long time","No substitution"],
  answer: 1
},
{
  q: "Choose the best option to replace the underlined part.\nHe is married with a woman who works in the Navy.",
  options: ["Married for","Married to","Married by","No substitution"],
  answer: 1
},
{
  q: "Choose the correct indirect narration.\nThe farmer said, “There is a well nearby our village which is filled with different kinds of snails.”",
  options: [
    "The farmer said that there was a well nearby their village which had been filled with different kinds of snails.",
    "The farmer said that there had been a well nearby their village which was filled with different kinds of snails.",
    "The farmer said that there was a well nearby their village which was filled with different kinds of snails.",
    "The farmer said that there was a well nearby your village which was filled with different kinds of snails."
  ],
  answer: 2
},
{
  q: "Change the following sentence into the Active form.\nIt was being said that the new policy would be a disaster.",
  options: [
    "The new policy would be a disaster.",
    "The news said the new policy would be a disaster.",
    "People were saying that the new policy would be a disaster.",
    "Someone has said that the new policy was a disaster."
  ],
  answer: 2
},
{
  q: "Choose the option that is the most appropriate conversion into Direct Speech.\nThe child said that he was afraid of the dark and requested the lady to stay with him.",
  options: [
    "The child said, “I am afraid of the dark. Please stay with me.”",
    "The child said, “I was afraid of the dark. Kindly stay with me.”",
    "The child said, “I am afraid of the dark. Will you stay with me?”",
    "The child said, “I was afraid of the dark. Stay with me.”"
  ],
  answer: 0
},
{
  q: "Which sentence contains a misspelt word?",
  options: [
    "The architect suggested using concrete for the foundation to ensure durability.",
    "Without concret evidence, the theory remains purely speculative.",
    "She needed more concrete examples to support her argument.",
    "The committee asked for a concrete plan before approving the project."
  ],
  answer: 1
},
{
  q: "Choose the correct passive voice transformation.\nThe diligent team of researchers, who had been analyzing the data for months, finally published their findings.",
  options: [
    "Their findings were finally published by the diligent team of researchers, who had been analyzing the data for months.",
    "Their findings had been finally published by the diligent team of researchers.",
    "Their findings have been finally published by the diligent team of researchers.",
    "The diligent team of researchers was finally published by their findings."
  ],
  answer: 0
},
{
  q: "PASSAGE (For Q15–Q19)\n\nWorld Handloom Day, observed every year on 7th August, commemorates the launch of the Swadeshi Movement in 1905. It highlights the importance of India’s handloom industry, which represents not just craftsmanship but also cultural identity and self-reliance.\nIndia is home to over 43 lakh handloom weavers, many of them women in rural communities. Each region contributes a unique weaving style such as Chanderi, Pochampally ikat, and Kanjeevaram, reflecting the stories, rituals, and environments of its people.\nDespite its rich legacy, the handloom sector faces significant challenges. With rising demand for machine-made fabrics, traditional weavers struggle to sustain their livelihoods. Government efforts, like the India Handloom Brand, aim to revive interest and increase visibility of hand-woven products.\nWorld Handloom Day is more than symbolic. It reminds us that promoting handlooms supports sustainable fashion, local economies, and ecological balance. By supporting handloom products, we are not only preserving a centuries-old tradition but also empowering artisans and encouraging environmentally conscious living.\n\nIdentify the type of the sentence:\n“Each region contributes a unique weaving style such as Chanderi, Pochampally ikat, and Kanjeevaram, reflecting the stories, rituals, and environments of its people.”",
  options: ["Simple sentence","Compound sentence","Complex sentence","Compound-complex sentence"],
  answer: 0
},
{
  q: "Read the passage and answer the question.\nWhat is the tense used in the sentence below and why is it appropriate?\n“World Handloom Day, observed every year on 7th August,”",
  options: [
    "Past Continuous – because the event is ongoing",
    "Present Perfect – because it has just happened",
    "Present Simple – because it states a general fact",
    "Future Simple – because it refers to a yearly event"
  ],
  answer: 2
},
{
  q: "Read the passage and answer the question.\nWhat does “ecological balance” most likely refer to?",
  options: [
    "Equal distribution of fabric",
    "Balance between different cultures",
    "Stability and health of the environment",
    "Government trade regulations"
  ],
  answer: 2
},
{
  q: "Which idiom best expresses the idea of helping in more than one way at the same time?",
  options: [
    "Burn the midnight oil",
    "Kill two birds with one stone",
    "Add fuel to the fire",
    "Let the cat out of the bag"
  ],
  answer: 1
},
{
  q: "What is the main purpose of observing World Handloom Day?",
  options: [
    "To promote the export of machine-made textiles",
    "To encourage people to wear Western clothing",
    "To highlight the value of handlooms and support traditional artisans",
    "To replace traditional weaving with modern technology"
  ],
  answer: 2
},
{
  q: "Rearrange the following sentences to form a meaningful paragraph.\nP. He removed all old paint and flaws from the automobile body by sanding it.\nQ. He watched the fresh paint dry to a smooth finish after applying multiple thin, even coats.\nR. He shielded the windows and trim from overspray by carefully masking them off.\nS. The vehicle had a perfect colour, appeared brand new, and was prepared for driving.",
  options: ["P, R, Q, S","P, R, Q, S","S, R, Q, P","R, P, Q, S"],
  answer: 1
},
{
  q: "What is the antonym of “Laconic”?",
  options: ["Elliptical","Wordy","Compendious","Clipped"],
  answer: 1
},
{
  q: "Which word is closest in meaning to “ghastly”?",
  options: ["Simple","Light","Gruesome","Boring"],
  answer: 2
},
{
  q: "Which of the following options is NOT one of the meanings of the homonym “condition”?",
  options: [
    "To improve the hardness and elasticity of things",
    "The physical state of something or someone",
    "To train someone to behave in a certain way",
    "A requirement that must be met for something to happen"
  ],
  answer: 0
},
{
  q: "What is a procession for a funeral called?",
  options: ["Parade","Carousel","Cortege","Carnival"],
  answer: 2
},
{
  q: "Choose the correct one-word substitution.\nRavi has always been a person who vehemently opposes authority, control, or tradition.",
  options: ["Conformist","Anarchist","Optimist","Traditionalist"],
  answer: 1
}
];
// State    
let currentIndex = 0;    
let answers = new Array(QUESTIONS.length).fill(null);     
let reviewed = new Array(QUESTIONS.length).fill(false); // mark-for-review flags    
let timeLeft = TOTAL_TIME;    
let timerId = null;    
let submitted = false;    
let isPaused = false;    
let reviewMode = false; // true when user is viewing a single question from analysis    
const app = document.getElementById("app");    

function formatTime(sec){ 
  const m = Math.floor(sec/60), s = sec%60; 
  return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"00")}`; 
}    

function getStats(){    
  const s = { total: QUESTIONS.length, attempted:0, correct:0, wrong:0, marks:0 };    
  QUESTIONS.forEach((q,i)=>{    
    const a = answers[i];    
    if (a !== null){    
      s.attempted++;    
      if (a === q.answer){ s.correct++; s.marks += MARKS_CORRECT; }    
      else { s.wrong++; s.marks += MARKS_WRONG; }    
    }    
  });    
  return s;    
}    

function renderQuestion(){    
  if (reviewMode) isPaused = true;    
  if (submitted && !reviewMode){ renderResult(); return; }    

  const q = QUESTIONS[currentIndex];    
  const progressPercent = ((currentIndex+1)/QUESTIONS.length)*100;    
  const selected = answers[currentIndex];    

  const stripHtml = QUESTIONS.map((_,idx)=>{    
    let cls = "qchip";    
    if (idx===currentIndex) cls += " current";    
    if (answers[idx] !== null) cls += " answered";    
    if (reviewed[idx]) cls += " reviewed";    
    return `<button class="${cls}" data-q="${idx}">${idx+1}</button>`;    
  }).join("");    

  app.innerHTML = `    
    <div class="header">    
      <div class="title">English Sectional Mock</div>    
      <div class="timer-wrap">    
        <div class="timer">⏱ ${formatTime(timeLeft)}</div>    
        <button class="pause-btn" id="pauseBtn">${isPaused ? "Resume":"Pause"}</button>    
      </div>    
    </div>    

    <div class="subheader">    
      <span>+${MARKS_CORRECT} for correct, ${MARKS_WRONG} for wrong</span>    
      <span class="badge">English</span>    
    </div>    

    <div class="progress-bar-bg">
      <div class="progress-bar-fill" style="width:${progressPercent}%"></div>
    </div>    

    <div class="q-strip">
      <div class="q-strip-inner">${stripHtml}</div>
    </div>    

    <div class="section-tag">English</div>    

    <div class="question-text">Q${currentIndex+1}. ${q.q}</div>    

    <div class="options">    
      ${q.options.map((opt,idx)=>{    
        let classes = "";    
        if (selected === idx && !reviewMode) classes = "selected";    
        if (reviewMode){    
          if (idx === q.answer) classes = "correct";    
          else if (selected === idx && selected !== q.answer) classes = "wrong";    
        } else {    
          if (selected === idx) classes = "selected";    
        }    
        return `<button class="option-btn ${classes}" data-index="${idx}">${String.fromCharCode(65+idx)}. ${opt}</button>`;    
      }).join("")}    
    </div>    

    <div class="footer">    
      <div class="question-count">Question ${currentIndex+1} of ${QUESTIONS.length}</div>    
      <div class="nav-buttons">    
        <button class="nav-btn" id="prevBtn"${currentIndex===0 ? " disabled":""}>Prev</button>    
        ${ reviewMode ? `<button class="back-btn" id="backAnalysis">Back to Analysis</button>` : "" }    
        <button class="nav-btn" id="markBtn">Mark</button>    
        <button class="next-btn" id="nextBtn">${currentIndex+1===QUESTIONS.length? "Submit":"Next"}</button>    
      </div>    
    </div>    
  `;    

  document.getElementById("pauseBtn").addEventListener("click", ()=>{    
    if (reviewMode){ isPaused = true; renderQuestion(); return; }    
    isPaused = !isPaused;    
    renderQuestion();    
  });    

  document.querySelectorAll(".qchip").forEach(b=>{    
    b.addEventListener("click", ()=>{ 
      currentIndex = Number(b.dataset.q); 
      reviewMode = false; 
      renderQuestion(); 
    });    
  });    

  document.querySelectorAll(".option-btn").forEach(b=>{    
    b.addEventListener("click", ()=>{    
      const idx = Number(b.dataset.index);    
      if (reviewMode) return;    
      answers[currentIndex] = idx;    
      renderQuestion();    
    });    
  });    

  document.getElementById("prevBtn").addEventListener("click", ()=>{    
    if (currentIndex>0){ currentIndex--; reviewMode = false; renderQuestion(); }    
  });    

  document.getElementById("nextBtn").addEventListener("click", ()=>{    
    if (currentIndex+1 < QUESTIONS.length){ currentIndex++; reviewMode = false; renderQuestion(); }    
    else { submitted = true; reviewMode = false; renderResult(); }    
  });    

  const markBtnEl = document.getElementById('markBtn');    
  if (markBtnEl){    
    markBtnEl.addEventListener('click', ()=>{    
      reviewed[currentIndex] = !reviewed[currentIndex];    
      markBtnEl.textContent = reviewed[currentIndex] ? 'Marked' : 'Mark';    
      renderQuestion();    
    });    
  }    

  const back = document.getElementById("backAnalysis");    
  if (back){    
    back.addEventListener("click", ()=>{    
      reviewMode = false;    
      submitted = true;    
      renderResult();    
    });    
  }    
}    

function renderResult(){    
  if (timerId){ clearInterval(timerId); timerId = null; }    
  const s = getStats();    
  const maxMarks = s.total * MARKS_CORRECT;    
  const percentage = maxMarks>0 ? Math.round((s.marks/maxMarks)*100):0;    
  let remark = percentage>=80 ? "Excellent! 💯"
             : percentage>=60 ? "Good! 👍"
             : percentage>=40 ? "Average. Can improve 🙂"
             : "Needs more practice 💪";    

  let qaHtml = "";    
  QUESTIONS.forEach((q,i)=>{    
    const user = answers[i];    
    const correctIdx = q.answer;    
    const isSkipped = user === null;    
    const isCorrect = !isSkipped && user === correctIdx;    
    const pill = isSkipped ? `<span class="pill-gray">Skipped</span>` 
               : isCorrect ? `<span class="pill-green">Correct</span>` 
               : `<span class="pill-red">Wrong</span>`;    

    const userText = isSkipped ? "<em>Skipped</em>" : `${String.fromCharCode(65+user)}. ${q.options[user]}`;    
    const correctText = `${String.fromCharCode(65+correctIdx)}. ${q.options[correctIdx]}`;    

    qaHtml += `    
      <div class="qa-card" id="qa-${i}">    
        <div class="qa-question"><strong>Q${i+1}.</strong> ${q.q}</div>    
        <div class="qa-answer-row">    
          <div><span class="label">Your answer:</span> ${userText}</div>    
          <div><span class="label">Correct answer:</span> ${correctText}</div>    
          <div style="margin-left:auto">${pill}</div>    
        </div>    
        <div style="margin-top:8px;text-align:right">    
          <button class="review-btn" data-q="${i}">Review Q</button>    
        </div>    
      </div>    
    `;    
  });    

  app.innerHTML = `    
    <div class="result">    
      <h2>English Section Analysis</h2>    
      <div class="tiny">9-minute sectional mock completed</div>    

      <div class="card">    
        <div class="card-title">Overall Performance</div>    
        <div class="stat-row"><span>Total Questions</span><span>${s.total}</span></div>    
        <div class="stat-row"><span>Attempted</span><span>${s.attempted}</span></div>    
        <div class="stat-row"><span>Correct</span><span>${s.correct}</span></div>    
        <div class="stat-row"><span>Wrong</span><span>${s.wrong}</span></div>    
        <div class="stat-row"><span>Marks</span><span>${s.marks.toFixed(2)} / ${maxMarks}</span></div>    
        <div class="stat-row"><span>Percentage</span><span>${percentage}%</span></div>    
        <div class="stat-row"><span>Remark</span><span>${remark}</span></div>    
      </div>    

      <div style="margin-top:8px;margin-bottom:8px">    
        <div class="card-title">Question-wise Review</div>    
        ${qaHtml}    
      </div>    

      <button class="restart-btn" id="restartBtn">Retake Section</button>    
      <div class="tiny">Timer will restart from 9 minutes</div>    
    </div>    
  `;    

  document.querySelectorAll(".review-btn").forEach(b=>{    
    b.addEventListener("click", ()=>{    
      const idx = Number(b.dataset.q);    
      currentIndex = idx;    
      reviewMode = true;    
      submitted = false;    
      isPaused = true;    
      renderQuestion();    
    });    
  });    

  document.getElementById("restartBtn").addEventListener("click", ()=>{    
    currentIndex = 0;    
    answers = new Array(QUESTIONS.length).fill(null);    
    timeLeft = TOTAL_TIME;    
    submitted = false;    
    isPaused = false;    
    reviewMode = false;    
    startTimer();    
    renderQuestion();    
  });    
}    

function startTimer(){    
  if (timerId) clearInterval(timerId);    
  timerId = setInterval(()=>{    
    if (!isPaused && !submitted && !reviewMode){    
      timeLeft--;    
      if (timeLeft <= 0){    
        submitted = true;    
        reviewMode = false;    
        renderResult();    
        return;    
      }    
    }    
    const el = document.querySelector(".timer");    
    if (el) el.textContent = "⏱ " + formatTime(timeLeft);    
  }, 1000);    
}    

startTimer();    
renderQuestion();
</script>  </body>    </html>
