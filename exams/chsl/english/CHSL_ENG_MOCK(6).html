<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>English Sectional Mock</title>
  <style>
    *{box-sizing:border-box;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    body{margin:0;background:#f3f4f6;display:flex;justify-content:center;padding:16px}
    .container{max-width:520px;width:100%;background:#fff;margin-top:24px;padding:20px;border-radius:16px;box-shadow:0 10px 25px rgba(0,0,0,.08)}
    .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px}
    .title{font-size:18px;font-weight:600}
    .timer-wrap{display:flex;align-items:center;gap:6px}
    .timer{padding:4px 10px;border-radius:999px;background:#111827;color:#fff;font-size:13px}
    .pause-btn{border-radius:999px;border:1px solid #d1d5db;padding:4px 10px;font-size:12px;background:#f9fafb;cursor:pointer}
    .subheader{font-size:12px;color:#6b7280;margin-bottom:10px;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap}
    .badge{display:inline-block;padding:2px 8px;border-radius:999px;background:#e5e7eb;font-size:11px;color:#374151}
    .progress-bar-bg{width:100%;height:6px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-bottom:8px}
    .progress-bar-fill{height:100%;width:0%;background:#3b82f6;transition:width .2s}
    .q-strip{margin-bottom:10px;overflow-x:auto;padding:4px 0}
    .q-strip-inner{display:flex;gap:4px;padding-bottom:2px}
    .qchip{min-width:26px;height:26px;border-radius:999px;border:1px solid #d1d5db;background:#f9fafb;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
    .qchip.answered{background:#dbeafe;border-color:#2563eb;color:#1d4ed8}
    .qchip.current{background:#111827;border-color:#111827;color:#fff}
    .qchip.reviewed{background:rebeccapurple!important;color:#fff!important;border-color:rebeccapurple!important}
    .section-tag{font-size:12px;padding:3px 8px;border-radius:999px;background:#eef2ff;color:#3730a3;display:inline-block;margin-bottom:6px}
    .question-text{font-size:15px;margin-bottom:10px;white-space:pre-line}
    .options{display:grid;gap:8px}
    .option-btn{width:100%;border-radius:999px;padding:9px 14px;border:1px solid #d1d5db;background:#fff;text-align:left;font-size:14px;cursor:pointer}
    .option-btn.selected{background:#2563eb;color:#fff;border-color:#1d4ed8}
    .option-btn.correct{background:#dcfce7;color:#166534;border-color:#16a34a}
    .option-btn.wrong{background:#fee2e2;color:#b91c1c;border-color:#ef4444}
    .footer{margin-top:16px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
    .nav-buttons{display:flex;gap:6px;flex:1}
    .nav-btn,.next-btn{border-radius:999px;padding:9px 12px;border:none;font-size:13px;cursor:pointer}
    .nav-btn{background:#e5e7eb}
    .next-btn{flex:1;background:#111827;color:#fff}
    .result h2{text-align:center}
  </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
/* English Sectional Mock – 13 Minutes */
const TOTAL_TIME = 13 * 60;
const MARKS_CORRECT = 2;
const MARKS_WRONG = -0.5;
const QUESTIONS = [
{
  q: "Identify the part of the sentence that contains a grammatical error.\nThe group of students, along with the professor, were discussing the new findings in the research lab.",
  options: [
    "The group of students",
    "along with the professor",
    "were discussing the new findings",
    "in the research lab"
  ],
  answer: 2
},
{
  q: "Identify the part of the sentence that contains a grammatical error.\nShe spoke so fastly that I could barely understand what she was saying.",
  options: [
    "She spoke",
    "so fastly that",
    "I could barely understand",
    "what she was saying"
  ],
  answer: 1
},
{
  q: "Fill in the blank with the most appropriate preposition.\nThe researchers accounted ___ all variables before finalizing the data model.",
  options: [
    "for",
    "to",
    "with",
    "on"
  ],
  answer: 0
},
{
  q: "Fill in the blank with the most appropriate verb.\nShe ___ her position on the matter only after repeated questioning by the press.",
  options: [
    "reiterates",
    "clarified",
    "deflects",
    "assumes"
  ],
  answer: 1
},
{
  q: "Select the most appropriate synonym of the word: Pellucid",
  options: [
    "Vague",
    "Clear",
    "Obscure",
    "Ambiguous"
  ],
  answer: 1
},
{
  q: "Select the most appropriate synonym of the word: Querulous",
  options: [
    "Contented",
    "Complaining",
    "Cheerful",
    "Pleasant"
  ],
  answer: 1
},
{
  q: "Choose the correct meaning of the idiom: Out and about",
  options: [
    "At home resting",
    "Doing errands",
    "Active and socializing",
    "Traveling to distant places"
  ],
  answer: 2
},
{
  q: "Select the most appropriate antonym of the word: Retired",
  options: [
    "Active",
    "Idle",
    "Resting",
    "Inactive"
  ],
  answer: 0
},
{
  q: "Select the most appropriate antonym of the word: Veracity",
  options: [
    "Falsehood",
    "Truth",
    "Accuracy",
    "Authenticity"
  ],
  answer: 0
},
{
  q: "Choose the correct one-word substitute for:\nA style of writing characterized by exaggerated sentimentality",
  options: [
    "Sentimentalism",
    "Romanticism",
    "Melodrama",
    "Expressionism"
  ],
  answer: 2
},
{
  q: "Which sentence contains a misspelled word?",
  options: [
    "Many believed the new millennium would bring great change, but some felt embarrassed when their predictions failed.",
    "He didn’t want to embarrass himself at the start of the new millenium.",
    "The celebration of the millennium was truly unforgettable, though it did embarrass a few politicians.",
    "She didn’t expect the event to embarrass her during the millennium gala."
  ],
  answer: 1
},
{
  q: "Select the option that expresses the given sentence in indirect voice.\nThe student said, “I have been reading this book for a month, but I still do not understand the last chapter, which is the most crucial part.”",
  options: [
    "The student said that he had been reading that book for a month, but he still did not understand the last chapter, which was the most crucial part.",
    "The student said that he has been reading this book for a month, but he still does not understand the last chapter, which is the most crucial part.",
    "The student said that he had been reading this book for a month, but he still did not understand the last chapter, which is the most crucial part.",
    "The student said that he had been reading that book for a month, but he still does not understand the last chapter, which is the most crucial part."
  ],
  answer: 0
},
{
  q: "Select the option that expresses the given sentence in indirect voice.\nThe doctor said, “If you exercise regularly, you will feel better.”",
  options: [
    "The doctor said that if you exercised regularly, you would feel better.",
    "The doctor said that if he/she exercised regularly, he/she would feel better.",
    "The doctor said that if one exercises regularly, one will feel better.",
    "The doctor said that if one exercised regularly, one would feel better."
  ],
  answer: 3
},
{
  q: "Which sentence contains a misspelled word?",
  options: [
    "We went to a new restaurant downtown.",
    "That restaurant serves delicious food.",
    "Is there a resturant nearby that’s open late?",
    "They own the oldest restaurant in town."
  ],
  answer: 2
},
{
  q: "Choose the most suitable option to replace the highlighted part of the sentence.\nAll the jury members was divided in their opinions.",
  options: [
    "All the jury member were divided",
    "All the jury were divided between their opinions",
    "All the juries have divided in their opinions",
    "All the jury members were divided"
  ],
  answer: 3
},
{
  q: "Choose the most suitable option to replace the highlighted part of the sentence.\nOne should do one’s duty.",
  options: [
    "One should do one’s duty",
    "One should do ones duties",
    "One should do once duties",
    "One should do their duty"
  ],
  answer: 0
},
{
  q: "Choose the correct passive voice transformation of the sentence.\nYou must finish your homework.",
  options: [
    "Your homework must be finished by you.",
    "Your homework must being finished by you.",
    "Your homework must have been finished by you.",
    "Your homework is must be finished by you."
  ],
  answer: 0
},
{
  q: "Choose the correct passive voice transformation of the sentence.\nThe new intern had forgotten to lock the laboratory door before leaving.",
  options: [
    "The laboratory door was forgotten to be locked by the new intern before leaving.",
    "The laboratory door had been forgotten to be locked by the new intern before leaving.",
    "The laboratory door has been forgotten to be locked by the new intern before leaving.",
    "The laboratory door had forgotten to lock by the new intern before leaving."
  ],
  answer: 1
},
{
  q: "Select the option that expresses the given sentence in direct voice.\nThe student told his friend that he had to go home that day because he had been feeling unwell since the day before, and his parents were waiting for him.",
  options: [
    "“I have to go home today because I was feeling unwell since yesterday, and my parents are waiting for me,” the student said to his friend.",
    "“I had to go home that day because I had been feeling unwell since the day before, and my parents were waiting for me,” the student said to his friend.",
    "“I must go home today because I was feeling unwell since yesterday, and my parents were waiting for me,” the student said to his friend.",
    "“I have to go home today because I had been feeling unwell since yesterday, and my parents were waiting for me,” the student said to his friend."
  ],
  answer: 1
},
{
  q: "Passage for Q20–Q24\nIndia’s tryst with chess is deeply interwoven with its cultural heritage, for the game itself originally known as “chaturanga” emerged on the subcontinent over a millennium ago. Initially conceived as a strategic simulation of warfare, “chaturanga” evolved into shatranj under Persian influence before migrating westward, ultimately becoming modern chess.\n\nIn the contemporary era, India’s prominence on the global chess stage began with the meteoric ascent of Viswanathan Anand in the late 20th century. Anand’s fluid playing style, amalgamating tactical precision with positional depth, earned him the World Chess Championship title multiple times and inspired a generation of players. His success catalyzed institutional investment in chess, leading to an upsurge in tournaments, academies, and grassroots initiatives across the country.\n\nThe 21st century has witnessed the emergence of prodigies such as Rameshbabu Praggnanandhaa, D. Gukesh, and Nihal Sarin, whose exploits in international arenas have positioned India as a formidable force in team events like the Chess Olympiad. Digital platforms have further accelerated talent development, enabling young aspirants to spar with grandmasters worldwide, thus refining their strategic acumen from an early age.\n\nToday, India stands not merely as the cradle of chess’s origins but as an influential power shaping its future. This continuity from ancient invention to modern innovation underscores the nation’s enduring legacy in the chess world.\n\nThe phrase “enabling young aspirants to spar with grandmasters worldwide” functions as:",
  options: [
    "Noun clause",
    "Adverbial phrase",
    "Participle phrase",
    "Absolute phrase"
  ],
  answer: 2
},
{
  q: "Identify the voice in “Initially conceived as a strategic simulation of warfare.”",
  options: [
    "Active voice",
    "Passive voice",
    "Middle voice",
    "Causative voice"
  ],
  answer: 1
},
{
  q: "The word “meteoric” most nearly means:",
  options: [
    "Gradual and steady",
    "Rapid and spectacular",
    "Temporary and weak",
    "Hidden and secretive"
  ],
  answer: 1
},
{
  q: "The word “acumen” means:",
  options: [
    "Sharpness in understanding",
    "Physical strength",
    "Luck",
    "Longevity"
  ],
  answer: 0
},
{
  q: "According to the passage, what factor in recent years has accelerated talent development in India?",
  options: [
    "Increase in board game shops",
    "Digital platforms allowing global practice",
    "Mandatory school chess programs",
    "Reduced emphasis on international events"
  ],
  answer: 1
},
{
  q: "Which of the following pairs of homonyms can be used to fill in the blanks most suitably?\nThe interior designer received a ___ from her client for choosing furniture that would perfectly ___ the walls and floors.",
  options: [
    "counsel, council",
    "complement, compliment",
    "compliment, complement",
    "council, counsel"
  ],
  answer: 2
}
];
// State    
let currentIndex = 0;    
let answers = new Array(QUESTIONS.length).fill(null);     
let reviewed = new Array(QUESTIONS.length).fill(false); // mark-for-review flags    
let timeLeft = TOTAL_TIME;    
let timerId = null;    
let submitted = false;    
let isPaused = false;    
let reviewMode = false; // true when user is viewing a single question from analysis    
const app = document.getElementById("app");    

function formatTime(sec){ 
  const m = Math.floor(sec/60), s = sec%60; 
  return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"00")}`; 
}    

function getStats(){    
  const s = { total: QUESTIONS.length, attempted:0, correct:0, wrong:0, marks:0 };    
  QUESTIONS.forEach((q,i)=>{    
    const a = answers[i];    
    if (a !== null){    
      s.attempted++;    
      if (a === q.answer){ s.correct++; s.marks += MARKS_CORRECT; }    
      else { s.wrong++; s.marks += MARKS_WRONG; }    
    }    
  });    
  return s;    
}    

function renderQuestion(){    
  if (reviewMode) isPaused = true;    
  if (submitted && !reviewMode){ renderResult(); return; }    

  const q = QUESTIONS[currentIndex];    
  const progressPercent = ((currentIndex+1)/QUESTIONS.length)*100;    
  const selected = answers[currentIndex];    

  const stripHtml = QUESTIONS.map((_,idx)=>{    
    let cls = "qchip";    
    if (idx===currentIndex) cls += " current";    
    if (answers[idx] !== null) cls += " answered";    
    if (reviewed[idx]) cls += " reviewed";    
    return `<button class="${cls}" data-q="${idx}">${idx+1}</button>`;    
  }).join("");    

  app.innerHTML = `    
    <div class="header">    
      <div class="title">English Sectional Mock</div>    
      <div class="timer-wrap">    
        <div class="timer">⏱ ${formatTime(timeLeft)}</div>    
        <button class="pause-btn" id="pauseBtn">${isPaused ? "Resume":"Pause"}</button>    
      </div>    
    </div>    

    <div class="subheader">    
      <span>+${MARKS_CORRECT} for correct, ${MARKS_WRONG} for wrong</span>    
      <span class="badge">English</span>    
    </div>    

    <div class="progress-bar-bg">
      <div class="progress-bar-fill" style="width:${progressPercent}%"></div>
    </div>    

    <div class="q-strip">
      <div class="q-strip-inner">${stripHtml}</div>
    </div>    

    <div class="section-tag">English</div>    

    <div class="question-text">Q${currentIndex+1}. ${q.q}</div>    

    <div class="options">    
      ${q.options.map((opt,idx)=>{    
        let classes = "";    
        if (selected === idx && !reviewMode) classes = "selected";    
        if (reviewMode){    
          if (idx === q.answer) classes = "correct";    
          else if (selected === idx && selected !== q.answer) classes = "wrong";    
        } else {    
          if (selected === idx) classes = "selected";    
        }    
        return `<button class="option-btn ${classes}" data-index="${idx}">${String.fromCharCode(65+idx)}. ${opt}</button>`;    
      }).join("")}    
    </div>    

    <div class="footer">    
      <div class="question-count">Question ${currentIndex+1} of ${QUESTIONS.length}</div>    
      <div class="nav-buttons">    
        <button class="nav-btn" id="prevBtn"${currentIndex===0 ? " disabled":""}>Prev</button>    
        ${ reviewMode ? `<button class="back-btn" id="backAnalysis">Back to Analysis</button>` : "" }    
        <button class="nav-btn" id="markBtn">Mark</button>    
        <button class="next-btn" id="nextBtn">${currentIndex+1===QUESTIONS.length? "Submit":"Next"}</button>    
      </div>    
    </div>    
  `;    

  document.getElementById("pauseBtn").addEventListener("click", ()=>{    
    if (reviewMode){ isPaused = true; renderQuestion(); return; }    
    isPaused = !isPaused;    
    renderQuestion();    
  });    

  document.querySelectorAll(".qchip").forEach(b=>{    
    b.addEventListener("click", ()=>{ 
      currentIndex = Number(b.dataset.q); 
      reviewMode = false; 
      renderQuestion(); 
    });    
  });    

  document.querySelectorAll(".option-btn").forEach(b=>{    
    b.addEventListener("click", ()=>{    
      const idx = Number(b.dataset.index);    
      if (reviewMode) return;    
      answers[currentIndex] = idx;    
      renderQuestion();    
    });    
  });    

  document.getElementById("prevBtn").addEventListener("click", ()=>{    
    if (currentIndex>0){ currentIndex--; reviewMode = false; renderQuestion(); }    
  });    

  document.getElementById("nextBtn").addEventListener("click", ()=>{    
    if (currentIndex+1 < QUESTIONS.length){ currentIndex++; reviewMode = false; renderQuestion(); }    
    else { submitted = true; reviewMode = false; renderResult(); }    
  });    

  const markBtnEl = document.getElementById('markBtn');    
  if (markBtnEl){    
    markBtnEl.addEventListener('click', ()=>{    
      reviewed[currentIndex] = !reviewed[currentIndex];    
      markBtnEl.textContent = reviewed[currentIndex] ? 'Marked' : 'Mark';    
      renderQuestion();    
    });    
  }    

  const back = document.getElementById("backAnalysis");    
  if (back){    
    back.addEventListener("click", ()=>{    
      reviewMode = false;    
      submitted = true;    
      renderResult();    
    });    
  }    
}    

function renderResult(){    
  if (timerId){ clearInterval(timerId); timerId = null; }    
  const s = getStats();    
  const maxMarks = s.total * MARKS_CORRECT;    
  const percentage = maxMarks>0 ? Math.round((s.marks/maxMarks)*100):0;    
  let remark = percentage>=80 ? "Excellent! 💯"
             : percentage>=60 ? "Good! 👍"
             : percentage>=40 ? "Average. Can improve 🙂"
             : "Needs more practice 💪";    

  let qaHtml = "";    
  QUESTIONS.forEach((q,i)=>{    
    const user = answers[i];    
    const correctIdx = q.answer;    
    const isSkipped = user === null;    
    const isCorrect = !isSkipped && user === correctIdx;    
    const pill = isSkipped ? `<span class="pill-gray">Skipped</span>` 
               : isCorrect ? `<span class="pill-green">Correct</span>` 
               : `<span class="pill-red">Wrong</span>`;    

    const userText = isSkipped ? "<em>Skipped</em>" : `${String.fromCharCode(65+user)}. ${q.options[user]}`;    
    const correctText = `${String.fromCharCode(65+correctIdx)}. ${q.options[correctIdx]}`;    

    qaHtml += `    
      <div class="qa-card" id="qa-${i}">    
        <div class="qa-question"><strong>Q${i+1}.</strong> ${q.q}</div>    
        <div class="qa-answer-row">    
          <div><span class="label">Your answer:</span> ${userText}</div>    
          <div><span class="label">Correct answer:</span> ${correctText}</div>    
          <div style="margin-left:auto">${pill}</div>    
        </div>    
        <div style="margin-top:8px;text-align:right">    
          <button class="review-btn" data-q="${i}">Review Q</button>    
        </div>    
      </div>    
    `;    
  });    

  app.innerHTML = `    
    <div class="result">    
      <h2>English Section Analysis</h2>    
      <div class="tiny">9-minute sectional mock completed</div>    

      <div class="card">    
        <div class="card-title">Overall Performance</div>    
        <div class="stat-row"><span>Total Questions</span><span>${s.total}</span></div>    
        <div class="stat-row"><span>Attempted</span><span>${s.attempted}</span></div>    
        <div class="stat-row"><span>Correct</span><span>${s.correct}</span></div>    
        <div class="stat-row"><span>Wrong</span><span>${s.wrong}</span></div>    
        <div class="stat-row"><span>Marks</span><span>${s.marks.toFixed(2)} / ${maxMarks}</span></div>    
        <div class="stat-row"><span>Percentage</span><span>${percentage}%</span></div>    
        <div class="stat-row"><span>Remark</span><span>${remark}</span></div>    
      </div>    

      <div style="margin-top:8px;margin-bottom:8px">    
        <div class="card-title">Question-wise Review</div>    
        ${qaHtml}    
      </div>    

      <button class="restart-btn" id="restartBtn">Retake Section</button>    
      <div class="tiny">Timer will restart from 9 minutes</div>    
    </div>    
  `;    

  document.querySelectorAll(".review-btn").forEach(b=>{    
    b.addEventListener("click", ()=>{    
      const idx = Number(b.dataset.q);    
      currentIndex = idx;    
      reviewMode = true;    
      submitted = false;    
      isPaused = true;    
      renderQuestion();    
    });    
  });    

  document.getElementById("restartBtn").addEventListener("click", ()=>{    
    currentIndex = 0;    
    answers = new Array(QUESTIONS.length).fill(null);    
    timeLeft = TOTAL_TIME;    
    submitted = false;    
    isPaused = false;    
    reviewMode = false;    
    startTimer();    
    renderQuestion();    
  });    
}    

function startTimer(){    
  if (timerId) clearInterval(timerId);    
  timerId = setInterval(()=>{    
    if (!isPaused && !submitted && !reviewMode){    
      timeLeft--;    
      if (timeLeft <= 0){    
        submitted = true;    
        reviewMode = false;    
        renderResult();    
        return;    
      }    
    }    
    const el = document.querySelector(".timer");    
    if (el) el.textContent = "⏱ " + formatTime(timeLeft);    
  }, 1000);    
}    

startTimer();    
renderQuestion();
</script>  </body>    </html>
