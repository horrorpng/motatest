<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>English Sectional Mock</title>
  <style>
    *{box-sizing:border-box;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    body{margin:0;background:#f3f4f6;display:flex;justify-content:center;padding:16px}
    .container{max-width:520px;width:100%;background:#fff;margin-top:24px;padding:20px;border-radius:16px;box-shadow:0 10px 25px rgba(0,0,0,.08)}
    .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px}
    .title{font-size:18px;font-weight:600}
    .timer-wrap{display:flex;align-items:center;gap:6px}
    .timer{padding:4px 10px;border-radius:999px;background:#111827;color:#fff;font-size:13px}
    .pause-btn{border-radius:999px;border:1px solid #d1d5db;padding:4px 10px;font-size:12px;background:#f9fafb;cursor:pointer}
    .subheader{font-size:12px;color:#6b7280;margin-bottom:10px;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap}
    .badge{display:inline-block;padding:2px 8px;border-radius:999px;background:#e5e7eb;font-size:11px;color:#374151}
    .progress-bar-bg{width:100%;height:6px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-bottom:8px}
    .progress-bar-fill{height:100%;width:0%;background:#3b82f6;transition:width .2s}
    .q-strip{margin-bottom:10px;overflow-x:auto;padding:4px 0}
    .q-strip-inner{display:flex;gap:4px;padding-bottom:2px}
    .qchip{min-width:26px;height:26px;border-radius:999px;border:1px solid #d1d5db;background:#f9fafb;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
    .qchip.answered{background:#dbeafe;border-color:#2563eb;color:#1d4ed8}
    .qchip.current{background:#111827;border-color:#111827;color:#fff}
    .qchip.reviewed{background:rebeccapurple!important;color:#fff!important;border-color:rebeccapurple!important}
    .section-tag{font-size:12px;padding:3px 8px;border-radius:999px;background:#eef2ff;color:#3730a3;display:inline-block;margin-bottom:6px}
    .question-text{font-size:15px;margin-bottom:10px;white-space:pre-line}
    .options{display:grid;gap:8px}
    .option-btn{width:100%;border-radius:999px;padding:9px 14px;border:1px solid #d1d5db;background:#fff;text-align:left;font-size:14px;cursor:pointer}
    .option-btn.selected{background:#2563eb;color:#fff;border-color:#1d4ed8}
    .option-btn.correct{background:#dcfce7;color:#166534;border-color:#16a34a}
    .option-btn.wrong{background:#fee2e2;color:#b91c1c;border-color:#ef4444}
    .footer{margin-top:16px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
    .nav-buttons{display:flex;gap:6px;flex:1}
    .nav-btn,.next-btn{border-radius:999px;padding:9px 12px;border:none;font-size:13px;cursor:pointer}
    .nav-btn{background:#e5e7eb}
    .next-btn{flex:1;background:#111827;color:#fff}
    .result h2{text-align:center}
  </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
/* English Sectional Mock – 13 Minutes */
const TOTAL_TIME = 13 * 60;
const MARKS_CORRECT = 2;
const MARKS_WRONG = -0.5;
const QUESTIONS = [
  {
    q: "The sentence below has errors in two parts which are highlighted in bold. Identify the same.\nMayfair Cinema is to close at December(A), it was announced yesterday. The owner of the building, Mr Thomas, will have sold it(B) to a firm of builders(C), who are going to build some flats on the site(D).",
    options: ["AB", "CD", "BD", "AC"],
    answer: 1
  },
  {
    q: "Fill in the blank with the most appropriate preposition:\nThe committee is not authorized to act ____ behalf of the organization in international matters.",
    options: ["in", "for", "on", "upon"],
    answer: 2
  },
  {
    q: "Select the most appropriate synonym of the word: SAGACIOUS",
    options: ["Foolish", "Insightful", "Naïve", "Confused"],
    answer: 1
  },
  {
    q: "Choose the correctly spelt word:",
    options: ["Lieutenant", "Lieutenannt", "Lutenant", "Lteunant"],
    answer: 0
  },
  {
    q: "Which of the following sentences uses the word “found” with a different meaning from the others?",
    options: [
      "The company was found in 1995.",
      "He found his keys under the couch.",
      "They found a new species of fish.",
      "She found the answer to the difficult question."
    ],
    answer: 0
  },
  {
    q: "Choose the correct meaning of the idiom: Are on a collision course",
    options: [
      "Heading towards an inevitable conflict",
      "Moving towards each other in a peaceful way",
      "Working together on a project",
      "Having different goals but no conflict"
    ],
    answer: 0
  },
  {
    q: "Choose the correct meaning of the idiom: Straight from the horse’s mouth",
    options: [
      "From an anonymous tip",
      "Hearing it from someone else",
      "Reading it from a book",
      "From a reliable source"
    ],
    answer: 3
  },
  {
    q: "Choose the correct one-word substitute for:\nA place where an army is trained.",
    options: ["Fortress", "Cave", "Barracks", "Residence"],
    answer: 2
  },
  {
    q: "Select the most appropriate antonym of the word: Monstrous",
    options: ["Beautiful", "Odd", "Abnormal", "Strange"],
    answer: 0
  },
  {
    q: "Select the most appropriate antonym of the word: Elucidate",
    options: ["Clarify", "Explain", "Obscure", "Illuminate"],
    answer: 2
  },
  {
    q: "Choose the option that is the most appropriate conversion of the following sentence into Direct Speech:\nThey asked whether the meeting was likely to begin soon or be delayed further.",
    options: [
      "They asked, “Was the meeting likely to begin soon or be delayed further?”",
      "They asked, “Is the meeting likely to begin shortly or be delayed more?”",
      "They asked, “Will the meeting likely begin soon or is it to be delayed further?”",
      "They asked, “Is the meeting likely to begin soon or will it be delayed further?”"
    ],
    answer: 3
  },
  {
    q: "Which sentence contains a misspelled word?",
    options: [
      "Clear communication is crucial for avoiding misunderstandings in any negotiation.",
      "It is crucial to double-check your work before submitting it.",
      "The manager highlighted the crucial role of teamwork in achieving success.",
      "Meeting the deadline was crucial for securing the contract."
    ],
    answer: 1
  },
  {
    q: "Select the option that expresses the given sentence in indirect voice:\n“We will bake a cake for the party,” my friends told me.",
    options: [
      "My friends told me that they would bake a cake for the party.",
      "My friends told me that we would bake a cake for the party.",
      "My friends told me that they will bake a cake for the party.",
      "My friends told me that we will bake a cake for the party."
    ],
    answer: 0
  },
  {
    q: "Change the following sentence into the Active form:\nHad the restoration work been being done on the antique cabinet for months before you arrived?",
    options: [
      "Had they been doing the restoration work on the antique cabinet for months before you arrived?",
      "They had been doing the restoration work on the antique cabinet for months before you arrived?",
      "Had the antique cabinet been doing the restoration work for months before you arrived?",
      "Were they doing the restoration work on the antique cabinet for months before you arrived?"
    ],
    answer: 0
  },
  {
    q: "Choose the most suitable option to replace the highlighted part of the sentence:\nAfter a long marathon, the woman was out of breathe.",
    options: ["out of breath", "out of breathing", "out of air", "out of breathes"],
    answer: 0
  },
  {
    q: "Choose the correct passive voice transformation of the sentence:\nSomeone has left the door open.",
    options: [
      "The door has been left open.",
      "The door was left open.",
      "The door is left open.",
      "The door had been left open."
    ],
    answer: 0
  },
  {
    q: "PASSAGE (FOR Q17 TO Q21)\nHimachal Pradesh, renowned for its pristine natural beauty and ecological diversity, is presently confronting an unprecedented wave of environmental degradation. The rampant deforestation, exacerbated by unregulated urban expansion and burgeoning tourism, has precipitated a critical decline in the region’s biodiversity. Once dense forests, which acted as vital carbon sinks and habitats for myriad species, are now alarmingly fragmented, undermining ecological balance.\nThe overexploitation of natural resources, especially timber and water, compounded by erratic weather patterns attributed to climate change, further exacerbates the fragile ecosystem’s vulnerability. The proliferation of construction activities along riverbanks and hill slopes has triggered soil erosion and heightened the risk of landslides, endangering both human settlements and wildlife habitats. Additionally, the indiscriminate dumping of waste, including plastic, in ecologically sensitive zones aggravates pollution levels and jeopardizes aquatic life.\nAnother pivotal reason behind this environmental deterioration is the inadequacy of stringent environmental policies and their enforcement. Despite awareness campaigns, local governance often succumbs to developmental pressures, side lining sustainability considerations. The nexus between economic growth and environmental neglect is glaring, necessitating immediate remedial measures.\nIn summation, Himachal Pradesh’s environmental crisis is a multifaceted problem, rooted in anthropogenic activities and climatic disturbances. Concerted efforts encompassing policy reform, community engagement, and scientific interventions are imperative to restore the state’s ecological sanctity.\n\nIn the sentence “The proliferation of construction activities along riverbanks and hill slopes has triggered soil erosion,” identify the type of noun “proliferation” is:",
    options: ["Proper noun", "Abstract noun", "Concrete noun", "Collective noun"],
    answer: 1
  },
  {
    q: "Identify the type of clause in the sentence:\n“Once dense forests, which acted as vital carbon sinks and habitats for myriad species, are now alarmingly fragmented.”",
    options: ["Adjective clause", "Adverb clause", "Noun clause", "Relative clause"],
    answer: 3
  },
  {
    q: "The word “exacerbates” in the passage most nearly means:",
    options: ["Alleviates", "Worsens", "Mitigates", "Initiates"],
    answer: 1
  },
  {
    q: "The phrase “ecological sanctity” refers to:",
    options: [
      "The purity and sacredness of the environment",
      "The exploitation of natural resources",
      "Urban development projects",
      "Government policies"
    ],
    answer: 0
  },
  {
    q: "According to the passage, which factor does NOT contribute to environmental degradation in Himachal Pradesh?",
    options: [
      "Erratic weather patterns",
      "Strict enforcement of environmental policies",
      "Unregulated urban expansion",
      "Indiscriminate dumping of waste"
    ],
    answer: 1
  },
  {
    q: "Rearrange the following sentences to form a meaningful and grammatically correct paragraph:\nP. The kettle whistled, its steam a thin column in the quiet kitchen.\nQ. He placed a teabag in his favourite mug, pouring the hot water over it.\nR. A splash of milk clouded the dark liquid, turning it a comforting caramel colour.\nS. With the first warm sip, the morning felt a little more manageable.",
    options: ["P, Q, R, S", "S, Q, R, P", "Q, S, P, R", "R, Q, P, S"],
    answer: 0
  },
  {
    q: "Rearrange the following sentence parts to form a meaningful and grammatically correct paragraph:\nP. The research team recruited a large group of qualified participants for the study.\nQ. At the end of the trial, they analysed the results to determine the drug’s effectiveness.\nR. The team monitored the health and progress of all the participants for several months.\nS. Half the participants received the new drug, while the other half received a placebo.",
    options: ["R, S, Q, P", "P, S, R, Q", "Q, S, R, P", "R, S, P, Q"],
    answer: 1
  },
  {
    q: "Which word is nearest in meaning to intently?\nThe man listened intently, drawn in by the astrologer’s authority.",
    options: ["Distantly", "Lazily", "Closely", "Casually"],
    answer: 2
  },
  {
    q: "Which term refers to a society that is free of poverty and suffering?",
    options: ["Utopia", "Democracy", "Monarchy", "Oligarchy"],
    answer: 0
  }
];
// State    
let currentIndex = 0;    
let answers = new Array(QUESTIONS.length).fill(null);     
let reviewed = new Array(QUESTIONS.length).fill(false); // mark-for-review flags    
let timeLeft = TOTAL_TIME;    
let timerId = null;    
let submitted = false;    
let isPaused = false;    
let reviewMode = false; // true when user is viewing a single question from analysis    
const app = document.getElementById("app");    

function formatTime(sec){ 
  const m = Math.floor(sec/60), s = sec%60; 
  return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"00")}`; 
}    

function getStats(){    
  const s = { total: QUESTIONS.length, attempted:0, correct:0, wrong:0, marks:0 };    
  QUESTIONS.forEach((q,i)=>{    
    const a = answers[i];    
    if (a !== null){    
      s.attempted++;    
      if (a === q.answer){ s.correct++; s.marks += MARKS_CORRECT; }    
      else { s.wrong++; s.marks += MARKS_WRONG; }    
    }    
  });    
  return s;    
}    

function renderQuestion(){    
  if (reviewMode) isPaused = true;    
  if (submitted && !reviewMode){ renderResult(); return; }    

  const q = QUESTIONS[currentIndex];    
  const progressPercent = ((currentIndex+1)/QUESTIONS.length)*100;    
  const selected = answers[currentIndex];    

  const stripHtml = QUESTIONS.map((_,idx)=>{    
    let cls = "qchip";    
    if (idx===currentIndex) cls += " current";    
    if (answers[idx] !== null) cls += " answered";    
    if (reviewed[idx]) cls += " reviewed";    
    return `<button class="${cls}" data-q="${idx}">${idx+1}</button>`;    
  }).join("");    

  app.innerHTML = `    
    <div class="header">    
      <div class="title">English Sectional Mock</div>    
      <div class="timer-wrap">    
        <div class="timer">⏱ ${formatTime(timeLeft)}</div>    
        <button class="pause-btn" id="pauseBtn">${isPaused ? "Resume":"Pause"}</button>    
      </div>    
    </div>    

    <div class="subheader">    
      <span>+${MARKS_CORRECT} for correct, ${MARKS_WRONG} for wrong</span>    
      <span class="badge">English</span>    
    </div>    

    <div class="progress-bar-bg">
      <div class="progress-bar-fill" style="width:${progressPercent}%"></div>
    </div>    

    <div class="q-strip">
      <div class="q-strip-inner">${stripHtml}</div>
    </div>    

    <div class="section-tag">English</div>    

    <div class="question-text">Q${currentIndex+1}. ${q.q}</div>    

    <div class="options">    
      ${q.options.map((opt,idx)=>{    
        let classes = "";    
        if (selected === idx && !reviewMode) classes = "selected";    
        if (reviewMode){    
          if (idx === q.answer) classes = "correct";    
          else if (selected === idx && selected !== q.answer) classes = "wrong";    
        } else {    
          if (selected === idx) classes = "selected";    
        }    
        return `<button class="option-btn ${classes}" data-index="${idx}">${String.fromCharCode(65+idx)}. ${opt}</button>`;    
      }).join("")}    
    </div>    

    <div class="footer">    
      <div class="question-count">Question ${currentIndex+1} of ${QUESTIONS.length}</div>    
      <div class="nav-buttons">    
        <button class="nav-btn" id="prevBtn"${currentIndex===0 ? " disabled":""}>Prev</button>    
        ${ reviewMode ? `<button class="back-btn" id="backAnalysis">Back to Analysis</button>` : "" }    
        <button class="nav-btn" id="markBtn">Mark</button>    
        <button class="next-btn" id="nextBtn">${currentIndex+1===QUESTIONS.length? "Submit":"Next"}</button>    
      </div>    
    </div>    
  `;    

  document.getElementById("pauseBtn").addEventListener("click", ()=>{    
    if (reviewMode){ isPaused = true; renderQuestion(); return; }    
    isPaused = !isPaused;    
    renderQuestion();    
  });    

  document.querySelectorAll(".qchip").forEach(b=>{    
    b.addEventListener("click", ()=>{ 
      currentIndex = Number(b.dataset.q); 
      reviewMode = false; 
      renderQuestion(); 
    });    
  });    

  document.querySelectorAll(".option-btn").forEach(b=>{    
    b.addEventListener("click", ()=>{    
      const idx = Number(b.dataset.index);    
      if (reviewMode) return;    
      answers[currentIndex] = idx;    
      renderQuestion();    
    });    
  });    

  document.getElementById("prevBtn").addEventListener("click", ()=>{    
    if (currentIndex>0){ currentIndex--; reviewMode = false; renderQuestion(); }    
  });    

  document.getElementById("nextBtn").addEventListener("click", ()=>{    
    if (currentIndex+1 < QUESTIONS.length){ currentIndex++; reviewMode = false; renderQuestion(); }    
    else { submitted = true; reviewMode = false; renderResult(); }    
  });    

  const markBtnEl = document.getElementById('markBtn');    
  if (markBtnEl){    
    markBtnEl.addEventListener('click', ()=>{    
      reviewed[currentIndex] = !reviewed[currentIndex];    
      markBtnEl.textContent = reviewed[currentIndex] ? 'Marked' : 'Mark';    
      renderQuestion();    
    });    
  }    

  const back = document.getElementById("backAnalysis");    
  if (back){    
    back.addEventListener("click", ()=>{    
      reviewMode = false;    
      submitted = true;    
      renderResult();    
    });    
  }    
}    

function renderResult(){    
  if (timerId){ clearInterval(timerId); timerId = null; }    
  const s = getStats();    
  const maxMarks = s.total * MARKS_CORRECT;    
  const percentage = maxMarks>0 ? Math.round((s.marks/maxMarks)*100):0;    
  let remark = percentage>=80 ? "Excellent! 💯"
             : percentage>=60 ? "Good! 👍"
             : percentage>=40 ? "Average. Can improve 🙂"
             : "Needs more practice 💪";    

  let qaHtml = "";    
  QUESTIONS.forEach((q,i)=>{    
    const user = answers[i];    
    const correctIdx = q.answer;    
    const isSkipped = user === null;    
    const isCorrect = !isSkipped && user === correctIdx;    
    const pill = isSkipped ? `<span class="pill-gray">Skipped</span>` 
               : isCorrect ? `<span class="pill-green">Correct</span>` 
               : `<span class="pill-red">Wrong</span>`;    

    const userText = isSkipped ? "<em>Skipped</em>" : `${String.fromCharCode(65+user)}. ${q.options[user]}`;    
    const correctText = `${String.fromCharCode(65+correctIdx)}. ${q.options[correctIdx]}`;    

    qaHtml += `    
      <div class="qa-card" id="qa-${i}">    
        <div class="qa-question"><strong>Q${i+1}.</strong> ${q.q}</div>    
        <div class="qa-answer-row">    
          <div><span class="label">Your answer:</span> ${userText}</div>    
          <div><span class="label">Correct answer:</span> ${correctText}</div>    
          <div style="margin-left:auto">${pill}</div>    
        </div>    
        <div style="margin-top:8px;text-align:right">    
          <button class="review-btn" data-q="${i}">Review Q</button>    
        </div>    
      </div>    
    `;    
  });    

  app.innerHTML = `    
    <div class="result">    
      <h2>English Section Analysis</h2>    
      <div class="tiny">9-minute sectional mock completed</div>    

      <div class="card">    
        <div class="card-title">Overall Performance</div>    
        <div class="stat-row"><span>Total Questions</span><span>${s.total}</span></div>    
        <div class="stat-row"><span>Attempted</span><span>${s.attempted}</span></div>    
        <div class="stat-row"><span>Correct</span><span>${s.correct}</span></div>    
        <div class="stat-row"><span>Wrong</span><span>${s.wrong}</span></div>    
        <div class="stat-row"><span>Marks</span><span>${s.marks.toFixed(2)} / ${maxMarks}</span></div>    
        <div class="stat-row"><span>Percentage</span><span>${percentage}%</span></div>    
        <div class="stat-row"><span>Remark</span><span>${remark}</span></div>    
      </div>    

      <div style="margin-top:8px;margin-bottom:8px">    
        <div class="card-title">Question-wise Review</div>    
        ${qaHtml}    
      </div>    

      <button class="restart-btn" id="restartBtn">Retake Section</button>    
      <div class="tiny">Timer will restart from 9 minutes</div>    
    </div>    
  `;    

  document.querySelectorAll(".review-btn").forEach(b=>{    
    b.addEventListener("click", ()=>{    
      const idx = Number(b.dataset.q);    
      currentIndex = idx;    
      reviewMode = true;    
      submitted = false;    
      isPaused = true;    
      renderQuestion();    
    });    
  });    

  document.getElementById("restartBtn").addEventListener("click", ()=>{    
    currentIndex = 0;    
    answers = new Array(QUESTIONS.length).fill(null);    
    timeLeft = TOTAL_TIME;    
    submitted = false;    
    isPaused = false;    
    reviewMode = false;    
    startTimer();    
    renderQuestion();    
  });    
}    

function startTimer(){    
  if (timerId) clearInterval(timerId);    
  timerId = setInterval(()=>{    
    if (!isPaused && !submitted && !reviewMode){    
      timeLeft--;    
      if (timeLeft <= 0){    
        submitted = true;    
        reviewMode = false;    
        renderResult();    
        return;    
      }    
    }    
    const el = document.querySelector(".timer");    
    if (el) el.textContent = "⏱ " + formatTime(timeLeft);    
  }, 1000);    
}    

startTimer();    
renderQuestion();
</script>  </body>    </html>
