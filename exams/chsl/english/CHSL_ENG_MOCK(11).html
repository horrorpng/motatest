<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>English Sectional Mock</title>
  <style>
    *{box-sizing:border-box;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    body{margin:0;background:#f3f4f6;display:flex;justify-content:center;padding:16px}
    .container{max-width:520px;width:100%;background:#fff;margin-top:24px;padding:20px;border-radius:16px;box-shadow:0 10px 25px rgba(0,0,0,.08)}
    .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px}
    .title{font-size:18px;font-weight:600}
    .timer-wrap{display:flex;align-items:center;gap:6px}
    .timer{padding:4px 10px;border-radius:999px;background:#111827;color:#fff;font-size:13px}
    .pause-btn{border-radius:999px;border:1px solid #d1d5db;padding:4px 10px;font-size:12px;background:#f9fafb;cursor:pointer}
    .subheader{font-size:12px;color:#6b7280;margin-bottom:10px;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap}
    .badge{display:inline-block;padding:2px 8px;border-radius:999px;background:#e5e7eb;font-size:11px;color:#374151}
    .progress-bar-bg{width:100%;height:6px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-bottom:8px}
    .progress-bar-fill{height:100%;width:0%;background:#3b82f6;transition:width .2s}
    .q-strip{margin-bottom:10px;overflow-x:auto;padding:4px 0}
    .q-strip-inner{display:flex;gap:4px;padding-bottom:2px}
    .qchip{min-width:26px;height:26px;border-radius:999px;border:1px solid #d1d5db;background:#f9fafb;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
    .qchip.answered{background:#dbeafe;border-color:#2563eb;color:#1d4ed8}
    .qchip.current{background:#111827;border-color:#111827;color:#fff}
    .qchip.reviewed{background:rebeccapurple!important;color:#fff!important;border-color:rebeccapurple!important}
    .section-tag{font-size:12px;padding:3px 8px;border-radius:999px;background:#eef2ff;color:#3730a3;display:inline-block;margin-bottom:6px}
    .question-text{font-size:15px;margin-bottom:10px;white-space:pre-line}
    .options{display:grid;gap:8px}
    .option-btn{width:100%;border-radius:999px;padding:9px 14px;border:1px solid #d1d5db;background:#fff;text-align:left;font-size:14px;cursor:pointer}
    .option-btn.selected{background:#2563eb;color:#fff;border-color:#1d4ed8}
    .option-btn.correct{background:#dcfce7;color:#166534;border-color:#16a34a}
    .option-btn.wrong{background:#fee2e2;color:#b91c1c;border-color:#ef4444}
    .footer{margin-top:16px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
    .nav-buttons{display:flex;gap:6px;flex:1}
    .nav-btn,.next-btn{border-radius:999px;padding:9px 12px;border:none;font-size:13px;cursor:pointer}
    .nav-btn{background:#e5e7eb}
    .next-btn{flex:1;background:#111827;color:#fff}
    .result h2{text-align:center}
  </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
/* English Sectional Mock – 13 Minutes */
const TOTAL_TIME = 13 * 60;
const MARKS_CORRECT = 2;
const MARKS_WRONG = -0.5;
const QUESTIONS = [
{
  q: "Identify the incorrect sentence.",
  options: [
    "All of the cities in California is being affected by the rain yesterday.",
    "Seven people were rescued from the fire.",
    "Half of the boxes are empty.",
    "Some of the TV programs are very interesting."
  ],
  answer: 0
},
{
  q: "Which of the following is free from grammatical error?",
  options: [
    "She is senior than me by two years.",
    "He was prevented to go out by the guard.",
    "I look forward to meet you soon.",
    "The manager, as well as his assistants, was late."
  ],
  answer: 3
},
{
  q: "Fill in the blank with the most appropriate preposition.\nThe witness was reluctant to testify ___ fear of retaliation.",
  options: [
    "from",
    "of",
    "for",
    "in"
  ],
  answer: 1
},
{
  q: "Fill in the blank with the most appropriate conjunction.\n___ the forecast warned of heavy rain, the outdoor ceremony proceeded as planned.",
  options: [
    "Even though",
    "Because",
    "Unless",
    "Since"
  ],
  answer: 0
},
{
  q: "Choose the correctly spelt word.",
  options: [
    "Humorious",
    "Humorous",
    "Humorus",
    "Hummorous"
  ],
  answer: 1
},
{
  q: "Choose the best option to replace the underlined part to improve the sentence.\nThis paper is made up of wood.",
  options: [
    "made of wood",
    "made up from wood",
    "made from wood",
    "No substitution"
  ],
  answer: 2
},
{
  q: "Select the sentence containing the homonym of the highlighted word.\nThe hunters waited patiently for the duck to land.",
  options: [
    "The mother duck led her ducklings to the water.",
    "The children loved to feed the ducks at the park.",
    "He had to duck to avoid the low-hanging branch.",
    "The artist painted a beautiful picture of a duck."
  ],
  answer: 2
},
{
  q: "Choose the correct one-word substitute for:\n“Showing deep respect”",
  options: [
    "Reverent",
    "Polite",
    "Courteous",
    "Deferential"
  ],
  answer: 0
},
{
  q: "Select the most appropriate antonym of the word: Deleterious",
  options: [
    "Harmless",
    "Dangerous",
    "Toxic",
    "Poisonous"
  ],
  answer: 0
},
{
  q: "Choose the option that is the most appropriate conversion into Direct Speech.\nHe said that the machine operates automatically but had malfunctioned that morning.",
  options: [
    "He said, “The machine operated automatically but had malfunctioned that morning.”",
    "He said, “The machine operated automatically but had malfunctioned this morning.”",
    "He said, “The machine operates automatically, but malfunctioned this morning.”",
    "He said, “The machine is operating automatically, but malfunctioned this morning.”"
  ],
  answer: 2
},
{
  q: "Which sentence contains a misspelt word?",
  options: [
    "The teacher asked the students to annotate the text.",
    "Please annotate any important points in the article.",
    "He forgot to annotate the key sections before submitting the paper.",
    "Use a pencil to annotate your notes neatly."
  ],
  answer: 2
},
{
  q: "Change the following sentence into the Active form.\nThe students were made to write a detailed summary of the complex text.",
  options: [
    "They made the students write a detailed summary of the complex text.",
    "The students wrote a detailed summary of the complex text.",
    "They made the students to write a detailed summary of the complex text.",
    "The students were made that they should write a detailed summary."
  ],
  answer: 0
},
{
  q: "Select the option that expresses the given sentence in indirect voice.\nShe said, “I have completed my task.”",
  options: [
    "She said that she has completed her task.",
    "She said that she had completed her task.",
    "She said that I had completed my task.",
    "She said that I have completed her task."
  ],
  answer: 1
},
{
  q: "Choose the correct passive voice transformation.\nDid the renowned author finally release the highly anticipated sequel to his award-winning novel?",
  options: [
    "Was the highly anticipated sequel to his award-winning novel finally released by the renowned author?",
    "Has the highly anticipated sequel to his award-winning novel been finally released by the renowned author?",
    "Was the highly anticipated sequel to his award-winning novel released by the renowned author?",
    "Did the highly anticipated sequel to his award-winning novel be released by the renowned author?"
  ],
  answer: 2
},
{
  q: "PASSAGE (For Q15–Q19)\nMetals are often associated with industrial use and construction, but many of them play a vital role in the human body and are essential for maintaining good health. These bio-essential metals, present in small quantities, are involved in crucial physiological functions such as oxygen transport, enzyme activity, and immune response.\n\nIron, for instance, is a key component of hemoglobin, the protein in red blood cells that carries oxygen throughout the body. A deficiency in iron can lead to anemia, fatigue, and reduced cognitive function. Zinc supports the immune system, aids in wound healing, and is necessary for proper growth and development, especially in children.\n\nCalcium, though more commonly known as a mineral, is technically a metal. It is essential for strong bones and teeth, and also plays a role in muscle contraction and nerve transmission. Similarly, magnesium contributes to over 300 enzyme reactions in the body and supports muscle and nerve function.\n\nCopper aids in the formation of red blood cells and supports cardiovascular health, while selenium, a trace metal, functions as an antioxidant, protecting cells from damage.\n\nHowever, it is important to note that while these metals are beneficial in small amounts, excessive intake either through supplements or environmental exposure can be toxic.\n\nMaintaining a balanced diet rich in fruits, vegetables, whole grains, and lean proteins typically provides sufficient amounts of these essential metals. Understanding their role highlights the intricate connection between nutrition, chemistry, and overall health.\n\nChoose the correct negative interrogative form.\n“It is essential for strong bones and teeth, and also plays a role in muscle contraction and nerve transmission.”",
  options: [
    "It isn’t essential for strong bones and teeth, and also plays a role in muscle contraction and nerve transmission.",
    "It should not be essential for strong bones and teeth, and also plays a role in muscle contraction and nerve transmission.",
    "Shouldn’t it be essential for strong bones and teeth, and also plays a role in muscle contraction and nerve transmission?",
    "Isn’t it essential for strong bones and teeth, and doesn’t it play a role in muscle contraction and nerve transmission?"
  ],
  answer: 3
},
{
  q: "Choose the correct interrogative form.\n“Copper aids in the formation of red blood cells.”",
  options: [
    "Do copper aid in the formation of red blood cells?",
    "Is copper aiding in the formation of red blood cells?",
    "Does copper aid in the formation of red blood cells?",
    "Has copper aided in the formation of red blood cells?"
  ],
  answer: 2
},
{
  q: "Which of the following is the most appropriate antonym of “sufficient” as used in the passage?",
  options: [
    "Inadequate",
    "Abundant",
    "Excessive",
    "Absent"
  ],
  answer: 0
},
{
  q: "Which idiom best describes the importance of consuming essential metals in the right amounts?",
  options: [
    "A bitter pill to swallow",
    "Too much of a good thing",
    "A stitch in time saves nine",
    "Every cloud has a silver lining"
  ],
  answer: 1
},
{
  q: "What role of iron is described in the passage?",
  options: [
    "It strengthens bones and teeth",
    "It supports muscle relaxation",
    "It protects cells from damage",
    "It helps in the formation of hemoglobin which transports oxygen"
  ],
  answer: 3
},
{
  q: "Rearrange the following sentence parts to form a meaningful paragraph.\nP. He started leaning big branches on a solid wood after discovering a natural hollow in the ground.\nQ. He made a frame for the walls by weaving smaller branches between the major supports.\nR. To provide insulation, he covered the structure with thick grass and leaf layers.\nS. He was sheltered from the rain and wind within the completed shelter.",
  options: [
    "R, Q, P, S",
    "P, S, R, Q",
    "P, Q, R, S",
    "S, Q, R, P"
  ],
  answer: 2
},
{
  q: "Rearrange the following sentences to form a meaningful paragraph.\nP. A wonder of contemporary urban planning was the city’s new public transport system.\nQ. It was intended to lessen traffic jams and enhance the city’s air quality overall.\nR. The project needed significant government investment and took more than ten years to finish.\nS. The system was a massive hit with commuters, even if it was expensive.",
  options: [
    "R, Q, P, S",
    "P, Q, R, S",
    "S, Q, R, P",
    "Q, P, R, S"
  ],
  answer: 1
},
{
  q: "What is the antonym of “Sanguine”?",
  options: [
    "Cheerful",
    "Melancholic",
    "Confident",
    "Buoyant"
  ],
  answer: 1
},
{
  q: "Which word is nearest in meaning to “shamefacedly”?",
  options: [
    "Boldly",
    "Embarrassedly",
    "Arrogantly",
    "Cheerfully"
  ],
  answer: 1
},
{
  q: "Which of the following pairs of homonyms can be used to fill the blanks most suitably?\nAs the lonely ___ wailed over the lake, the pale ___ rose slowly, casting silver ripples on the water.",
  options: [
    "lune, loon",
    "loon, loon",
    "lune, lune",
    "loon, lune"
  ],
  answer: 3
},
{
  q: "What does the word “gourmand” mean?",
  options: [
    "A person who loves and enjoys food",
    "A person who avoids food",
    "A type of exotic food",
    "A type of cooking technique"
  ],
  answer: 0
}
];
// State    
let currentIndex = 0;    
let answers = new Array(QUESTIONS.length).fill(null);     
let reviewed = new Array(QUESTIONS.length).fill(false); // mark-for-review flags    
let timeLeft = TOTAL_TIME;    
let timerId = null;    
let submitted = false;    
let isPaused = false;    
let reviewMode = false; // true when user is viewing a single question from analysis    
const app = document.getElementById("app");    

function formatTime(sec){ 
  const m = Math.floor(sec/60), s = sec%60; 
  return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"00")}`; 
}    

function getStats(){    
  const s = { total: QUESTIONS.length, attempted:0, correct:0, wrong:0, marks:0 };    
  QUESTIONS.forEach((q,i)=>{    
    const a = answers[i];    
    if (a !== null){    
      s.attempted++;    
      if (a === q.answer){ s.correct++; s.marks += MARKS_CORRECT; }    
      else { s.wrong++; s.marks += MARKS_WRONG; }    
    }    
  });    
  return s;    
}    

function renderQuestion(){    
  if (reviewMode) isPaused = true;    
  if (submitted && !reviewMode){ renderResult(); return; }    

  const q = QUESTIONS[currentIndex];    
  const progressPercent = ((currentIndex+1)/QUESTIONS.length)*100;    
  const selected = answers[currentIndex];    

  const stripHtml = QUESTIONS.map((_,idx)=>{    
    let cls = "qchip";    
    if (idx===currentIndex) cls += " current";    
    if (answers[idx] !== null) cls += " answered";    
    if (reviewed[idx]) cls += " reviewed";    
    return `<button class="${cls}" data-q="${idx}">${idx+1}</button>`;    
  }).join("");    

  app.innerHTML = `    
    <div class="header">    
      <div class="title">English Sectional Mock</div>    
      <div class="timer-wrap">    
        <div class="timer">⏱ ${formatTime(timeLeft)}</div>    
        <button class="pause-btn" id="pauseBtn">${isPaused ? "Resume":"Pause"}</button>    
      </div>    
    </div>    

    <div class="subheader">    
      <span>+${MARKS_CORRECT} for correct, ${MARKS_WRONG} for wrong</span>    
      <span class="badge">English</span>    
    </div>    

    <div class="progress-bar-bg">
      <div class="progress-bar-fill" style="width:${progressPercent}%"></div>
    </div>    

    <div class="q-strip">
      <div class="q-strip-inner">${stripHtml}</div>
    </div>    

    <div class="section-tag">English</div>    

    <div class="question-text">Q${currentIndex+1}. ${q.q}</div>    

    <div class="options">    
      ${q.options.map((opt,idx)=>{    
        let classes = "";    
        if (selected === idx && !reviewMode) classes = "selected";    
        if (reviewMode){    
          if (idx === q.answer) classes = "correct";    
          else if (selected === idx && selected !== q.answer) classes = "wrong";    
        } else {    
          if (selected === idx) classes = "selected";    
        }    
        return `<button class="option-btn ${classes}" data-index="${idx}">${String.fromCharCode(65+idx)}. ${opt}</button>`;    
      }).join("")}    
    </div>    

    <div class="footer">    
      <div class="question-count">Question ${currentIndex+1} of ${QUESTIONS.length}</div>    
      <div class="nav-buttons">    
        <button class="nav-btn" id="prevBtn"${currentIndex===0 ? " disabled":""}>Prev</button>    
        ${ reviewMode ? `<button class="back-btn" id="backAnalysis">Back to Analysis</button>` : "" }    
        <button class="nav-btn" id="markBtn">Mark</button>    
        <button class="next-btn" id="nextBtn">${currentIndex+1===QUESTIONS.length? "Submit":"Next"}</button>    
      </div>    
    </div>    
  `;    

  document.getElementById("pauseBtn").addEventListener("click", ()=>{    
    if (reviewMode){ isPaused = true; renderQuestion(); return; }    
    isPaused = !isPaused;    
    renderQuestion();    
  });    

  document.querySelectorAll(".qchip").forEach(b=>{    
    b.addEventListener("click", ()=>{ 
      currentIndex = Number(b.dataset.q); 
      reviewMode = false; 
      renderQuestion(); 
    });    
  });    

  document.querySelectorAll(".option-btn").forEach(b=>{    
    b.addEventListener("click", ()=>{    
      const idx = Number(b.dataset.index);    
      if (reviewMode) return;    
      answers[currentIndex] = idx;    
      renderQuestion();    
    });    
  });    

  document.getElementById("prevBtn").addEventListener("click", ()=>{    
    if (currentIndex>0){ currentIndex--; reviewMode = false; renderQuestion(); }    
  });    

  document.getElementById("nextBtn").addEventListener("click", ()=>{    
    if (currentIndex+1 < QUESTIONS.length){ currentIndex++; reviewMode = false; renderQuestion(); }    
    else { submitted = true; reviewMode = false; renderResult(); }    
  });    

  const markBtnEl = document.getElementById('markBtn');    
  if (markBtnEl){    
    markBtnEl.addEventListener('click', ()=>{    
      reviewed[currentIndex] = !reviewed[currentIndex];    
      markBtnEl.textContent = reviewed[currentIndex] ? 'Marked' : 'Mark';    
      renderQuestion();    
    });    
  }    

  const back = document.getElementById("backAnalysis");    
  if (back){    
    back.addEventListener("click", ()=>{    
      reviewMode = false;    
      submitted = true;    
      renderResult();    
    });    
  }    
}    

function renderResult(){    
  if (timerId){ clearInterval(timerId); timerId = null; }    
  const s = getStats();    
  const maxMarks = s.total * MARKS_CORRECT;    
  const percentage = maxMarks>0 ? Math.round((s.marks/maxMarks)*100):0;    
  let remark = percentage>=80 ? "Excellent! 💯"
             : percentage>=60 ? "Good! 👍"
             : percentage>=40 ? "Average. Can improve 🙂"
             : "Needs more practice 💪";    

  let qaHtml = "";    
  QUESTIONS.forEach((q,i)=>{    
    const user = answers[i];    
    const correctIdx = q.answer;    
    const isSkipped = user === null;    
    const isCorrect = !isSkipped && user === correctIdx;    
    const pill = isSkipped ? `<span class="pill-gray">Skipped</span>` 
               : isCorrect ? `<span class="pill-green">Correct</span>` 
               : `<span class="pill-red">Wrong</span>`;    

    const userText = isSkipped ? "<em>Skipped</em>" : `${String.fromCharCode(65+user)}. ${q.options[user]}`;    
    const correctText = `${String.fromCharCode(65+correctIdx)}. ${q.options[correctIdx]}`;    

    qaHtml += `    
      <div class="qa-card" id="qa-${i}">    
        <div class="qa-question"><strong>Q${i+1}.</strong> ${q.q}</div>    
        <div class="qa-answer-row">    
          <div><span class="label">Your answer:</span> ${userText}</div>    
          <div><span class="label">Correct answer:</span> ${correctText}</div>    
          <div style="margin-left:auto">${pill}</div>    
        </div>    
        <div style="margin-top:8px;text-align:right">    
          <button class="review-btn" data-q="${i}">Review Q</button>    
        </div>    
      </div>    
    `;    
  });    

  app.innerHTML = `    
    <div class="result">    
      <h2>English Section Analysis</h2>    
      <div class="tiny">9-minute sectional mock completed</div>    

      <div class="card">    
        <div class="card-title">Overall Performance</div>    
        <div class="stat-row"><span>Total Questions</span><span>${s.total}</span></div>    
        <div class="stat-row"><span>Attempted</span><span>${s.attempted}</span></div>    
        <div class="stat-row"><span>Correct</span><span>${s.correct}</span></div>    
        <div class="stat-row"><span>Wrong</span><span>${s.wrong}</span></div>    
        <div class="stat-row"><span>Marks</span><span>${s.marks.toFixed(2)} / ${maxMarks}</span></div>    
        <div class="stat-row"><span>Percentage</span><span>${percentage}%</span></div>    
        <div class="stat-row"><span>Remark</span><span>${remark}</span></div>    
      </div>    

      <div style="margin-top:8px;margin-bottom:8px">    
        <div class="card-title">Question-wise Review</div>    
        ${qaHtml}    
      </div>    

      <button class="restart-btn" id="restartBtn">Retake Section</button>    
      <div class="tiny">Timer will restart from 9 minutes</div>    
    </div>    
  `;    

  document.querySelectorAll(".review-btn").forEach(b=>{    
    b.addEventListener("click", ()=>{    
      const idx = Number(b.dataset.q);    
      currentIndex = idx;    
      reviewMode = true;    
      submitted = false;    
      isPaused = true;    
      renderQuestion();    
    });    
  });    

  document.getElementById("restartBtn").addEventListener("click", ()=>{    
    currentIndex = 0;    
    answers = new Array(QUESTIONS.length).fill(null);    
    timeLeft = TOTAL_TIME;    
    submitted = false;    
    isPaused = false;    
    reviewMode = false;    
    startTimer();    
    renderQuestion();    
  });    
}    

function startTimer(){    
  if (timerId) clearInterval(timerId);    
  timerId = setInterval(()=>{    
    if (!isPaused && !submitted && !reviewMode){    
      timeLeft--;    
      if (timeLeft <= 0){    
        submitted = true;    
        reviewMode = false;    
        renderResult();    
        return;    
      }    
    }    
    const el = document.querySelector(".timer");    
    if (el) el.textContent = "⏱ " + formatTime(timeLeft);    
  }, 1000);    
}    

startTimer();    
renderQuestion();
</script>  </body>    </html>
