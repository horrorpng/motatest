<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>English Sectional Mock</title>
  <style>
    *{box-sizing:border-box;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    body{margin:0;background:#f3f4f6;display:flex;justify-content:center;padding:16px}
    .container{max-width:520px;width:100%;background:#fff;margin-top:24px;padding:20px;border-radius:16px;box-shadow:0 10px 25px rgba(0,0,0,.08)}
    .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px}
    .title{font-size:18px;font-weight:600}
    .timer-wrap{display:flex;align-items:center;gap:6px}
    .timer{padding:4px 10px;border-radius:999px;background:#111827;color:#fff;font-size:13px}
    .pause-btn{border-radius:999px;border:1px solid #d1d5db;padding:4px 10px;font-size:12px;background:#f9fafb;cursor:pointer}
    .subheader{font-size:12px;color:#6b7280;margin-bottom:10px;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap}
    .badge{display:inline-block;padding:2px 8px;border-radius:999px;background:#e5e7eb;font-size:11px;color:#374151}
    .progress-bar-bg{width:100%;height:6px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-bottom:8px}
    .progress-bar-fill{height:100%;width:0%;background:#3b82f6;transition:width .2s}
    .q-strip{margin-bottom:10px;overflow-x:auto;padding:4px 0}
    .q-strip-inner{display:flex;gap:4px;padding-bottom:2px}
    .qchip{min-width:26px;height:26px;border-radius:999px;border:1px solid #d1d5db;background:#f9fafb;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
    .qchip.answered{background:#dbeafe;border-color:#2563eb;color:#1d4ed8}
    .qchip.current{background:#111827;border-color:#111827;color:#fff}
    .qchip.reviewed{background:rebeccapurple!important;color:#fff!important;border-color:rebeccapurple!important}
    .section-tag{font-size:12px;padding:3px 8px;border-radius:999px;background:#eef2ff;color:#3730a3;display:inline-block;margin-bottom:6px}
    .question-text{font-size:15px;margin-bottom:10px;white-space:pre-line}
    .options{display:grid;gap:8px}
    .option-btn{width:100%;border-radius:999px;padding:9px 14px;border:1px solid #d1d5db;background:#fff;text-align:left;font-size:14px;cursor:pointer}
    .option-btn.selected{background:#2563eb;color:#fff;border-color:#1d4ed8}
    .option-btn.correct{background:#dcfce7;color:#166534;border-color:#16a34a}
    .option-btn.wrong{background:#fee2e2;color:#b91c1c;border-color:#ef4444}
    .footer{margin-top:16px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
    .nav-buttons{display:flex;gap:6px;flex:1}
    .nav-btn,.next-btn{border-radius:999px;padding:9px 12px;border:none;font-size:13px;cursor:pointer}
    .nav-btn{background:#e5e7eb}
    .next-btn{flex:1;background:#111827;color:#fff}
    .result h2{text-align:center}
  </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
/* English Sectional Mock – 13 Minutes */
const TOTAL_TIME = 13 * 60;
const MARKS_CORRECT = 2;
const MARKS_WRONG = -0.5;
const QUESTIONS = [
  {
    q: "Identify the incorrect sentence.",
    options: [
      "Beautiful furniture made the house elegant.",
      "How much money do you want?",
      "Please hurry. It’s getting late.",
      "He is a very good friend of mine."
    ],
    answer: 0
  },
  {
    q: "Identify the part of the sentence that contains a grammatical error.\nThe company’s data, which has been collected and analyzed for over a decade, support the conclusion that the new strategy is ineffective.",
    options: [
      "The company’s data",
      "which has been collected and analyzed",
      "for over a decade",
      "support the conclusion that the new strategy is ineffective"
    ],
    answer: 3
  },
  {
    q: "Fill in the blank with the most appropriate preposition:\nThe policy was implemented ___ accordance with international standards.",
    options: ["in", "by", "to", "under"],
    answer: 0
  },
  {
    q: "Fill in the blank with the most appropriate conjunction:\nShe must complete the registration by Friday, ___ she won’t be allowed to participate.",
    options: ["or else", "unless", "and", "since"],
    answer: 0
  },
  {
    q: "Choose the correctly spelt word:",
    options: ["Abeyance", "Abeyance", "Abeyance", "Abeyence"],
    answer: 1
  },
  {
    q: "Select the most appropriate antonym of the word Exquisite.",
    options: ["Beautiful", "Coarse", "Delicate", "Fine"],
    answer: 1
  },
  {
    q: "Choose the correct one-word substitute for:\nA government by a single person.",
    options: ["Democracy", "Oligarchy", "Autocracy", "Plutocracy"],
    answer: 2
  },
  {
    q: "Choose the most suitable option to replace the highlighted part of the sentence:\nPeter did not speak to no one in the room.",
    options: ["anyone", "no one", "somebody", "nobody"],
    answer: 0
  },
  {
    q: "Select the most appropriate antonym of the word Euphemism.",
    options: ["Understatement", "Directness", "Substitute", "Vagueness"],
    answer: 1
  },
  {
    q: "Choose the correct indirect narration of the following statement:\nThe mother said to the child, “Don’t touch the hot iron.”",
    options: [
      "The mother warned the child not to touch the hot iron.",
      "The mother told the child not to touched the hot iron.",
      "The mother warned the child not to be touching the hot iron.",
      "The mother requested the child never to touching the hot iron."
    ],
    answer: 0
  },
  {
    q: "Change the following sentence into Active form:\nThe intricate design will have been conceived by a team of engineers.",
    options: [
      "A team of engineers will conceive the intricate design.",
      "The intricate design will conceive a team of engineers.",
      "A team of engineers will have conceived the intricate design.",
      "The intricate design has been conceived by a team of engineers."
    ],
    answer: 2
  },
  {
    q: "Fill in the blank with the correctly spelt word meaning\n“excessively talkative, especially about trivial matters.”\nThe ___ neighbor kept everyone awake with his endless stories.",
    options: ["garrulous", "garralious", "garrulous", "garrolous"],
    answer: 2
  },
  {
    q: "Choose the most suitable option to replace the highlighted part of the sentence:\nAs soon as Gita opened the umbrella, a scorpion fell about of it.",
    options: ["fell up from", "fell off from", "fell out of", "fallen down of"],
    answer: 2
  },
  {
    q: "Select the option that expresses the given sentence in direct voice.\nThe young artist confidently announced that she could paint a masterpiece if she were given enough time.",
    options: [
      "The young artist announced, “I can paint a masterpiece if I am given enough time.”",
      "The young artist said, “She could paint a masterpiece if she was given enough time.”",
      "The young artist announced, “I could paint a masterpiece if I were given enough time.”",
      "The young artist said, “I can paint a masterpiece if I were given enough time.”"
    ],
    answer: 0
  },
  {
    q: "Choose the correct passive voice transformation of the sentence:\nThe diligent worker performs his tasks with meticulous care every single day.",
    options: [
      "His tasks are performed with meticulous care by the diligent worker every single day.",
      "His tasks were performed with meticulous care by the diligent worker every single day.",
      "His tasks are being performed with meticulous care by the diligent worker every single day.",
      "The diligent worker is performed with meticulous care by his tasks every single day."
    ],
    answer: 0
  },
  {
    q: "PASSAGE (For Q16–Q20)\nIn an era where urban dwellers frequently lament their paucity of time, cultivating plants that demand minimal vigilance have become almost axiomatic for those seeking verdant comfort within their domiciles. Certain species, endowed with remarkable resilience, can subsist with negligible intervention, thereby mitigating the anxieties often concomitant with horticulture.\nThe snake plant (Sansevieria trifasciata), for instance, is virtually indomitable. It thrives in variegated light conditions and can endure erratic watering schedules without forfeiting its structural elegance. Likewise, the pothos (Epipremnum aureum), with its luxuriant, trailing foliage, adapts to both dimly lit corners and well-illuminated spaces, performing photosynthesis with an almost stoic persistence.\nAnother exemplar is the aloe vera, whose succulent leaves serve as reservoirs of moisture, rendering frequent irrigation superfluous. Beyond its ornamental utility, aloe vera confers medicinal benefits, its gel being esteemed for dermal amelioration. Even the ZZ plant (Zamioculcas zamiifolia), seemingly sculpted from emerald wax, flourishes in neglect, tolerating prolonged droughts and low luminosity without capitulating to decay.\nThe allure of such flora lies not merely in their aesthetic contribution but in their implicit lesson: resilience is as captivating as fragility. In cultivating them, one engages in a quiet partnership where human oversight is ancillary, and nature’s intrinsic mechanisms orchestrate survival with effortless grace.\n\nConvert the sentence into interrogative form:\n“Plants that demand minimal vigilance have become almost axiomatic for those seeking verdant comfort within their domiciles.”",
    options: [
      "Have plants that demand minimal vigilance become almost axiomatic for those seeking verdant comfort within their domiciles?",
      "Do plants that demand minimal vigilance have become almost axiomatic?",
      "Why plants that demand minimal vigilance have become axiomatic?",
      "Is plants that demand minimal vigilance become axiomatic?"
    ],
    answer: 0
  },
  {
    q: "Rewrite the sentence in passive voice without changing the tense:\n“The snake plant can endure erratic watering schedules without forfeiting its structural elegance.”",
    options: [
      "Erratic watering schedules can be endured by the snake plant without forfeiting its structural elegance.",
      "Erratic watering schedules are endured by the snake plant.",
      "Erratic watering schedules were endured by the snake plant.",
      "Erratic watering schedules will be endured by the snake plant."
    ],
    answer: 0
  },
  {
    q: "The word “capitulating” most nearly means:",
    options: ["Surrendering", "Strengthening", "Multiplying", "Regenerating"],
    answer: 0
  },
  {
    q: "The phrase “verdant comfort” refers to:",
    options: [
      "Emotional rest from green scenery",
      "A luxurious sofa",
      "Comfort provided by greenery",
      "Artificial decoration"
    ],
    answer: 2
  },
  {
    q: "According to the passage, which plant provides a functional benefit derived from a substance within its leaves?",
    options: ["Pothos", "Aloe vera", "Snake plant", "ZZ plant"],
    answer: 1
  },
  {
    q: "Rearrange the following sentences to form a meaningful paragraph:\nP. He fuelled his body for the rigorous workout by adhering to a particular diet and drinking plenty of water.\nQ. He pushed his body to its limits by going on lengthy runs on the weekends.\nR. Throughout the week, he increased his endurance by running shorter distances.\nS. He was tired but elated when he crossed the finish line on race day.",
    options: ["Q, R, P, S", "P, R, Q, S", "S, R, Q, P", "R, S, Q, P"],
    answer: 1
  },
  {
    q: "Rearrange the following sentences to form a meaningful paragraph:\nP. The public park in the city was converted into a lively community centre with green areas and recreational facilities.\nQ. It was a much-awaited project that united the community and had a friendly environment.\nR. The park soon became a favourite destination for families, fitness buffs, and nature enthusiasts.\nS. Volunteers and local businesses joined hands to donate resources such as plants, benches, and tools.",
    options: ["P, S, Q, R", "Q, S, R, P", "S, P, R, Q", "R, S, P, Q"],
    answer: 0
  },
  {
    q: "Which word is closest in meaning to parlour?",
    options: ["Tunnel", "Balcony", "Room", "Garden"],
    answer: 2
  },
  {
    q: "Which of the following pairs of homonyms can be used to fill in the blanks most suitably?\nAs his ___ ring slipped from his finger and sank into the pond, a curious ___ paddled over and, mistaking it for food, swallowed it whole.",
    options: ["symbol, cymbal", "signet, cygnet", "cygnet, signet", "cymbal, symbol"],
    answer: 1
  },
  {
    q: "What is the term for someone who believes in more than one God?",
    options: ["Monotheist", "Atheist", "Polytheist", "Agnostic"],
    answer: 2
  }
];
// State    
let currentIndex = 0;    
let answers = new Array(QUESTIONS.length).fill(null);     
let reviewed = new Array(QUESTIONS.length).fill(false); // mark-for-review flags    
let timeLeft = TOTAL_TIME;    
let timerId = null;    
let submitted = false;    
let isPaused = false;    
let reviewMode = false; // true when user is viewing a single question from analysis    
const app = document.getElementById("app");    

function formatTime(sec){ 
  const m = Math.floor(sec/60), s = sec%60; 
  return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"00")}`; 
}    

function getStats(){    
  const s = { total: QUESTIONS.length, attempted:0, correct:0, wrong:0, marks:0 };    
  QUESTIONS.forEach((q,i)=>{    
    const a = answers[i];    
    if (a !== null){    
      s.attempted++;    
      if (a === q.answer){ s.correct++; s.marks += MARKS_CORRECT; }    
      else { s.wrong++; s.marks += MARKS_WRONG; }    
    }    
  });    
  return s;    
}    

function renderQuestion(){    
  if (reviewMode) isPaused = true;    
  if (submitted && !reviewMode){ renderResult(); return; }    

  const q = QUESTIONS[currentIndex];    
  const progressPercent = ((currentIndex+1)/QUESTIONS.length)*100;    
  const selected = answers[currentIndex];    

  const stripHtml = QUESTIONS.map((_,idx)=>{    
    let cls = "qchip";    
    if (idx===currentIndex) cls += " current";    
    if (answers[idx] !== null) cls += " answered";    
    if (reviewed[idx]) cls += " reviewed";    
    return `<button class="${cls}" data-q="${idx}">${idx+1}</button>`;    
  }).join("");    

  app.innerHTML = `    
    <div class="header">    
      <div class="title">English Sectional Mock</div>    
      <div class="timer-wrap">    
        <div class="timer">⏱ ${formatTime(timeLeft)}</div>    
        <button class="pause-btn" id="pauseBtn">${isPaused ? "Resume":"Pause"}</button>    
      </div>    
    </div>    

    <div class="subheader">    
      <span>+${MARKS_CORRECT} for correct, ${MARKS_WRONG} for wrong</span>    
      <span class="badge">English</span>    
    </div>    

    <div class="progress-bar-bg">
      <div class="progress-bar-fill" style="width:${progressPercent}%"></div>
    </div>    

    <div class="q-strip">
      <div class="q-strip-inner">${stripHtml}</div>
    </div>    

    <div class="section-tag">English</div>    

    <div class="question-text">Q${currentIndex+1}. ${q.q}</div>    

    <div class="options">    
      ${q.options.map((opt,idx)=>{    
        let classes = "";    
        if (selected === idx && !reviewMode) classes = "selected";    
        if (reviewMode){    
          if (idx === q.answer) classes = "correct";    
          else if (selected === idx && selected !== q.answer) classes = "wrong";    
        } else {    
          if (selected === idx) classes = "selected";    
        }    
        return `<button class="option-btn ${classes}" data-index="${idx}">${String.fromCharCode(65+idx)}. ${opt}</button>`;    
      }).join("")}    
    </div>    

    <div class="footer">    
      <div class="question-count">Question ${currentIndex+1} of ${QUESTIONS.length}</div>    
      <div class="nav-buttons">    
        <button class="nav-btn" id="prevBtn"${currentIndex===0 ? " disabled":""}>Prev</button>    
        ${ reviewMode ? `<button class="back-btn" id="backAnalysis">Back to Analysis</button>` : "" }    
        <button class="nav-btn" id="markBtn">Mark</button>    
        <button class="next-btn" id="nextBtn">${currentIndex+1===QUESTIONS.length? "Submit":"Next"}</button>    
      </div>    
    </div>    
  `;    

  document.getElementById("pauseBtn").addEventListener("click", ()=>{    
    if (reviewMode){ isPaused = true; renderQuestion(); return; }    
    isPaused = !isPaused;    
    renderQuestion();    
  });    

  document.querySelectorAll(".qchip").forEach(b=>{    
    b.addEventListener("click", ()=>{ 
      currentIndex = Number(b.dataset.q); 
      reviewMode = false; 
      renderQuestion(); 
    });    
  });    

  document.querySelectorAll(".option-btn").forEach(b=>{    
    b.addEventListener("click", ()=>{    
      const idx = Number(b.dataset.index);    
      if (reviewMode) return;    
      answers[currentIndex] = idx;    
      renderQuestion();    
    });    
  });    

  document.getElementById("prevBtn").addEventListener("click", ()=>{    
    if (currentIndex>0){ currentIndex--; reviewMode = false; renderQuestion(); }    
  });    

  document.getElementById("nextBtn").addEventListener("click", ()=>{    
    if (currentIndex+1 < QUESTIONS.length){ currentIndex++; reviewMode = false; renderQuestion(); }    
    else { submitted = true; reviewMode = false; renderResult(); }    
  });    

  const markBtnEl = document.getElementById('markBtn');    
  if (markBtnEl){    
    markBtnEl.addEventListener('click', ()=>{    
      reviewed[currentIndex] = !reviewed[currentIndex];    
      markBtnEl.textContent = reviewed[currentIndex] ? 'Marked' : 'Mark';    
      renderQuestion();    
    });    
  }    

  const back = document.getElementById("backAnalysis");    
  if (back){    
    back.addEventListener("click", ()=>{    
      reviewMode = false;    
      submitted = true;    
      renderResult();    
    });    
  }    
}    

function renderResult(){    
  if (timerId){ clearInterval(timerId); timerId = null; }    
  const s = getStats();    
  const maxMarks = s.total * MARKS_CORRECT;    
  const percentage = maxMarks>0 ? Math.round((s.marks/maxMarks)*100):0;    
  let remark = percentage>=80 ? "Excellent! 💯"
             : percentage>=60 ? "Good! 👍"
             : percentage>=40 ? "Average. Can improve 🙂"
             : "Needs more practice 💪";    

  let qaHtml = "";    
  QUESTIONS.forEach((q,i)=>{    
    const user = answers[i];    
    const correctIdx = q.answer;    
    const isSkipped = user === null;    
    const isCorrect = !isSkipped && user === correctIdx;    
    const pill = isSkipped ? `<span class="pill-gray">Skipped</span>` 
               : isCorrect ? `<span class="pill-green">Correct</span>` 
               : `<span class="pill-red">Wrong</span>`;    

    const userText = isSkipped ? "<em>Skipped</em>" : `${String.fromCharCode(65+user)}. ${q.options[user]}`;    
    const correctText = `${String.fromCharCode(65+correctIdx)}. ${q.options[correctIdx]}`;    

    qaHtml += `    
      <div class="qa-card" id="qa-${i}">    
        <div class="qa-question"><strong>Q${i+1}.</strong> ${q.q}</div>    
        <div class="qa-answer-row">    
          <div><span class="label">Your answer:</span> ${userText}</div>    
          <div><span class="label">Correct answer:</span> ${correctText}</div>    
          <div style="margin-left:auto">${pill}</div>    
        </div>    
        <div style="margin-top:8px;text-align:right">    
          <button class="review-btn" data-q="${i}">Review Q</button>    
        </div>    
      </div>    
    `;    
  });    

  app.innerHTML = `    
    <div class="result">    
      <h2>English Section Analysis</h2>    
      <div class="tiny">9-minute sectional mock completed</div>    

      <div class="card">    
        <div class="card-title">Overall Performance</div>    
        <div class="stat-row"><span>Total Questions</span><span>${s.total}</span></div>    
        <div class="stat-row"><span>Attempted</span><span>${s.attempted}</span></div>    
        <div class="stat-row"><span>Correct</span><span>${s.correct}</span></div>    
        <div class="stat-row"><span>Wrong</span><span>${s.wrong}</span></div>    
        <div class="stat-row"><span>Marks</span><span>${s.marks.toFixed(2)} / ${maxMarks}</span></div>    
        <div class="stat-row"><span>Percentage</span><span>${percentage}%</span></div>    
        <div class="stat-row"><span>Remark</span><span>${remark}</span></div>    
      </div>    

      <div style="margin-top:8px;margin-bottom:8px">    
        <div class="card-title">Question-wise Review</div>    
        ${qaHtml}    
      </div>    

      <button class="restart-btn" id="restartBtn">Retake Section</button>    
      <div class="tiny">Timer will restart from 9 minutes</div>    
    </div>    
  `;    

  document.querySelectorAll(".review-btn").forEach(b=>{    
    b.addEventListener("click", ()=>{    
      const idx = Number(b.dataset.q);    
      currentIndex = idx;    
      reviewMode = true;    
      submitted = false;    
      isPaused = true;    
      renderQuestion();    
    });    
  });    

  document.getElementById("restartBtn").addEventListener("click", ()=>{    
    currentIndex = 0;    
    answers = new Array(QUESTIONS.length).fill(null);    
    timeLeft = TOTAL_TIME;    
    submitted = false;    
    isPaused = false;    
    reviewMode = false;    
    startTimer();    
    renderQuestion();    
  });    
}    

function startTimer(){    
  if (timerId) clearInterval(timerId);    
  timerId = setInterval(()=>{    
    if (!isPaused && !submitted && !reviewMode){    
      timeLeft--;    
      if (timeLeft <= 0){    
        submitted = true;    
        reviewMode = false;    
        renderResult();    
        return;    
      }    
    }    
    const el = document.querySelector(".timer");    
    if (el) el.textContent = "⏱ " + formatTime(timeLeft);    
  }, 1000);    
}    

startTimer();    
renderQuestion();
</script>  </body>    </html>
