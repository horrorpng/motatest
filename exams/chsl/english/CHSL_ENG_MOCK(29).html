<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>English Sectional Mock</title>
  <style>
    *{box-sizing:border-box;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    body{margin:0;background:#f3f4f6;display:flex;justify-content:center;padding:16px}
    .container{max-width:520px;width:100%;background:#fff;margin-top:24px;padding:20px;border-radius:16px;box-shadow:0 10px 25px rgba(0,0,0,.08)}
    .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px}
    .title{font-size:18px;font-weight:600}
    .timer-wrap{display:flex;align-items:center;gap:6px}
    .timer{padding:4px 10px;border-radius:999px;background:#111827;color:#fff;font-size:13px}
    .pause-btn{border-radius:999px;border:1px solid #d1d5db;padding:4px 10px;font-size:12px;background:#f9fafb;cursor:pointer}
    .subheader{font-size:12px;color:#6b7280;margin-bottom:10px;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap}
    .badge{display:inline-block;padding:2px 8px;border-radius:999px;background:#e5e7eb;font-size:11px;color:#374151}
    .progress-bar-bg{width:100%;height:6px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-bottom:8px}
    .progress-bar-fill{height:100%;width:0%;background:#3b82f6;transition:width .2s}
    .q-strip{margin-bottom:10px;overflow-x:auto;padding:4px 0}
    .q-strip-inner{display:flex;gap:4px;padding-bottom:2px}
    .qchip{min-width:26px;height:26px;border-radius:999px;border:1px solid #d1d5db;background:#f9fafb;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
    .qchip.answered{background:#dbeafe;border-color:#2563eb;color:#1d4ed8}
    .qchip.current{background:#111827;border-color:#111827;color:#fff}
    .qchip.reviewed{background:rebeccapurple!important;color:#fff!important;border-color:rebeccapurple!important}
    .section-tag{font-size:12px;padding:3px 8px;border-radius:999px;background:#eef2ff;color:#3730a3;display:inline-block;margin-bottom:6px}
    .question-text{font-size:15px;margin-bottom:10px;white-space:pre-line}
    .options{display:grid;gap:8px}
    .option-btn{width:100%;border-radius:999px;padding:9px 14px;border:1px solid #d1d5db;background:#fff;text-align:left;font-size:14px;cursor:pointer}
    .option-btn.selected{background:#2563eb;color:#fff;border-color:#1d4ed8}
    .option-btn.correct{background:#dcfce7;color:#166534;border-color:#16a34a}
    .option-btn.wrong{background:#fee2e2;color:#b91c1c;border-color:#ef4444}
    .footer{margin-top:16px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
    .nav-buttons{display:flex;gap:6px;flex:1}
    .nav-btn,.next-btn{border-radius:999px;padding:9px 12px;border:none;font-size:13px;cursor:pointer}
    .nav-btn{background:#e5e7eb}
    .next-btn{flex:1;background:#111827;color:#fff}
    .result h2{text-align:center}
  </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
/* English Sectional Mock – 13 Minutes */
const TOTAL_TIME = 13 * 60;
const MARKS_CORRECT = 2;
const MARKS_WRONG = -0.5;
const QUESTIONS = [
  {
    q: "Choose the one word substitute for the below sentence.\nDespite numerous warnings and opportunities to improve her attendance, Sneha consistently failed to appear at school or work, embodying the very definition of habitual absenteeism.",
    options: ["Absentee", "Truant", "Vagabond", "Nomad"],
    answer: 1
  },
  {
    q: "The sentence below has errors in two parts which are highlighted in bold. Identify the same.\nIt is impossible to count the number of people who are given (A) and continue to give (B) their time, efforts, livelihood, (C) and lives in the fight (D) for injustice.",
    options: ["BD", "AB", "AC", "AD"],
    answer: 3
  },
  {
    q: "Choose the grammatically correct sentence.",
    options: [
      "He did nothing but complain.",
      "He did nothing but to complain.",
      "He did nothing but complained.",
      "He does nothing than complain."
    ],
    answer: 0
  },
  {
    q: "Fill in the blank with the most appropriate phrasal verb.\nThe deal fell through because the parties couldn’t ____ on the terms.",
    options: ["take over", "put across", "see eye to eye", "carry on"],
    answer: 2
  },
  {
    q: "Fill in the blank with the most appropriate option.\nThe novel’s protagonist is portrayed as a ____ hero, flawed yet striving for redemption.",
    options: ["vindictive", "quixotic", "fallible", "truculent"],
    answer: 2
  },
  {
    q: "Select the most appropriate synonym of the word: DREAD",
    options: ["Relief", "Excitement", "Fear", "Triumph"],
    answer: 2
  },
  {
    q: "Choose the correctly spelt word.",
    options: ["Obstinant", "Obstinate", "Obstinnate", "Obstinette"],
    answer: 1
  },
  {
    q: "Which of the following sentences uses the word “trip” with a different meaning from the others?",
    options: [
      "The unexpected boulder made him trip and fall.",
      "He was so clumsy that he would trip over his own feet.",
      "He walked carefully so he wouldn’t trip on the uneven pavement.",
      "Our annual family trip to the beach was unforgettable."
    ],
    answer: 3
  },
  {
    q: "Select the most appropriate antonym of the word: Heresy",
    options: ["Unorthodoxy", "Dogma", "Orthodoxy", "Dissent"],
    answer: 2
  },
  {
    q: "Choose the correct one-word substitute for:\nA place where soldiers are stationed",
    options: ["Barracks", "Fortification", "Bastion", "Fortress"],
    answer: 0
  },
  {
    q: "Choose the correct indirect narration of the following statement from the given alternatives:\nThe manager said, “Will you attend the birthday party of my daughter please?”",
    options: [
      "The manager requested whether they would attend the birthday party of his daughter.",
      "The manager requested if they shall attend the birthday party of his daughter.",
      "The manager requested whether they would attended the birthday party of his daughter.",
      "The manager requested whether they would have attended the birthday party of his daughter."
    ],
    answer: 0
  },
  {
    q: "Change the following sentence into the Active form.\nHis success is said to have been a result of his relentless determination.",
    options: [
      "People say that his success has been a result of his relentless determination.",
      "People said that his success was a result of his relentless determination.",
      "They are saying his success was a result of his relentless determination.",
      "His relentless determination caused his success, it is said."
    ],
    answer: 1
  },
  {
    q: "Choose the incorrect spelling.",
    options: ["Belligerent", "Ineffable", "Pulchritude", "Disconsolat"],
    answer: 3
  },
  {
    q: "Select the option that expresses the given sentence in direct voice.\nThe foreman stated that the team had completed the construction project the previous day.",
    options: [
      "The foreman said, “The team has completed the construction project yesterday.”",
      "The foreman stated, “The team had completed the construction project yesterday.”",
      "The foreman said, “The team completed the construction project yesterday.”",
      "The foreman said, “The team completed the construction project the previous day.”"
    ],
    answer: 2
  },
  {
    q: "Choose the correct passive voice transformation of the sentence:\nYou cannot allow such an egregious error in the official report to go unnoticed.",
    options: [
      "Such an egregious error in the official report cannot be allowed to go unnoticed by you.",
      "It cannot be allowed by you that such an egregious error in the official report goes unnoticed.",
      "Such an egregious error in the official report must not be allowed to go unnoticed by you.",
      "Such an egregious error in the official report cannot be allowed to be unnoticed by you."
    ],
    answer: 0
  },
  {
    q: "Read the passage and answer the following question:\n\nPassage: (For Q16-20)\nSpecial children are those who have physical, emotional, or learning differences that make their development unique. These children may face challenges in communication, movement, social interaction, or understanding academic concepts. However, with proper care, support, and inclusive education, they can thrive and lead fulfilling lives.\nIn recent years, there has been a growing shift in society’s attitude towards special children. Instead of isolating or ignoring them, schools and communities are now working towards inclusion, providing opportunities for them to learn and grow alongside other children. Educators receive special training, and classrooms are being equipped with tools and technologies to support diverse needs.\nParents, too, play a vital role in the development of special children. Encouragement, patience, and emotional support can help build confidence in these children. Society must continue to create environments where every child, regardless of their abilities, feels respected, valued, and capable.\nIdentify the correct form of the verb:\n“Special children are those ___ physical, emotional, or learning differences that make their development unique.”",
    options: ["have", "has", "had", "having"],
    answer: 0
  },
  {
    q: "Choose the correct preposition:\n“However, ___ proper care, support, and inclusive education, they can thrive and lead fulfilling lives.”",
    options: ["At", "With", "By", "On"],
    answer: 1
  },
  {
    q: "The word “inclusive” means:",
    options: [
      "Allowing everyone to participate",
      "Strict and limited",
      "Only for selected people",
      "Unrelated or irrelevant"
    ],
    answer: 0
  },
  {
    q: "The word “thrive” most likely means:",
    options: ["Stay quiet", "Fail to improve", "Grow successfully", "Remain stuck"],
    answer: 2
  },
  {
    q: "What is the main message of the passage?",
    options: [
      "Special children should be taught separately",
      "Society should support and include special children",
      "Special children cannot learn properly",
      "Parents should let special children stay at home"
    ],
    answer: 1
  },
  {
    q: "Rearrange the following sentence parts to form a meaningful and grammatically correct paragraph:\nP. In search of the ideal wave, he paddled his board out to the deep water.\nQ. He turned the board towards the coast when he noticed a nice swell coming.\nR. He pushed up onto his feet after paddling hard, cautiously balancing on the board.\nS. He rode the wave to the sand for a few beautiful seconds.",
    options: ["P, Q, R, S", "Q, P, R, S", "R, Q, P, S", "S, Q, R, P"],
    answer: 0
  },
  {
    q: "What is the antonym of “Disparate”?",
    options: ["Distinct", "Separate", "Similar", "Contrasting"],
    answer: 2
  },
  {
    q: "Choose the option with the most suitable pair of words to fill in the blanks.\nThe researcher ___ the resilience of the hermits to the hardy ___ that survive even in the coldest climates.",
    options: [
      "likens, likens",
      "likens, lichens",
      "lichens, likens",
      "lichens, lichens"
    ],
    answer: 1
  },
  {
    q: "Which part of the following sentence contains a spelling error?\nThe committee’s decision was neither unanimous (1) nor particularly judicious (2), as several members expressed severe misgivings (3) about the procedure (4).",
    options: ["(1)", "(2)", "(3)", "(4)"],
    answer: 2
  },
  {
    q: "Which part of the following sentence contains a spelling error?\nThe committee’s decision was neither unanimous (1) nor particularly judicious (2), as several members expressed severe misgivings (3) about the procedure (4).",
    options: ["(2)", "(4)", "(1)", "(3)"],
    answer: 3
  }
];
// State    
let currentIndex = 0;    
let answers = new Array(QUESTIONS.length).fill(null);     
let reviewed = new Array(QUESTIONS.length).fill(false); // mark-for-review flags    
let timeLeft = TOTAL_TIME;    
let timerId = null;    
let submitted = false;    
let isPaused = false;    
let reviewMode = false; // true when user is viewing a single question from analysis    
const app = document.getElementById("app");    

function formatTime(sec){ 
  const m = Math.floor(sec/60), s = sec%60; 
  return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"00")}`; 
}    

function getStats(){    
  const s = { total: QUESTIONS.length, attempted:0, correct:0, wrong:0, marks:0 };    
  QUESTIONS.forEach((q,i)=>{    
    const a = answers[i];    
    if (a !== null){    
      s.attempted++;    
      if (a === q.answer){ s.correct++; s.marks += MARKS_CORRECT; }    
      else { s.wrong++; s.marks += MARKS_WRONG; }    
    }    
  });    
  return s;    
}    

function renderQuestion(){    
  if (reviewMode) isPaused = true;    
  if (submitted && !reviewMode){ renderResult(); return; }    

  const q = QUESTIONS[currentIndex];    
  const progressPercent = ((currentIndex+1)/QUESTIONS.length)*100;    
  const selected = answers[currentIndex];    

  const stripHtml = QUESTIONS.map((_,idx)=>{    
    let cls = "qchip";    
    if (idx===currentIndex) cls += " current";    
    if (answers[idx] !== null) cls += " answered";    
    if (reviewed[idx]) cls += " reviewed";    
    return `<button class="${cls}" data-q="${idx}">${idx+1}</button>`;    
  }).join("");    

  app.innerHTML = `    
    <div class="header">    
      <div class="title">English Sectional Mock</div>    
      <div class="timer-wrap">    
        <div class="timer">⏱ ${formatTime(timeLeft)}</div>    
        <button class="pause-btn" id="pauseBtn">${isPaused ? "Resume":"Pause"}</button>    
      </div>    
    </div>    

    <div class="subheader">    
      <span>+${MARKS_CORRECT} for correct, ${MARKS_WRONG} for wrong</span>    
      <span class="badge">English</span>    
    </div>    

    <div class="progress-bar-bg">
      <div class="progress-bar-fill" style="width:${progressPercent}%"></div>
    </div>    

    <div class="q-strip">
      <div class="q-strip-inner">${stripHtml}</div>
    </div>    

    <div class="section-tag">English</div>    

    <div class="question-text">Q${currentIndex+1}. ${q.q}</div>    

    <div class="options">    
      ${q.options.map((opt,idx)=>{    
        let classes = "";    
        if (selected === idx && !reviewMode) classes = "selected";    
        if (reviewMode){    
          if (idx === q.answer) classes = "correct";    
          else if (selected === idx && selected !== q.answer) classes = "wrong";    
        } else {    
          if (selected === idx) classes = "selected";    
        }    
        return `<button class="option-btn ${classes}" data-index="${idx}">${String.fromCharCode(65+idx)}. ${opt}</button>`;    
      }).join("")}    
    </div>    

    <div class="footer">    
      <div class="question-count">Question ${currentIndex+1} of ${QUESTIONS.length}</div>    
      <div class="nav-buttons">    
        <button class="nav-btn" id="prevBtn"${currentIndex===0 ? " disabled":""}>Prev</button>    
        ${ reviewMode ? `<button class="back-btn" id="backAnalysis">Back to Analysis</button>` : "" }    
        <button class="nav-btn" id="markBtn">Mark</button>    
        <button class="next-btn" id="nextBtn">${currentIndex+1===QUESTIONS.length? "Submit":"Next"}</button>    
      </div>    
    </div>    
  `;    

  document.getElementById("pauseBtn").addEventListener("click", ()=>{    
    if (reviewMode){ isPaused = true; renderQuestion(); return; }    
    isPaused = !isPaused;    
    renderQuestion();    
  });    

  document.querySelectorAll(".qchip").forEach(b=>{    
    b.addEventListener("click", ()=>{ 
      currentIndex = Number(b.dataset.q); 
      reviewMode = false; 
      renderQuestion(); 
    });    
  });    

  document.querySelectorAll(".option-btn").forEach(b=>{    
    b.addEventListener("click", ()=>{    
      const idx = Number(b.dataset.index);    
      if (reviewMode) return;    
      answers[currentIndex] = idx;    
      renderQuestion();    
    });    
  });    

  document.getElementById("prevBtn").addEventListener("click", ()=>{    
    if (currentIndex>0){ currentIndex--; reviewMode = false; renderQuestion(); }    
  });    

  document.getElementById("nextBtn").addEventListener("click", ()=>{    
    if (currentIndex+1 < QUESTIONS.length){ currentIndex++; reviewMode = false; renderQuestion(); }    
    else { submitted = true; reviewMode = false; renderResult(); }    
  });    

  const markBtnEl = document.getElementById('markBtn');    
  if (markBtnEl){    
    markBtnEl.addEventListener('click', ()=>{    
      reviewed[currentIndex] = !reviewed[currentIndex];    
      markBtnEl.textContent = reviewed[currentIndex] ? 'Marked' : 'Mark';    
      renderQuestion();    
    });    
  }    

  const back = document.getElementById("backAnalysis");    
  if (back){    
    back.addEventListener("click", ()=>{    
      reviewMode = false;    
      submitted = true;    
      renderResult();    
    });    
  }    
}    

function renderResult(){    
  if (timerId){ clearInterval(timerId); timerId = null; }    
  const s = getStats();    
  const maxMarks = s.total * MARKS_CORRECT;    
  const percentage = maxMarks>0 ? Math.round((s.marks/maxMarks)*100):0;    
  let remark = percentage>=80 ? "Excellent! 💯"
             : percentage>=60 ? "Good! 👍"
             : percentage>=40 ? "Average. Can improve 🙂"
             : "Needs more practice 💪";    

  let qaHtml = "";    
  QUESTIONS.forEach((q,i)=>{    
    const user = answers[i];    
    const correctIdx = q.answer;    
    const isSkipped = user === null;    
    const isCorrect = !isSkipped && user === correctIdx;    
    const pill = isSkipped ? `<span class="pill-gray">Skipped</span>` 
               : isCorrect ? `<span class="pill-green">Correct</span>` 
               : `<span class="pill-red">Wrong</span>`;    

    const userText = isSkipped ? "<em>Skipped</em>" : `${String.fromCharCode(65+user)}. ${q.options[user]}`;    
    const correctText = `${String.fromCharCode(65+correctIdx)}. ${q.options[correctIdx]}`;    

    qaHtml += `    
      <div class="qa-card" id="qa-${i}">    
        <div class="qa-question"><strong>Q${i+1}.</strong> ${q.q}</div>    
        <div class="qa-answer-row">    
          <div><span class="label">Your answer:</span> ${userText}</div>    
          <div><span class="label">Correct answer:</span> ${correctText}</div>    
          <div style="margin-left:auto">${pill}</div>    
        </div>    
        <div style="margin-top:8px;text-align:right">    
          <button class="review-btn" data-q="${i}">Review Q</button>    
        </div>    
      </div>    
    `;    
  });    

  app.innerHTML = `    
    <div class="result">    
      <h2>English Section Analysis</h2>    
      <div class="tiny">9-minute sectional mock completed</div>    

      <div class="card">    
        <div class="card-title">Overall Performance</div>    
        <div class="stat-row"><span>Total Questions</span><span>${s.total}</span></div>    
        <div class="stat-row"><span>Attempted</span><span>${s.attempted}</span></div>    
        <div class="stat-row"><span>Correct</span><span>${s.correct}</span></div>    
        <div class="stat-row"><span>Wrong</span><span>${s.wrong}</span></div>    
        <div class="stat-row"><span>Marks</span><span>${s.marks.toFixed(2)} / ${maxMarks}</span></div>    
        <div class="stat-row"><span>Percentage</span><span>${percentage}%</span></div>    
        <div class="stat-row"><span>Remark</span><span>${remark}</span></div>    
      </div>    

      <div style="margin-top:8px;margin-bottom:8px">    
        <div class="card-title">Question-wise Review</div>    
        ${qaHtml}    
      </div>    

      <button class="restart-btn" id="restartBtn">Retake Section</button>    
      <div class="tiny">Timer will restart from 9 minutes</div>    
    </div>    
  `;    

  document.querySelectorAll(".review-btn").forEach(b=>{    
    b.addEventListener("click", ()=>{    
      const idx = Number(b.dataset.q);    
      currentIndex = idx;    
      reviewMode = true;    
      submitted = false;    
      isPaused = true;    
      renderQuestion();    
    });    
  });    

  document.getElementById("restartBtn").addEventListener("click", ()=>{    
    currentIndex = 0;    
    answers = new Array(QUESTIONS.length).fill(null);    
    timeLeft = TOTAL_TIME;    
    submitted = false;    
    isPaused = false;    
    reviewMode = false;    
    startTimer();    
    renderQuestion();    
  });    
}    

function startTimer(){    
  if (timerId) clearInterval(timerId);    
  timerId = setInterval(()=>{    
    if (!isPaused && !submitted && !reviewMode){    
      timeLeft--;    
      if (timeLeft <= 0){    
        submitted = true;    
        reviewMode = false;    
        renderResult();    
        return;    
      }    
    }    
    const el = document.querySelector(".timer");    
    if (el) el.textContent = "⏱ " + formatTime(timeLeft);    
  }, 1000);    
}    

startTimer();    
renderQuestion();
</script>  </body>    </html>
