<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>English Sectional Mock</title>
  <style>
    *{box-sizing:border-box;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    body{margin:0;background:#f3f4f6;display:flex;justify-content:center;padding:16px}
    .container{max-width:520px;width:100%;background:#fff;margin-top:24px;padding:20px;border-radius:16px;box-shadow:0 10px 25px rgba(0,0,0,.08)}
    .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px}
    .title{font-size:18px;font-weight:600}
    .timer-wrap{display:flex;align-items:center;gap:6px}
    .timer{padding:4px 10px;border-radius:999px;background:#111827;color:#fff;font-size:13px}
    .pause-btn{border-radius:999px;border:1px solid #d1d5db;padding:4px 10px;font-size:12px;background:#f9fafb;cursor:pointer}
    .subheader{font-size:12px;color:#6b7280;margin-bottom:10px;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap}
    .badge{display:inline-block;padding:2px 8px;border-radius:999px;background:#e5e7eb;font-size:11px;color:#374151}
    .progress-bar-bg{width:100%;height:6px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-bottom:8px}
    .progress-bar-fill{height:100%;width:0%;background:#3b82f6;transition:width .2s}
    .q-strip{margin-bottom:10px;overflow-x:auto;padding:4px 0}
    .q-strip-inner{display:flex;gap:4px;padding-bottom:2px}
    .qchip{min-width:26px;height:26px;border-radius:999px;border:1px solid #d1d5db;background:#f9fafb;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
    .qchip.answered{background:#dbeafe;border-color:#2563eb;color:#1d4ed8}
    .qchip.current{background:#111827;border-color:#111827;color:#fff}
    .qchip.reviewed{background:rebeccapurple!important;color:#fff!important;border-color:rebeccapurple!important}
    .section-tag{font-size:12px;padding:3px 8px;border-radius:999px;background:#eef2ff;color:#3730a3;display:inline-block;margin-bottom:6px}
    .question-text{font-size:15px;margin-bottom:10px;white-space:pre-line}
    .options{display:grid;gap:8px}
    .option-btn{width:100%;border-radius:999px;padding:9px 14px;border:1px solid #d1d5db;background:#fff;text-align:left;font-size:14px;cursor:pointer}
    .option-btn.selected{background:#2563eb;color:#fff;border-color:#1d4ed8}
    .option-btn.correct{background:#dcfce7;color:#166534;border-color:#16a34a}
    .option-btn.wrong{background:#fee2e2;color:#b91c1c;border-color:#ef4444}
    .footer{margin-top:16px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
    .nav-buttons{display:flex;gap:6px;flex:1}
    .nav-btn,.next-btn{border-radius:999px;padding:9px 12px;border:none;font-size:13px;cursor:pointer}
    .nav-btn{background:#e5e7eb}
    .next-btn{flex:1;background:#111827;color:#fff}
    .result h2{text-align:center}
  </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
/* English Sectional Mock – 13 Minutes */
const TOTAL_TIME = 13 * 60;
const MARKS_CORRECT = 2;
const MARKS_WRONG = -0.5;
const QUESTIONS = [
  {
    q: "Identify the part of the sentence that contains a grammatical error.\nHaving been a part of the team for five years, the promotion to manager was unexpected but much appreciated by him.",
    options: [
      "Having been a part of the team for five years",
      "the promotion to manager was",
      "unexpected but much appreciated",
      "by him"
    ],
    answer: 0
  },
  {
    q: "Fill in the blank with the most appropriate preposition.\nShe is proficient ____ several programming languages, including Python and Java.",
    options: ["at", "on", "in", "with"],
    answer: 2
  },
  {
    q: "Fill in the blank with the most appropriate conjunction.\nYou can take the early train, ____ you’ll have to wait for the afternoon one.",
    options: ["and", "unless", "otherwise", "although"],
    answer: 2
  },
  {
    q: "Select the most appropriate synonym of the word: QUIXOTIC",
    options: ["Practical", "Idealistic", "Realistic", "Sensible"],
    answer: 1
  },
  {
    q: "Choose the correctly spelt word.",
    options: ["Colonel", "Collonel", "Colonal", "Cornel"],
    answer: 0
  },
  {
    q: "Select the most appropriate antonym of the word: Trivial",
    options: ["Insignificant", "Minor", "Important", "Commonplace"],
    answer: 2
  },
  {
    q: "Choose the correct one-word substitute for:\nA person who writes dictionaries.",
    options: ["Editor", "Novelist", "Lexicographer", "Author"],
    answer: 2
  },
  {
    q: "Choose the most suitable option to replace the highlighted part of the sentence.\nParesh eats hardly only food.",
    options: [
      "hardly any food",
      "any hardly food",
      "food hardly any",
      "food not hardly"
    ],
    answer: 0
  },
  {
    q: "Select the most appropriate antonym of the word: Ebulli ent",
    options: ["Depressed", "Cheerful", "Joyful", "Enthusiastic"],
    answer: 0
  },
  {
    q: "Choose the option that is the most appropriate conversion of the following sentence into Direct Speech.\nHe said that while he had been writing the report, his laptop suddenly shut down.",
    options: [
      "He said, “While I wrote the report, my laptop suddenly shut down.”",
      "He said, “While I was writing the report, my laptop suddenly shut down.”",
      "He said, “While I am writing the report, my laptop suddenly shuts down.”",
      "He said, “While I had been writing the report, my laptop had shut down.”"
    ],
    answer: 1
  },
  {
    q: "Fill in the blank with the correctly spelt word.\n“The scientist emphasized that the ____ effects of small daily habits can significantly influence long-term health outcomes.”",
    options: ["cumulatfve", "cumulative", "cumulutive", "cumalative"],
    answer: 1
  },
  {
    q: "Change the following sentence into the Active form.\nIs the new policy expected to be implemented immediately across all departments?",
    options: [
      "Are they expecting to implement the new policy immediately across all departments?",
      "Is the new policy implementing immediately across all departments?",
      "Do they expect to implement the new policy immediately across all departments?",
      "They expect to implement the new policy immediately across all departments?"
    ],
    answer: 3
  },
  {
    q: "Select the option that expresses the given sentence in indirect voice.\nMy mother said, “I will help you with your homework.”",
    options: [
      "My mother said that she would help me with my homework.",
      "My mother said that she will help me with my homework.",
      "My mother said that she would have helped me with my homework.",
      "My mother said that she helped me with my homework."
    ],
    answer: 0
  },
  {
    q: "Choose the most suitable option to replace the highlighted part of the sentence.\nThe dessert is a dry piece of land.",
    options: ["desert", "dissert", "dais ert", "desertive"],
    answer: 0
  },
  {
    q: "Choose the correct passive voice transformation of the sentence.\nWho painted the Mona Lisa?",
    options: [
      "By whom was the Mona Lisa painted?",
      "Who was the Mona Lisa painted by?",
      "The Mona Lisa was painted by whom?",
      "By whom the Mona Lisa was painted?"
    ],
    answer: 0
  },
  {
    q: "Read the passage and answer the following question.\n\nPassage:\nIn contemporary India, the accounting profession, particularly Chartered Accountants (CAs), is witnessing an alarming surge in fatalities attributed primarily to excessive work-related stress. The profession’s demanding nature—characterized by protracted hours, stringent deadlines, and intense mental exertion—has precipitated grave health repercussions. Despite being pivotal to the country’s financial ecosystem, many CAs endure chronic sleep deprivation and psychological strain, culminating in life-threatening conditions such as cardiac arrests and strokes.\nThe deleterious effects of incessant work pressures are exacerbated during the fiscal year-end and tax filing seasons, where the workload intensifies manifold. The compulsion to deliver flawless outputs within unforgiving timeframes frequently compels professionals to forsake personal well-being. Moreover, the COVID-19 pandemic further aggravated these conditions by transitioning most work to virtual platforms, blurring the boundaries between professional and personal life, and extending working hours indefinitely.\nCompounding this predicament is the societal stigma attached to seeking psychological assistance, which dissuades many from obtaining necessary mental health support. The regulatory bodies and firms, albeit cognizant of this crisis, have been slow to implement effective measures to mitigate occupational hazards.\nIn essence, the burgeoning mortality among Indian CAs is a clarion call for systemic reforms, encompassing workload management, mental health awareness, and institutional accountability, to safeguard the professionals who underpin India’s economic stability.\n\nIdentify the voice of the verb phrase in the sentence:\n“The compulsion to deliver flawless outputs within unforgiving timeframes frequently compels professionals to forsake personal well-being.”",
    options: ["Active voice", "Passive voice", "Causative voice", "Subjunctive mood"],
    answer: 0
  },
  {
    q: "In the given sentence, identify the finite verb(s):\n“The pandemic further aggravated these conditions by transitioning most work to virtual platforms, blurring the boundaries between professional and personal life, and extending working hours indefinitely.”",
    options: [
      "Aggravated",
      "Transitioning, blurring, extending",
      "Pandemic",
      "Aggravated, transitioning"
    ],
    answer: 0
  },
  {
    q: "The word “deleterious” most nearly means:",
    options: ["Beneficial", "Harmful", "Insignificant", "Controversial"],
    answer: 1
  },
  {
    q: "The phrase “a clarion call” in the passage most nearly means:",
    options: [
      "A gentle suggestion",
      "A loud and clear demand",
      "An ambiguous statement",
      "A quiet warning"
    ],
    answer: 1
  },
  {
    q: "According to the passage, which factor does NOT contribute to the high mortality rate among Indian CAs?",
    options: [
      "Chronic sleep deprivation",
      "Transition to virtual work platforms",
      "Strict regulatory enforcement of workload limits",
      "Societal stigma around psychological help"
    ],
    answer: 2
  },
  {
    q: "Rearrange the following sentence parts to form a meaningful and grammatically correct paragraph.\nP. He took a very thin slice of tissue sample and placed it on a glass slide.\nQ. He added a single drop of a staining solution to make the cells visible.\nR. He carefully placed a thin cover slip over the sample to protect it.\nS. He placed the slide under the microscope to begin his examination.",
    options: ["S, Q, P, R", "P, Q, R, S", "R, Q, P, S", "Q, Q, R, P"],
    answer: 1
  },
  {
    q: "Rearrange the following sentences to form a meaningful and grammatically correct paragraph.\nP. A robot built to tackle a challenging challenge served as the students’ final assignment.\nQ. The code that would enable the machine to navigate a maze was written over weeks.\nR. Their engineering, programming, and design abilities came together to create it.\nS. The robot’s faultless performance demonstrated their commitment and cooperation.",
    options: ["Q, R, P, S", "R, Q, P, S", "S, R, Q, P", "P, R, Q, S"],
    answer: 3
  },
  {
    q: "Which word is nearest in meaning to client?",
    options: ["Leader", "Stranger", "Rival", "Customer"],
    answer: 3
  },
  {
    q: "Which of the following pairs of homonyms can be used to fill in the blanks most suitably?\nShe ____ the obligation of attending the kitty party with patience, but soon the mindless chatter began to ____ her.",
    options: ["bore, boar", "boar, boar", "boar, bore", "bore, bare"],
    answer: 2
  },
  {
    q: "Which of the following terms refers to the absence of government?",
    options: ["Anarchy", "Democracy", "Monarchy", "Oligarchy"],
    answer: 0
  }
];
// State    
let currentIndex = 0;    
let answers = new Array(QUESTIONS.length).fill(null);     
let reviewed = new Array(QUESTIONS.length).fill(false); // mark-for-review flags    
let timeLeft = TOTAL_TIME;    
let timerId = null;    
let submitted = false;    
let isPaused = false;    
let reviewMode = false; // true when user is viewing a single question from analysis    
const app = document.getElementById("app");    

function formatTime(sec){ 
  const m = Math.floor(sec/60), s = sec%60; 
  return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"00")}`; 
}    

function getStats(){    
  const s = { total: QUESTIONS.length, attempted:0, correct:0, wrong:0, marks:0 };    
  QUESTIONS.forEach((q,i)=>{    
    const a = answers[i];    
    if (a !== null){    
      s.attempted++;    
      if (a === q.answer){ s.correct++; s.marks += MARKS_CORRECT; }    
      else { s.wrong++; s.marks += MARKS_WRONG; }    
    }    
  });    
  return s;    
}    

function renderQuestion(){    
  if (reviewMode) isPaused = true;    
  if (submitted && !reviewMode){ renderResult(); return; }    

  const q = QUESTIONS[currentIndex];    
  const progressPercent = ((currentIndex+1)/QUESTIONS.length)*100;    
  const selected = answers[currentIndex];    

  const stripHtml = QUESTIONS.map((_,idx)=>{    
    let cls = "qchip";    
    if (idx===currentIndex) cls += " current";    
    if (answers[idx] !== null) cls += " answered";    
    if (reviewed[idx]) cls += " reviewed";    
    return `<button class="${cls}" data-q="${idx}">${idx+1}</button>`;    
  }).join("");    

  app.innerHTML = `    
    <div class="header">    
      <div class="title">English Sectional Mock</div>    
      <div class="timer-wrap">    
        <div class="timer">⏱ ${formatTime(timeLeft)}</div>    
        <button class="pause-btn" id="pauseBtn">${isPaused ? "Resume":"Pause"}</button>    
      </div>    
    </div>    

    <div class="subheader">    
      <span>+${MARKS_CORRECT} for correct, ${MARKS_WRONG} for wrong</span>    
      <span class="badge">English</span>    
    </div>    

    <div class="progress-bar-bg">
      <div class="progress-bar-fill" style="width:${progressPercent}%"></div>
    </div>    

    <div class="q-strip">
      <div class="q-strip-inner">${stripHtml}</div>
    </div>    

    <div class="section-tag">English</div>    

    <div class="question-text">Q${currentIndex+1}. ${q.q}</div>    

    <div class="options">    
      ${q.options.map((opt,idx)=>{    
        let classes = "";    
        if (selected === idx && !reviewMode) classes = "selected";    
        if (reviewMode){    
          if (idx === q.answer) classes = "correct";    
          else if (selected === idx && selected !== q.answer) classes = "wrong";    
        } else {    
          if (selected === idx) classes = "selected";    
        }    
        return `<button class="option-btn ${classes}" data-index="${idx}">${String.fromCharCode(65+idx)}. ${opt}</button>`;    
      }).join("")}    
    </div>    

    <div class="footer">    
      <div class="question-count">Question ${currentIndex+1} of ${QUESTIONS.length}</div>    
      <div class="nav-buttons">    
        <button class="nav-btn" id="prevBtn"${currentIndex===0 ? " disabled":""}>Prev</button>    
        ${ reviewMode ? `<button class="back-btn" id="backAnalysis">Back to Analysis</button>` : "" }    
        <button class="nav-btn" id="markBtn">Mark</button>    
        <button class="next-btn" id="nextBtn">${currentIndex+1===QUESTIONS.length? "Submit":"Next"}</button>    
      </div>    
    </div>    
  `;    

  document.getElementById("pauseBtn").addEventListener("click", ()=>{    
    if (reviewMode){ isPaused = true; renderQuestion(); return; }    
    isPaused = !isPaused;    
    renderQuestion();    
  });    

  document.querySelectorAll(".qchip").forEach(b=>{    
    b.addEventListener("click", ()=>{ 
      currentIndex = Number(b.dataset.q); 
      reviewMode = false; 
      renderQuestion(); 
    });    
  });    

  document.querySelectorAll(".option-btn").forEach(b=>{    
    b.addEventListener("click", ()=>{    
      const idx = Number(b.dataset.index);    
      if (reviewMode) return;    
      answers[currentIndex] = idx;    
      renderQuestion();    
    });    
  });    

  document.getElementById("prevBtn").addEventListener("click", ()=>{    
    if (currentIndex>0){ currentIndex--; reviewMode = false; renderQuestion(); }    
  });    

  document.getElementById("nextBtn").addEventListener("click", ()=>{    
    if (currentIndex+1 < QUESTIONS.length){ currentIndex++; reviewMode = false; renderQuestion(); }    
    else { submitted = true; reviewMode = false; renderResult(); }    
  });    

  const markBtnEl = document.getElementById('markBtn');    
  if (markBtnEl){    
    markBtnEl.addEventListener('click', ()=>{    
      reviewed[currentIndex] = !reviewed[currentIndex];    
      markBtnEl.textContent = reviewed[currentIndex] ? 'Marked' : 'Mark';    
      renderQuestion();    
    });    
  }    

  const back = document.getElementById("backAnalysis");    
  if (back){    
    back.addEventListener("click", ()=>{    
      reviewMode = false;    
      submitted = true;    
      renderResult();    
    });    
  }    
}    

function renderResult(){    
  if (timerId){ clearInterval(timerId); timerId = null; }    
  const s = getStats();    
  const maxMarks = s.total * MARKS_CORRECT;    
  const percentage = maxMarks>0 ? Math.round((s.marks/maxMarks)*100):0;    
  let remark = percentage>=80 ? "Excellent! 💯"
             : percentage>=60 ? "Good! 👍"
             : percentage>=40 ? "Average. Can improve 🙂"
             : "Needs more practice 💪";    

  let qaHtml = "";    
  QUESTIONS.forEach((q,i)=>{    
    const user = answers[i];    
    const correctIdx = q.answer;    
    const isSkipped = user === null;    
    const isCorrect = !isSkipped && user === correctIdx;    
    const pill = isSkipped ? `<span class="pill-gray">Skipped</span>` 
               : isCorrect ? `<span class="pill-green">Correct</span>` 
               : `<span class="pill-red">Wrong</span>`;    

    const userText = isSkipped ? "<em>Skipped</em>" : `${String.fromCharCode(65+user)}. ${q.options[user]}`;    
    const correctText = `${String.fromCharCode(65+correctIdx)}. ${q.options[correctIdx]}`;    

    qaHtml += `    
      <div class="qa-card" id="qa-${i}">    
        <div class="qa-question"><strong>Q${i+1}.</strong> ${q.q}</div>    
        <div class="qa-answer-row">    
          <div><span class="label">Your answer:</span> ${userText}</div>    
          <div><span class="label">Correct answer:</span> ${correctText}</div>    
          <div style="margin-left:auto">${pill}</div>    
        </div>    
        <div style="margin-top:8px;text-align:right">    
          <button class="review-btn" data-q="${i}">Review Q</button>    
        </div>    
      </div>    
    `;    
  });    

  app.innerHTML = `    
    <div class="result">    
      <h2>English Section Analysis</h2>    
      <div class="tiny">9-minute sectional mock completed</div>    

      <div class="card">    
        <div class="card-title">Overall Performance</div>    
        <div class="stat-row"><span>Total Questions</span><span>${s.total}</span></div>    
        <div class="stat-row"><span>Attempted</span><span>${s.attempted}</span></div>    
        <div class="stat-row"><span>Correct</span><span>${s.correct}</span></div>    
        <div class="stat-row"><span>Wrong</span><span>${s.wrong}</span></div>    
        <div class="stat-row"><span>Marks</span><span>${s.marks.toFixed(2)} / ${maxMarks}</span></div>    
        <div class="stat-row"><span>Percentage</span><span>${percentage}%</span></div>    
        <div class="stat-row"><span>Remark</span><span>${remark}</span></div>    
      </div>    

      <div style="margin-top:8px;margin-bottom:8px">    
        <div class="card-title">Question-wise Review</div>    
        ${qaHtml}    
      </div>    

      <button class="restart-btn" id="restartBtn">Retake Section</button>    
      <div class="tiny">Timer will restart from 9 minutes</div>    
    </div>    
  `;    

  document.querySelectorAll(".review-btn").forEach(b=>{    
    b.addEventListener("click", ()=>{    
      const idx = Number(b.dataset.q);    
      currentIndex = idx;    
      reviewMode = true;    
      submitted = false;    
      isPaused = true;    
      renderQuestion();    
    });    
  });    

  document.getElementById("restartBtn").addEventListener("click", ()=>{    
    currentIndex = 0;    
    answers = new Array(QUESTIONS.length).fill(null);    
    timeLeft = TOTAL_TIME;    
    submitted = false;    
    isPaused = false;    
    reviewMode = false;    
    startTimer();    
    renderQuestion();    
  });    
}    

function startTimer(){    
  if (timerId) clearInterval(timerId);    
  timerId = setInterval(()=>{    
    if (!isPaused && !submitted && !reviewMode){    
      timeLeft--;    
      if (timeLeft <= 0){    
        submitted = true;    
        reviewMode = false;    
        renderResult();    
        return;    
      }    
    }    
    const el = document.querySelector(".timer");    
    if (el) el.textContent = "⏱ " + formatTime(timeLeft);    
  }, 1000);    
}    

startTimer();    
renderQuestion();
</script>  </body>    </html>
