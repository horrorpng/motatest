<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>English Sectional Mock</title>
  <style>
    *{box-sizing:border-box;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    body{margin:0;background:#f3f4f6;display:flex;justify-content:center;padding:16px}
    .container{max-width:520px;width:100%;background:#fff;margin-top:24px;padding:20px;border-radius:16px;box-shadow:0 10px 25px rgba(0,0,0,.08)}
    .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px}
    .title{font-size:18px;font-weight:600}
    .timer-wrap{display:flex;align-items:center;gap:6px}
    .timer{padding:4px 10px;border-radius:999px;background:#111827;color:#fff;font-size:13px}
    .pause-btn{border-radius:999px;border:1px solid #d1d5db;padding:4px 10px;font-size:12px;background:#f9fafb;cursor:pointer}
    .subheader{font-size:12px;color:#6b7280;margin-bottom:10px;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap}
    .badge{display:inline-block;padding:2px 8px;border-radius:999px;background:#e5e7eb;font-size:11px;color:#374151}
    .progress-bar-bg{width:100%;height:6px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-bottom:8px}
    .progress-bar-fill{height:100%;width:0%;background:#3b82f6;transition:width .2s}
    .q-strip{margin-bottom:10px;overflow-x:auto;padding:4px 0}
    .q-strip-inner{display:flex;gap:4px;padding-bottom:2px}
    .qchip{min-width:26px;height:26px;border-radius:999px;border:1px solid #d1d5db;background:#f9fafb;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
    .qchip.answered{background:#dbeafe;border-color:#2563eb;color:#1d4ed8}
    .qchip.current{background:#111827;border-color:#111827;color:#fff}
    .qchip.reviewed{background:rebeccapurple!important;color:#fff!important;border-color:rebeccapurple!important}
    .section-tag{font-size:12px;padding:3px 8px;border-radius:999px;background:#eef2ff;color:#3730a3;display:inline-block;margin-bottom:6px}
    .question-text{font-size:15px;margin-bottom:10px;white-space:pre-line}
    .options{display:grid;gap:8px}
    .option-btn{width:100%;border-radius:999px;padding:9px 14px;border:1px solid #d1d5db;background:#fff;text-align:left;font-size:14px;cursor:pointer}
    .option-btn.selected{background:#2563eb;color:#fff;border-color:#1d4ed8}
    .option-btn.correct{background:#dcfce7;color:#166534;border-color:#16a34a}
    .option-btn.wrong{background:#fee2e2;color:#b91c1c;border-color:#ef4444}
    .footer{margin-top:16px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
    .nav-buttons{display:flex;gap:6px;flex:1}
    .nav-btn,.next-btn{border-radius:999px;padding:9px 12px;border:none;font-size:13px;cursor:pointer}
    .nav-btn{background:#e5e7eb}
    .next-btn{flex:1;background:#111827;color:#fff}
    .result h2{text-align:center}
  </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
/* English Sectional Mock – 13 Minutes */
const TOTAL_TIME = 13 * 60;
const MARKS_CORRECT = 2;
const MARKS_WRONG = -0.5;
const QUESTIONS = [
{
  q: "Choose the option which is similar in meaning to the underlined word.\nPushkin, the great Russian poet was a remarkable man.",
  options: [
    "Astounding",
    "Normal",
    "Insignificant",
    "Typical"
  ],
  answer: 0
},
{
  q: "Choose the option that has an error in the sentence.\nChildren who does not read books will never be able to receive information in any way.",
  options: [
    "Children who does not read books",
    "will never be able to receive",
    "information in any way",
    "No correction required"
  ],
  answer: 1
},
{
  q: "Identify the incorrect sentence.",
  options: [
    "Every piece sold here is well-designed and crafted to retain its originality.",
    "Folktales are a kind of stories that get passed on from generation to generation.",
    "The Nilgiris are the most productive mountains at the south and is too famous.",
    "There are not many followers of Gandhiji these days."
  ],
  answer: 2
},
{
  q: "Fill in the blank with the most appropriate preposition.\nThe scientist elaborated ___ the implications of the experiment during his lecture.",
  options: [
    "over",
    "on",
    "with",
    "for"
  ],
  answer: 1
},
{
  q: "Match the pair to its meaning.\nColumn A | Column B\nFaze | A) Disturb or upset\nPhase | B) Stage or step in a process",
  options: [
    "1–A, 2–B",
    "1–B, 2–A",
    "1–A, 2–A",
    "1–B, 2–B"
  ],
  answer: 0
},
{
  q: "Choose the correctly spelt word.",
  options: [
    "Cholera",
    "Choleraa",
    "Chorrla",
    "Cyhclera"
  ],
  answer: 0
},
{
  q: "Choose the best option to replace the underlined part.\nShe always completes her homework before bed.",
  options: [
    "at bed",
    "at the bed",
    "by bed",
    "No substitution"
  ],
  answer: 3
},
{
  q: "Choose the best option to replace the underlined part.\nWe must prevent him to making the same mistake again.",
  options: [
    "Prevent him for making",
    "Prevent him from making",
    "Prevent him in making",
    "No substitution"
  ],
  answer: 1
},
{
  q: "Choose the correct indirect narration.\nThe doctor said, “Your father is going to recover within the next two days.”",
  options: [
    "The doctor said that his father was going to recover within the following two days.",
    "The doctor said that his father is going to recover within the following two days.",
    "The doctor said that his father is going to recover within the next two days.",
    "The doctor said that his father was going to recover within the previous two days."
  ],
  answer: 0
},
{
  q: "Change the following sentence into the Active form.\nThe presentation has been given.",
  options: [
    "The presentation was given.",
    "They had given the presentation.",
    "Someone has given the presentation.",
    "Someone gives the presentation."
  ],
  answer: 2
},
{
  q: "Choose the option that is the most appropriate conversion into Direct Speech.\nHe told her that the documents had already been signed before she had called.",
  options: [
    "He said, “The documents were already signed before you called.”",
    "He said to her, “The documents have already been signed before you had called.”",
    "He said to her, “The documents had already been signed before you called.”",
    "He told her, “The documents have already been signed before you have called.”"
  ],
  answer: 2
},
{
  q: "Choose the most suitable preposition.\nThis area is prone ___ flooding during the monsoon.",
  options: [
    "with",
    "for",
    "to",
    "of"
  ],
  answer: 2
},
{
  q: "Choose the correct passive voice transformation.\nHer family will have accepted her decision by next year.",
  options: [
    "Her decision will be accepted by her family by next year.",
    "Her decision will be being accepted by her family by next year.",
    "Her decision will have been accepted by her family by next year.",
    "Her decision will have being accepted by her family by next year."
  ],
  answer: 2
},
{
  q: "Choose the correct passive voice transformation.\nThe new environmental policy will be implemented by the government with immediate effect.",
  options: [
    "The government will implement the new environmental policy with immediate effect.",
    "The government will have implemented the new environmental policy with immediate effect.",
    "The government has implemented the new environmental policy with immediate effect.",
    "The government is implementing the new environmental policy with immediate effect."
  ],
  answer: 0
},
{
  q: "PASSAGE (For Q15–Q19)\nIn an economy increasingly defined by automation and volatile market dynamics, the pertinence of skill-based education has never been more conspicuous. Traditional pedagogy, with its emphasis on rote memorisation and theoretical abstraction, often fails to equip learners with the pragmatic competencies demanded by contemporary industries. This schism between academic instruction and workplace exigencies has engendered a workforce proficient in qualifications but deficient in adaptability.\n\nSkill-based education, conversely, prioritises applied learning, fostering dexterity in problem-solving, communication, and technological fluency. Apprenticeships, vocational training, and project-based curricula immerse students in authentic scenarios where knowledge is not merely recited but operationalised.\n\nFurthermore, skill-oriented systems encourage a mind-set of lifelong learning, essential in an era where obsolescence can render a profession archaic within a decade. They democratise opportunity by enabling individuals from diverse socio-economic backgrounds to access employment through demonstrable capability rather than academic prestige alone.\n\nUltimately, integrating skill-based frameworks into mainstream education is not a peripheral reform but a systemic imperative. It reconciles the persistent dichotomy between learning and livelihood, ensuring that education is not an inert archive of facts but a dynamic instrument for personal agency and national progress.\n\nThe phrase “where knowledge is not merely recited but operationalized” functions as:",
  options: [
    "Adverbial clause of place",
    "Noun clause",
    "Adjective clause",
    "Absolute phrase"
  ],
  answer: 2
},
{
  q: "Identify the voice in:\n“…has engendered a workforce proficient in qualifications but deficient in adaptability.”",
  options: [
    "Middle voice",
    "Passive voice",
    "Causative voice",
    "Active voice"
  ],
  answer: 3
},
{
  q: "The word “obsolescence” means:",
  options: [
    "Advancement",
    "State of being outdated",
    "Legal enforcement",
    "Improvement"
  ],
  answer: 1
},
{
  q: "Which idiom best conveys the meaning of “reconciles the persistent dichotomy between learning and livelihood”?",
  options: [
    "Bridge the gap",
    "Hit the nail on the head",
    "Burn the midnight oil",
    "Throw in the towel"
  ],
  answer: 0
},
{
  q: "According to the passage, what is the primary advantage of skill-based education?",
  options: [
    "It reduces the duration of education",
    "It eliminates the need for academic knowledge",
    "It bridges the gap between learning and employability",
    "It focuses solely on manual skills"
  ],
  answer: 2
},
{
  q: "Rearrange the sentences to form a meaningful paragraph.\nP. She presented the findings to her team, revealing new patterns in the business.\nQ. She created a series of functions to clean and transform the data, making it usable.\nR. She developed a dashboard to visualise the insights and trends hidden in the data.\nS. She wrote a script to extract raw data from multiple sources.",
  options: [
    "R, Q, P, S",
    "S, Q, R, P",
    "P, Q, R, S",
    "R, Q, S, P"
  ],
  answer: 1
},
{
  q: "Rearrange the sentences to form a meaningful paragraph.\nP. The group of scientists was looking for a new planet outside our solar system.\nQ. They observed the star’s light using a powerful telescope in search of a telltale dimming.\nR. They found a new planet, establishing its existence through a series of follow-up observations.\nS. This slight dimming would indicate a planet passing in front of the star.",
  options: [
    "S, Q, P, R",
    "Q, R, S, P",
    "P, Q, S, R",
    "R, Q, S, P"
  ],
  answer: 2
},
{
  q: "What is the antonym of “Parsimonious”?",
  options: [
    "Stingy",
    "Frugal",
    "Generous",
    "Economical"
  ],
  answer: 2
},
{
  q: "What is the antonym of “Somnolent”?",
  options: [
    "Awake",
    "Dull",
    "Lethargic",
    "Sluggish"
  ],
  answer: 0
},
{
  q: "Fill in the blank with the correctly spelt word.\nThe author’s prose was filled with ___ imagery.",
  options: [
    "chiaroscuro",
    "chairoscuro",
    "chairoscuoro",
    "chiaroscuro"
  ],
  answer: 3
},
{
  q: "What term refers to a strong feeling of not liking someone or something?",
  options: [
    "Affection",
    "Hatred",
    "Admiration",
    "Love"
  ],
  answer: 1
}
];
// State    
let currentIndex = 0;    
let answers = new Array(QUESTIONS.length).fill(null);     
let reviewed = new Array(QUESTIONS.length).fill(false); // mark-for-review flags    
let timeLeft = TOTAL_TIME;    
let timerId = null;    
let submitted = false;    
let isPaused = false;    
let reviewMode = false; // true when user is viewing a single question from analysis    
const app = document.getElementById("app");    

function formatTime(sec){ 
  const m = Math.floor(sec/60), s = sec%60; 
  return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"00")}`; 
}    

function getStats(){    
  const s = { total: QUESTIONS.length, attempted:0, correct:0, wrong:0, marks:0 };    
  QUESTIONS.forEach((q,i)=>{    
    const a = answers[i];    
    if (a !== null){    
      s.attempted++;    
      if (a === q.answer){ s.correct++; s.marks += MARKS_CORRECT; }    
      else { s.wrong++; s.marks += MARKS_WRONG; }    
    }    
  });    
  return s;    
}    

function renderQuestion(){    
  if (reviewMode) isPaused = true;    
  if (submitted && !reviewMode){ renderResult(); return; }    

  const q = QUESTIONS[currentIndex];    
  const progressPercent = ((currentIndex+1)/QUESTIONS.length)*100;    
  const selected = answers[currentIndex];    

  const stripHtml = QUESTIONS.map((_,idx)=>{    
    let cls = "qchip";    
    if (idx===currentIndex) cls += " current";    
    if (answers[idx] !== null) cls += " answered";    
    if (reviewed[idx]) cls += " reviewed";    
    return `<button class="${cls}" data-q="${idx}">${idx+1}</button>`;    
  }).join("");    

  app.innerHTML = `    
    <div class="header">    
      <div class="title">English Sectional Mock</div>    
      <div class="timer-wrap">    
        <div class="timer">⏱ ${formatTime(timeLeft)}</div>    
        <button class="pause-btn" id="pauseBtn">${isPaused ? "Resume":"Pause"}</button>    
      </div>    
    </div>    

    <div class="subheader">    
      <span>+${MARKS_CORRECT} for correct, ${MARKS_WRONG} for wrong</span>    
      <span class="badge">English</span>    
    </div>    

    <div class="progress-bar-bg">
      <div class="progress-bar-fill" style="width:${progressPercent}%"></div>
    </div>    

    <div class="q-strip">
      <div class="q-strip-inner">${stripHtml}</div>
    </div>    

    <div class="section-tag">English</div>    

    <div class="question-text">Q${currentIndex+1}. ${q.q}</div>    

    <div class="options">    
      ${q.options.map((opt,idx)=>{    
        let classes = "";    
        if (selected === idx && !reviewMode) classes = "selected";    
        if (reviewMode){    
          if (idx === q.answer) classes = "correct";    
          else if (selected === idx && selected !== q.answer) classes = "wrong";    
        } else {    
          if (selected === idx) classes = "selected";    
        }    
        return `<button class="option-btn ${classes}" data-index="${idx}">${String.fromCharCode(65+idx)}. ${opt}</button>`;    
      }).join("")}    
    </div>    

    <div class="footer">    
      <div class="question-count">Question ${currentIndex+1} of ${QUESTIONS.length}</div>    
      <div class="nav-buttons">    
        <button class="nav-btn" id="prevBtn"${currentIndex===0 ? " disabled":""}>Prev</button>    
        ${ reviewMode ? `<button class="back-btn" id="backAnalysis">Back to Analysis</button>` : "" }    
        <button class="nav-btn" id="markBtn">Mark</button>    
        <button class="next-btn" id="nextBtn">${currentIndex+1===QUESTIONS.length? "Submit":"Next"}</button>    
      </div>    
    </div>    
  `;    

  document.getElementById("pauseBtn").addEventListener("click", ()=>{    
    if (reviewMode){ isPaused = true; renderQuestion(); return; }    
    isPaused = !isPaused;    
    renderQuestion();    
  });    

  document.querySelectorAll(".qchip").forEach(b=>{    
    b.addEventListener("click", ()=>{ 
      currentIndex = Number(b.dataset.q); 
      reviewMode = false; 
      renderQuestion(); 
    });    
  });    

  document.querySelectorAll(".option-btn").forEach(b=>{    
    b.addEventListener("click", ()=>{    
      const idx = Number(b.dataset.index);    
      if (reviewMode) return;    
      answers[currentIndex] = idx;    
      renderQuestion();    
    });    
  });    

  document.getElementById("prevBtn").addEventListener("click", ()=>{    
    if (currentIndex>0){ currentIndex--; reviewMode = false; renderQuestion(); }    
  });    

  document.getElementById("nextBtn").addEventListener("click", ()=>{    
    if (currentIndex+1 < QUESTIONS.length){ currentIndex++; reviewMode = false; renderQuestion(); }    
    else { submitted = true; reviewMode = false; renderResult(); }    
  });    

  const markBtnEl = document.getElementById('markBtn');    
  if (markBtnEl){    
    markBtnEl.addEventListener('click', ()=>{    
      reviewed[currentIndex] = !reviewed[currentIndex];    
      markBtnEl.textContent = reviewed[currentIndex] ? 'Marked' : 'Mark';    
      renderQuestion();    
    });    
  }    

  const back = document.getElementById("backAnalysis");    
  if (back){    
    back.addEventListener("click", ()=>{    
      reviewMode = false;    
      submitted = true;    
      renderResult();    
    });    
  }    
}    

function renderResult(){    
  if (timerId){ clearInterval(timerId); timerId = null; }    
  const s = getStats();    
  const maxMarks = s.total * MARKS_CORRECT;    
  const percentage = maxMarks>0 ? Math.round((s.marks/maxMarks)*100):0;    
  let remark = percentage>=80 ? "Excellent! 💯"
             : percentage>=60 ? "Good! 👍"
             : percentage>=40 ? "Average. Can improve 🙂"
             : "Needs more practice 💪";    

  let qaHtml = "";    
  QUESTIONS.forEach((q,i)=>{    
    const user = answers[i];    
    const correctIdx = q.answer;    
    const isSkipped = user === null;    
    const isCorrect = !isSkipped && user === correctIdx;    
    const pill = isSkipped ? `<span class="pill-gray">Skipped</span>` 
               : isCorrect ? `<span class="pill-green">Correct</span>` 
               : `<span class="pill-red">Wrong</span>`;    

    const userText = isSkipped ? "<em>Skipped</em>" : `${String.fromCharCode(65+user)}. ${q.options[user]}`;    
    const correctText = `${String.fromCharCode(65+correctIdx)}. ${q.options[correctIdx]}`;    

    qaHtml += `    
      <div class="qa-card" id="qa-${i}">    
        <div class="qa-question"><strong>Q${i+1}.</strong> ${q.q}</div>    
        <div class="qa-answer-row">    
          <div><span class="label">Your answer:</span> ${userText}</div>    
          <div><span class="label">Correct answer:</span> ${correctText}</div>    
          <div style="margin-left:auto">${pill}</div>    
        </div>    
        <div style="margin-top:8px;text-align:right">    
          <button class="review-btn" data-q="${i}">Review Q</button>    
        </div>    
      </div>    
    `;    
  });    

  app.innerHTML = `    
    <div class="result">    
      <h2>English Section Analysis</h2>    
      <div class="tiny">9-minute sectional mock completed</div>    

      <div class="card">    
        <div class="card-title">Overall Performance</div>    
        <div class="stat-row"><span>Total Questions</span><span>${s.total}</span></div>    
        <div class="stat-row"><span>Attempted</span><span>${s.attempted}</span></div>    
        <div class="stat-row"><span>Correct</span><span>${s.correct}</span></div>    
        <div class="stat-row"><span>Wrong</span><span>${s.wrong}</span></div>    
        <div class="stat-row"><span>Marks</span><span>${s.marks.toFixed(2)} / ${maxMarks}</span></div>    
        <div class="stat-row"><span>Percentage</span><span>${percentage}%</span></div>    
        <div class="stat-row"><span>Remark</span><span>${remark}</span></div>    
      </div>    

      <div style="margin-top:8px;margin-bottom:8px">    
        <div class="card-title">Question-wise Review</div>    
        ${qaHtml}    
      </div>    

      <button class="restart-btn" id="restartBtn">Retake Section</button>    
      <div class="tiny">Timer will restart from 9 minutes</div>    
    </div>    
  `;    

  document.querySelectorAll(".review-btn").forEach(b=>{    
    b.addEventListener("click", ()=>{    
      const idx = Number(b.dataset.q);    
      currentIndex = idx;    
      reviewMode = true;    
      submitted = false;    
      isPaused = true;    
      renderQuestion();    
    });    
  });    

  document.getElementById("restartBtn").addEventListener("click", ()=>{    
    currentIndex = 0;    
    answers = new Array(QUESTIONS.length).fill(null);    
    timeLeft = TOTAL_TIME;    
    submitted = false;    
    isPaused = false;    
    reviewMode = false;    
    startTimer();    
    renderQuestion();    
  });    
}    

function startTimer(){    
  if (timerId) clearInterval(timerId);    
  timerId = setInterval(()=>{    
    if (!isPaused && !submitted && !reviewMode){    
      timeLeft--;    
      if (timeLeft <= 0){    
        submitted = true;    
        reviewMode = false;    
        renderResult();    
        return;    
      }    
    }    
    const el = document.querySelector(".timer");    
    if (el) el.textContent = "⏱ " + formatTime(timeLeft);    
  }, 1000);    
}    

startTimer();    
renderQuestion();
</script>  </body>    </html>
